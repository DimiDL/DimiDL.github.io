<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form with Live Text Section</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .container { max-width: 500px; margin: auto; }
        .text-section { margin-top: 20px; padding: 10px; border: 1px solid #ccc; background: #f9f9f9; }
        .text-section h3 { margin-top: 0; }
        form section { margin-bottom: 20px; }
        form section h3 { margin-bottom: 10px; border-bottom: 1px solid #ddd; padding-bottom: 4px; }
        label { display: block; margin-top: 8px; font-size: 0.9em; }
        input { width: 100%; box-sizing: border-box; padding: 6px; margin-top: 2px; }
        .row { display: flex; gap: 10px; }
        .row .field { flex: 1; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Live Monitor Form</h2>
        <form id="userForm">

            <!-- Login -->
            <section>
                <h3>Login</h3>
                <label for="username">Username:</label>
                <input type="text" id="username" name="username" autocomplete="username">
                <label for="password">Password:</label>
                <input type="password" id="password" name="password" autocomplete="current-password">
            </section>

            <!-- Address -->
            <section>
                <h3>Address</h3>
                <label for="street">Street Address:</label>
                <input type="text" id="street" name="street" autocomplete="street-address">
                <label for="city">City:</label>
                <input type="text" id="city" name="city" autocomplete="address-level2">
                <div class="row">
                    <div class="field">
                        <label for="state">State / Province:</label>
                        <input type="text" id="state" name="state" autocomplete="address-level1">
                    </div>
                    <div class="field">
                        <label for="zip">ZIP / Postal Code:</label>
                        <input type="text" id="zip" name="zip" autocomplete="postal-code">
                    </div>
                </div>
                <label for="country">Country:</label>
                <input type="text" id="country" name="country" autocomplete="country-name">
            </section>

            <!-- Credit Card -->
            <section>
                <h3>Credit Card</h3>
                <label for="ccName">Name on Card:</label>
                <input type="text" id="ccName" name="ccName" autocomplete="cc-name">
                <label for="ccNumber">Card Number:</label>
                <input type="text" id="ccNumber" name="ccNumber" autocomplete="cc-number" maxlength="19" placeholder="1234 5678 9012 3456">
                <div class="row">
                    <div class="field">
                        <label for="ccExpiry">Expiry (MM/YY):</label>
                        <input type="text" id="ccExpiry" name="ccExpiry" autocomplete="cc-exp" maxlength="5" placeholder="MM/YY">
                    </div>
                    <div class="field">
                        <label for="ccCVV">CVV:</label>
                        <input type="text" id="ccCVV" name="ccCVV" autocomplete="cc-csc" maxlength="4" placeholder="123">
                    </div>
                </div>
            </section>

        </form>

        <div class="text-section" id="textSection">
            <h3>Live Values:</h3>
            <p><strong>Username:</strong> <span id="displayUsername"></span></p>
            <p><strong>Password:</strong> <span id="displayPassword"></span></p>
            <hr>
            <p><strong>Street:</strong> <span id="displayStreet"></span></p>
            <p><strong>City:</strong> <span id="displayCity"></span></p>
            <p><strong>State:</strong> <span id="displayState"></span></p>
            <p><strong>ZIP:</strong> <span id="displayZip"></span></p>
            <p><strong>Country:</strong> <span id="displayCountry"></span></p>
            <hr>
            <p><strong>Name on Card:</strong> <span id="displayCcName"></span></p>
            <p><strong>Card Number:</strong> <span id="displayCcNumber"></span></p>
            <p><strong>Expiry:</strong> <span id="displayCcExpiry"></span></p>
            <p><strong>CVV:</strong> <span id="displayCcCvv"></span></p>
        </div>
    </div>

    <script>
        const fields = [
            { inputId: 'username',  displayId: 'displayUsername' },
            { inputId: 'password',  displayId: 'displayPassword' },
            { inputId: 'street',    displayId: 'displayStreet'   },
            { inputId: 'city',      displayId: 'displayCity'     },
            { inputId: 'state',     displayId: 'displayState'    },
            { inputId: 'zip',       displayId: 'displayZip'      },
            { inputId: 'country',   displayId: 'displayCountry'  },
            { inputId: 'ccName',    displayId: 'displayCcName'   },
            { inputId: 'ccNumber',  displayId: 'displayCcNumber' },
            { inputId: 'ccExpiry',  displayId: 'displayCcExpiry' },
            { inputId: 'ccCVV',     displayId: 'displayCcCvv'    },
        ];

        function updateTextSection() {
            fields.forEach(({ inputId, displayId }) => {
                document.getElementById(displayId).textContent =
                    document.getElementById(inputId).value;
            });
        }

        function monitorValues() {
            let lastValues = {};
            fields.forEach(({ inputId }) => { lastValues[inputId] = ""; });

            setInterval(() => {
                let changed = false;
                fields.forEach(({ inputId }) => {
                    const current = document.getElementById(inputId).value;
                    if (current !== lastValues[inputId]) {
                        lastValues[inputId] = current;
                        changed = true;
                    }
                });
                if (changed) updateTextSection();
            }, 100);
        }

        monitorValues();
    </script>
</body>
</html>
