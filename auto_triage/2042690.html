function _diffLang(filename) {
  const ext = filename.toLowerCase().replace(/.*\./, '');
  if (['js','mjs','jsx','ts','tsx'].includes(ext)) return 'js';
  if (ext === 'py') return 'py';
  if (['cpp','cc','c','h','mm','hh'].includes(ext)) return 'cpp';
  if (ext === 'rs') return 'rs';
  return null;
}

const _HL_KW = {
  js:  new Set(['const','let','var','function','class','return','if','else','for','while','do',
                'import','export','default','new','this','super','async','await','try','catch',
                'finally','throw','null','undefined','true','false','typeof','instanceof',
                'of','in','delete','void','switch','case','break','continue','yield','static']),
  py:  new Set(['def','class','return','if','elif','else','for','while','import','from','as',
                'with','try','except','finally','raise','pass','None','True','False','and',
                'or','not','in','is','lambda','yield','async','await','global','nonlocal','del']),
  cpp: new Set(['auto','void','int','bool','char','float','double','const','static','return',
                'if','else','for','while','do','class','struct','namespace','using','new',
                'delete','nullptr','true','false','template','typename','public','private',
                'protected','virtual','override','inline','explicit','operator','sizeof',
                'enum','union','switch','case','break','continue','typedef','extern']),
  rs:  new Set(['fn','let','mut','pub','use','mod','struct','enum','impl','trait','return',
                'if','else','for','while','loop','match','Some','None','Ok','Err','true',
                'false','self','Self','async','await','move','ref','where','type','const',
                'static','unsafe','extern','dyn','break','continue','crate','super']),
};

function _hlLine(raw, lang) {
  if (!lang) return escHtml(raw);
  const kw = _HL_KW[lang];
  const out = [];
  let i = 0;
  const n = raw.length;
  while (i < n) {
    // Line comment
    if ((lang !== 'py') && raw[i] === '/' && raw[i+1] === '/') {
      out.push(`<span class="hl-cmt">${escHtml(raw.slice(i))}</span>`); break;
    }
    if (lang === 'py' && raw[i] === '#') {
      out.push(`<span class="hl-cmt">${escHtml(raw.slice(i))}</span>`); break;
    }
    // String literal (single or double quote, or JS template literal)
    if (raw[i] === '"' || raw[i] === "'" || (lang === 'js' && raw[i] === '`')) {
      const q = raw[i]; let j = i + 1;
      while (j < n && raw[j] !== q) { if (raw[j] === '\\') j++; j++; }
      out.push(`<span class="hl-str">${escHtml(raw.slice(i, j + 1))}</span>`);
      i = j + 1; continue;
    }
    // Number
    if (/\d/.test(raw[i]) && (i === 0 || !/[a-zA-Z_]/.test(raw[i-1]))) {
      let j = i;
      while (j < n && /[\da-fA-FxX._]/.test(raw[j])) j++;
      out.push(`<span class="hl-num">${escHtml(raw.slice(i, j))}</span>`);
      i = j; continue;
    }
    // Identifier / keyword
    if (/[a-zA-Z_$]/.test(raw[i])) {
      let j = i;
      while (j < n && /[a-zA-Z0-9_$]/.test(raw[j])) j++;
      const word = raw.slice(i, j);
      out.push(kw.has(word) ? `<span class="hl-kw">${escHtml(word)}</span>` : escHtml(word));
      i = j; continue;
    }
    out.push(escHtml(raw[i++]));
  }
  return out.join('');
}

function parseDiff(patchText) {
  const files = [];
  const sections = patchText.split(/^diff --git /m).filter(Boolean);
  for (const section of sections) {
    const lines = section.split('\n');
    const plusLine = lines.find(l => l.startsWith('+++ b/'));
    const filename = plusLine ? plusLine.slice(6) : lines[0].split(' ').pop();
    const hunks = [];
    let hunk = null, oldNo = 0, newNo = 0;
    for (const line of lines) {
      if (line.startsWith('@@ ')) {
        const m = line.match(/@@ -(\d+)[,\d]* \+(\d+)/);
        if (m) { oldNo = +m[1]; newNo = +m[2]; }
        hunk = { header: line, lines: [] };
        hunks.push(hunk);
      } else if (hunk) {
        if (line.startsWith('+++') || line.startsWith('---') ||
            line.startsWith('diff ') || line.startsWith('index ') ||
            line.startsWith('\\ ') || line === '') continue;
        if (line.startsWith('+')) {
          hunk.lines.push({ type: 'add', oldNo: null, newNo: newNo++, content: line.slice(1) });
        } else if (line.startsWith('-')) {
          hunk.lines.push({ type: 'del', oldNo: oldNo++, newNo: null, content: line.slice(1) });
        } else {
          hunk.lines.push({ type: 'ctx', oldNo: oldNo++, newNo: newNo++, content: line.slice(1) });
        }
      }
    }
    if (hunks.length) files.push({ filename, lang: _diffLang(filename), hunks });
  }
  return files;
}

function _applyCodeHighlight(codeEl, lang) {
  const text = codeEl.textContent;
  codeEl.innerHTML = text.split('\n').map(line => _hlLine(line, lang)).join('\n');
}

function renderPatch(bugId, patch) {
  if (!patch) return '';
  const esc = escHtml;
  const files = parseDiff(patch);
  if (!files.length) {
    return `<div class="fix-patch-header">
    <span class="fix-patch-title">Generated Patch</span>
    <button class="btn-compact" onclick="copyPatch(${bugId})">Copy</button>
  </div>
  <pre class="fix-patch-view">${esc(patch)}</pre>`;
  }
  const fileHtml = files.map(file => {
    const hl = c => _hlLine(c, file.lang);
    const rows = file.hunks.map(hunk => {
      const hunkRow = `<tr class="diff-row-hunk"><td class="diff-hunk-header" colspan="4">${esc(hunk.header)}</td></tr>`;
      const lineRows = hunk.lines.map(l => {
        const cls = `diff-row-${l.type}`;
        const oldCode = l.type === 'add' ? '' : hl(l.content);
        const newCode = l.type === 'del' ? '' : hl(l.content);
        return `<tr class="${cls}">
          <td class="diff-ln diff-ln-old">${l.oldNo ?? ''}</td>
          <td class="diff-code diff-code-old">${oldCode}</td>
          <td class="diff-ln diff-ln-new">${l.newNo ?? ''}</td>
          <td class="diff-code diff-code-new">${newCode}</td>
        </tr>`;
      }).join('');
      return hunkRow + lineRows;
    }).join('');
    return `<div class="diff-file">
      <div class="diff-file-header">
        <span class="diff-file-name">${esc(file.filename)}</span>
      </div>
      <div class="diff-table-wrap">
        <table class="diff-table">
          <colgroup><col class="diff-col-ln"><col class="diff-col-code"><col class="diff-col-ln"><col class="diff-col-code"></colgroup>
          <tbody>${rows}</tbody>
        </table>
      </div>
    </div>`;
  }).join('');
  return `<div class="fix-patch-header">
    <span class="fix-patch-title">Generated Patch</span>
    <button class="btn-compact" onclick="copyPatch(${bugId})">Copy</button>
  </div>
  <div class="diff-viewer">${fileHtml}</div>`;
}

function copyPatch(bugId) {
  const b = BUGS[bugId] || MY_ISSUES_DATA[bugId];
  if (b && b.fix_code) navigator.clipboard.writeText(b.fix_code);
}

async function applyPatchToWorktree(bugId, btn) {
  const orig = btn.textContent;
  btn.disabled = true;
  btn.textContent = 'Applying…';
  showConsolePanel(`POST /bug/${bugId}/fix/apply-to-worktree`, 'Apply to Worktree');
  try {
    await streamSSE(`/bug/${bugId}/fix/apply-to-worktree`, async (ev) => {
      if (ev.line !== undefined) {
        appendConsoleLines(ev.line, ev.type || 'normal');
      } else if (ev.cancelled) {
        btn.textContent = orig; btn.disabled = false;
      } else if (ev.error) {
        appendConsoleLines(ev.detail || 'Error applying patch', 'error');
        setConsolePanelStatus('Failed', 'error');
        btn.textContent = orig; btn.disabled = false;
      } else if (ev.done) {
        appendConsoleLines(`✓ Patch applied to ${ev.path}`, 'success');
        setConsolePanelStatus('Done', 'success');
        btn.textContent = 'Applied ✓'; btn.disabled = false;
      }
    }, {}, [bugId, 'fix-worktree']);
  } catch(e) {
    appendConsoleLines(e.message || 'Network error', 'error');
    setConsolePanelStatus('Error', 'error');
    btn.textContent = orig; btn.disabled = false;
  }
}

async function generateFix(bugId) {
  const b = BUGS[bugId] || MY_ISSUES_DATA[bugId];
  if (!b || !b.test_code) {
    appendConsoleLines('Generate a testcase first before generating a fix.', 'error');
    showConsolePanel('Generate Fix', 'Fix Generation');
    return;
  }
  const fixOptionsEl = document.getElementById(`fix-options-${bugId}`);
  const selectedCard = fixOptionsEl ? fixOptionsEl.querySelector('.fix-option-card.selected') : null;
  if (!selectedCard) return;

  let fixOption;
  if (selectedCard.classList.contains('fix-option-card--custom')) {
    const ta = document.getElementById(`fix-custom-text-${bugId}`);
    fixOption = { custom_text: (ta && ta.value.trim()) || '' };
  } else {
    fixOption = {
      title: selectedCard.dataset.title || '',
      description: selectedCard.dataset.description || '',
    };
  }

  const btn = document.getElementById(`btn-fix-${bugId}`);
  const patchEl = document.getElementById(`fix-patch-${bugId}`);
  const orig = btn.textContent.trim();
  btn.disabled = true;
  btn.textContent = 'Generating…';
  showConsolePanel(`POST /bug/${bugId}/fix`, 'Fix Generation');

  try {
    await streamSSE(`/bug/${bugId}/fix`, async (ev) => {
      if (ev.line !== undefined) {
        appendConsoleLines(ev.line, ev.type || 'normal');
      } else if (ev.cancelled) {
        btn.textContent = orig; btn.disabled = false;
      } else if (ev.error) {
        appendConsoleLines(ev.detail || 'Error', 'error');
        setConsolePanelStatus('Failed', 'error');
        btn.textContent = orig; btn.disabled = false;
      } else if (ev.done) {
        if (BUGS[bugId]) BUGS[bugId].fix_code = ev.patch;
        if (MY_ISSUES_DATA[bugId]) MY_ISSUES_DATA[bugId].fix_code = ev.patch;
        _dispatchBugDataChanged(bugId, 'fix_code');
        if (patchEl) patchEl.innerHTML = renderPatch(bugId, ev.patch);
        const tab = document.getElementById(`stab-fix-${bugId}`);
        if (tab && !tab.textContent.includes('✓')) tab.textContent = 'Fix ✓';
        const b = BUGS[bugId] || MY_ISSUES_DATA[bugId];
        const fixRunBar = document.getElementById(`fix-run-bar-${bugId}`);
        if (fixRunBar && b && b.test_code) fixRunBar.style.display = '';
        const fixWorktreeBar = document.getElementById(`fix-worktree-bar-${bugId}`);
        if (fixWorktreeBar) fixWorktreeBar.style.display = '';
        const fixPatchBadge = document.getElementById(`fix-patch-badge-${bugId}`);
        if (fixPatchBadge) fixPatchBadge.style.display = '';
        const attrEl = document.getElementById(`fix-option-attribution-${bugId}`);
        const attrTitle = document.getElementById(`fix-option-attribution-title-${bugId}`);
        if (attrEl && attrTitle) { attrTitle.textContent = renderFixOptionLabel(fixOption); attrEl.style.display = ''; }
        activatePanelTab(`fix-${bugId}`, 'patch');
        setConsolePanelStatus('Done', 'success');
        btn.textContent = 'Re-generate Fix →'; btn.disabled = false;
      }
    }, {
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ fix_option: fixOption, regenerate: true }),
    }, [bugId, 'fix']);
  } catch(e) {
    appendConsoleLines(e.message || 'Network error', 'error');
    setConsolePanelStatus('Error', 'error');
    btn.textContent = orig; btn.disabled = false;
  }
}

<script>
// Saved Logins panel — per-bug capture of one saved login.
// Mirrors the autofill helpers in reproduce.js: separate Firefox and Chrome
// captures, each with their own Set up / Delete buttons and status pill.

const _LOGINS_KEYWORDS = [
  'password', 'login', 'credential', 'signon',
  'saved login', 'saved password', 'password manager',
];

function _bugHasLoginsPrereq(bugId) {
  // After Analyze the fresh strategy lives in _reproStrategy[bugId]; the
  // server-side BUGS[bugId].reproduce_strategy reflects the page-load snapshot
  // and is never mutated in-page. Check both so the tab appears as soon as
  // analyze completes, without a page reload.
  const live = (typeof _reproStrategy !== 'undefined' && _reproStrategy[bugId]) || null;
  const bug = (typeof BUGS !== 'undefined' && BUGS[bugId])
           || (typeof UPDATED_BUGS !== 'undefined' && UPDATED_BUGS[bugId])
           || (typeof MY_ISSUES_DATA !== 'undefined' && MY_ISSUES_DATA[bugId])
           || null;
  const saved = bug && bug.reproduce_strategy;
  const prereqs = (live && live.prerequisites)
               || (saved && saved.prerequisites)
               || [];
  return prereqs.some(p => p && p.id === 'logins_data');
}

function _setLoginsPill(bugId, browser, data) {
  const prefix = browser === 'firefox' ? 'ff' : 'cr';
  const el = document.getElementById(`repro-logins-${prefix}-count-${bugId}`);
  if (!el) return false;
  const count = (data && typeof data.count === 'number') ? data.count : 0;
  el.textContent = count > 0 ? `${count} saved login${count !== 1 ? 's' : ''}` : 'No saved logins';
  el.className = `af-pill ${count > 0 ? 'af-pill--ok' : 'af-pill--empty'}`;
  return count > 0;
}

async function loadLoginsStatus(bugId) {
  const tab = document.getElementById(`repro-logins-tab-${bugId}`);
  if (!tab) return;
  const hasPrereq = _bugHasLoginsPrereq(bugId);
  const bugtext = (tab.dataset.bugtext || '').toLowerCase();
  const matchesKeyword = _LOGINS_KEYWORDS.some(k => bugtext.includes(k));
  if (!hasPrereq && !matchesKeyword) return;
  tab.style.display = '';
  try {
    const [ffRes, crRes] = await Promise.all([
      fetch(`/bug/${bugId}/logins-setup/status?browser=firefox`),
      fetch(`/bug/${bugId}/logins-setup/status?browser=chrome`),
    ]);
    const ffData = await ffRes.json();
    const crData = await crRes.json();
    const ffOk = _setLoginsPill(bugId, 'firefox', ffData);
    const crOk = _setLoginsPill(bugId, 'chrome', crData);
    const badge = document.getElementById(`repro-logins-status-${bugId}`);
    if (badge) {
      const parts = [];
      if (ffData.count > 0) parts.push(`FF: ${ffData.count}`);
      if (crData.count > 0) parts.push(`CR: ${crData.count}`);
      badge.textContent = parts.join(' · ');
      badge.className = `panel-nav__badge${(ffOk || crOk) ? ' panel-nav__badge--ok' : ''}`;
    }
  } catch (e) {}
}

async function setupLoginsData(bugId, browser) {
  const prefix = browser === 'firefox' ? 'ff' : 'cr';
  const btn = document.getElementById(`repro-logins-${prefix}-btn-${bugId}`);
  if (btn) btn.disabled = true;
  const label = browser === 'firefox' ? 'Firefox Saved Login Capture' : 'Chrome Saved Login Capture';
  showConsolePanel(`Setting up ${browser} saved login…`, label);
  try {
    await streamSSE(`/bug/${bugId}/logins-setup/run?browser=${browser}`, async (ev) => {
      if (ev.line !== undefined) appendConsoleLines(ev.line, ev.type || 'normal');
      else if (ev.error) {
        appendConsoleLines(ev.detail || 'Error', 'error');
        setConsolePanelStatus('Failed', 'error');
      } else if (ev.done) {
        await loadLoginsStatus(bugId);
        setConsolePanelStatus('Done', 'success');
      }
    });
  } catch (e) {
    if (e.name !== 'AbortError') appendConsoleLines('Request failed: ' + e, 'error');
  } finally {
    if (btn) btn.disabled = false;
  }
}

async function deleteLoginsData(bugId, browser) {
  const prefix = browser === 'firefox' ? 'ff' : 'cr';
  const delBtn = document.getElementById(`repro-logins-${prefix}-del-${bugId}`);
  if (delBtn) delBtn.disabled = true;
  try {
    await fetch(`/bug/${bugId}/logins-setup/data?browser=${browser}`, { method: 'DELETE' });
    await loadLoginsStatus(bugId);
  } finally {
    if (delBtn) delBtn.disabled = false;
  }
}

</script>

<script>
/* This Source Code Form is subject to the terms of the Mozilla Public
 * License, v. 2.0. If a copy of the MPL was not distributed with this
 * file, You can obtain one at http://mozilla.org/MPL/2.0/. */

/**
 * This file is wrapped in `if (!window.__simplifyMarkup)` because content-script
 * injections in the same tab share the same JS world. Injecting this file more
 * than once would re-declare all top-level `const` and `function` definitions,
 * causing errors like "redeclaration of const …".
 *
 * By guarding the initialization, the script becomes safe to inject multiple
 * times: the helpers are defined only once and `window.__simplifyMarkup` acts as
 * a stable singleton API for later executeScript calls.
 */
if (!window.__simplifyMarkup) {
  (function () {
    // Maximum number of <option> elements to keep per <select>.
    const MAX_OPTIONS = 5;

    // Maximum number of <li> elements to keep per <ul>/<ol>.
    const MAX_LIST_ITEMS = 12;

    // Tags used for layout-only wrappers.
    const LAYOUT_TAGS = ["div", "span", "p"];

    // Tags whose content we want to unwrap (keep text, drop tag).
    const UNWRAP_TAGS = [
      "em", "i", "b", "strong", "u", "small", "big",
      "mark", "abbr", "cite", "dfn", "s", "strike", "tt",
      "q", "var", "samp", "kbd", "bdi", "bdo", "font",
    ];

    // Attribute allowlists.
    const COMMON_ATTRS = new Set([
      "name",
      "autocomplete",
      "placeholder",
      "title",
      "aria-label",
      "aria-labelledby",
      "aria-describedby",
      "data-moz-aid",
      "contenteditable",
    ]);

    const FIELD_ATTRS = new Set([
      "type",
      "value",
      "inputmode",
      "min",
      "max",
      "step",
    ]);

    const OPTION_ATTRS = new Set(["value", "label"]);
    const BUTTON_ATTRS = new Set(["type", "value"]);
    const LABEL_ATTRS = new Set(["for"]);

    const TAGS_KEEP_ID = new Set([
      "form", "label", "input", "select", "textarea",
      "button", "legend", "fieldset", "datalist",
    ]);

    // Tags we should never auto-remove in the generic empty-element cleaner.
    const NEVER_AUTO_REMOVE_TAGS = new Set([
      "form", "label", "input", "textarea", "select", "option",
      "button", "fieldset", "legend", "table", "tbody", "thead",
      "tfoot", "tr", "th", "td", "datalist",
    ]);

    function simplifyMarkup(element) {
      let forms = HTMLFormElement.isInstance(element)
        ? [element]
        : Array.from(document.querySelectorAll("form"));
      forms = forms.filter(form =>
        form.checkVisibility({
          visibilityProperty: true,
          opacityProperty: true,
          contentVisibilityAuto: true,
        })
      );
      if (!forms.length) {
        forms = [document.documentElement];
      }
      return forms
        .map(form => simplifySingleForm(form))
        .filter(s => s)
        .join("\n");
    }

    function simplifySingleForm(form) {
      const clone = form.cloneNode(true);
      removeComments(clone);
      removeNonSemanticTags(clone);
      removeInvisibleField(clone);
      unwrapFormattingTags(clone);
      cleanTextNodes(clone);
      removeEmptyLayoutContainers(clone);
      cleanAttributesByTag(clone);
      truncateSelectOptions(clone);
      truncateListItems(clone);
      flattenLayoutContainers(clone);
      cleanEmptyElementsBottomUp(clone);
      clone.normalize();
      return clone.outerHTML;
    }

    function removeComments(root) {
      const walker = root.ownerDocument.createTreeWalker(root, NodeFilter.SHOW_COMMENT);
      const comments = [];
      for (let n; (n = walker.nextNode()); ) {
        comments.push(n);
      }
      comments.forEach(n => n.remove());
    }

    function isInvisibleField(el) {
      if (el.getAttribute("type") === "hidden") {
        return true;
      } else if (el.hidden || el.style.display === "none") {
        return true;
      } else if (el.getAttribute("aria-hidden")) {
        return true;
      }
      return false;
    }

    function removeInvisibleField(root) {
      root.querySelectorAll(
        "input, select, textarea, div[contenteditable]"
      ).forEach(el => {
        if (isInvisibleField(el)) {
          el.remove();
        }
      });
    }

    function removeNonSemanticTags(root) {
      root.querySelectorAll(
        "img,picture,video,audio,svg,canvas,object,embed,script,noscript,meta,style,link"
      ).forEach(n => n.remove());
    }

    function unwrapFormattingTags(root) {
      UNWRAP_TAGS.forEach(tag => {
        root.querySelectorAll(tag).forEach(el => {
          const fragment = root.ownerDocument.createDocumentFragment();
          while (el.firstChild) {
            fragment.appendChild(el.firstChild);
          }
          el.replaceWith(fragment);
        });
      });
    }

    function cleanTextNodes(root) {
      const walker = root.ownerDocument.createTreeWalker(root, NodeFilter.SHOW_TEXT);
      const toRemove = [];
      let node;
      while ((node = walker.nextNode())) {
        const original = node.textContent;
        if (!/\p{Cf}/u.test(original) && original.trim()) {
          continue;
        }
        const cleaned = original.replace(/\p{Cf}/gu, "");
        if (!cleaned.trim()) {
          toRemove.push(node);
        } else if (cleaned !== original) {
          node.textContent = cleaned;
        }
      }
      toRemove.forEach(n => n.remove());
    }

    function removeEmptyLayoutContainers(root) {
      let removed;
      do {
        removed = false;
        root.querySelectorAll(LAYOUT_TAGS.join(",")).forEach(el => {
          if (!el.textContent && el.children.length === 0 && !el.hasAttribute("contenteditable")) {
            el.remove();
            removed = true;
          }
        });
      } while (removed);
    }

    function allowedAttrsForElement(el) {
      const tag = el.tagName.toLowerCase();
      const allowed = new Set(COMMON_ATTRS);
      if (tag === "input" || tag === "textarea" || tag === "select") {
        FIELD_ATTRS.forEach(a => allowed.add(a));
      } else if (tag === "option") {
        OPTION_ATTRS.forEach(a => allowed.add(a));
      } else if (tag === "button") {
        BUTTON_ATTRS.forEach(a => allowed.add(a));
      } else if (tag === "label") {
        LABEL_ATTRS.forEach(a => allowed.add(a));
      }
      if (TAGS_KEEP_ID.has(tag)) {
        allowed.add("id");
      }
      return allowed;
    }

    function cleanAttributesByTag(root) {
      [root, ...root.querySelectorAll("*")].forEach(el => {
        const allowed = allowedAttrsForElement(el);
        for (const attr of Array.from(el.attributes)) {
          if (!allowed.has(attr.name.toLowerCase())) {
            el.removeAttribute(attr.name);
          }
        }
      });
    }

    function truncateSelectOptions(root) {
      root.querySelectorAll("select").forEach(select => {
        const options = Array.from(select.children).filter(
          el => el.tagName.toLowerCase() === "option"
        );
        if (options.length > MAX_OPTIONS) {
          options.slice(MAX_OPTIONS).forEach(el => el.remove());
          select.appendChild(root.ownerDocument.createTextNode("…"));
        }
      });
    }

    function truncateListItems(root) {
      root.querySelectorAll("ul, ol").forEach(list => {
        const items = Array.from(list.children).filter(
          el => el.tagName.toLowerCase() === "li"
        );
        if (items.length > MAX_LIST_ITEMS) {
          items.slice(MAX_LIST_ITEMS).forEach(el => el.remove());
          list.appendChild(root.ownerDocument.createTextNode("…"));
        }
      });
    }

    function flattenLayoutContainers(root) {
      let changed;
      do {
        changed = false;
        root.querySelectorAll(LAYOUT_TAGS.join(",")).forEach(el => {
          const parent = el.parentNode;
          if (!parent) {
            return;
          }
          const meaningfulChildren = Array.from(el.childNodes).filter(
            n => !(n.nodeType === Node.TEXT_NODE && !n.textContent.trim())
          );
          const child = meaningfulChildren.length === 1 ? meaningfulChildren[0] : null;

          // RULE 1: flatten same-tag pure wrappers
          if (
            child &&
            child.nodeType === Node.ELEMENT_NODE &&
            el.attributes.length === 0 &&
            child.tagName === el.tagName &&
            child.attributes.length === 0
          ) {
            while (child.firstChild) {
              el.appendChild(child.firstChild);
            }
            child.remove();
            changed = true;
            return;
          }

          // RULE 2: unwrap pure single-child wrapper
          if (
            child &&
            child.nodeType === Node.ELEMENT_NODE &&
            el.attributes.length === 0
          ) {
            el.replaceWith(child);
            changed = true;
            return;
          }

          // RULE 3: unwrap pure container with no meaningful siblings
          if (el.attributes.length === 0) {
            const meaningfulSiblings = Array.from(parent.childNodes).filter(n => {
              if (n === el) {
                return false;
              }
              return !(n.nodeType === Node.TEXT_NODE && !n.textContent.trim());
            });
            if (meaningfulSiblings.length === 0) {
              const frag = root.ownerDocument.createDocumentFragment();
              while (el.firstChild) {
                frag.appendChild(el.firstChild);
              }
              el.replaceWith(frag);
              changed = true;
              return;
            }
          }

          // RULE 4: unwrap <div> with single text child
          if (
            el.tagName === "DIV" &&
            el.attributes.length === 0 &&
            el.childNodes.length === 1 &&
            el.firstChild.nodeType === Node.TEXT_NODE
          ) {
            el.replaceWith(document.createTextNode(el.firstChild.textContent + "\n"));
            changed = true;
          }
        });
      } while (changed);
    }

    function hasMeaningfulChildren(el) {
      return Array.from(el.childNodes).some(node => {
        if (node.nodeType === Node.TEXT_NODE) {
          return !!node.textContent.trim();
        }
        return node.nodeType === Node.ELEMENT_NODE;
      });
    }

    function cleanEmptyElementsBottomUp(root) {
      const nodes = Array.from(root.querySelectorAll("*")).reverse();
      for (const el of nodes) {
        const tag = el.tagName.toLowerCase();
        if (NEVER_AUTO_REMOVE_TAGS.has(tag)) {
          continue;
        }
        if (!hasMeaningfulChildren(el) && el.attributes.length === 0) {
          el.remove();
        }
      }
    }

    window.__simplifyMarkup = simplifyMarkup;
  })();
}

</script>

rectly otherwise.\"}, \"correct_component\": {\"verdict\": \"Yes\", \"detail\": \"The bug is in FormAutofillHandler and FormAutofillChild, which belong to Toolkit :: Form Autofill.\"}, \"security\": {\"verdict\": \"No\", \"detail\": \"This is a timing/state management bug; it does not expose sensitive data or allow privilege escalation.\"}, \"reporter_type\": \"mozilla-engineer\", \"next_step\": \"ready-to-fix\", \"next_step_notes\": \"The race condition is well-diagnosed by the reporter and LLM analysis. A fix should ensure that form submission handling in FormAutofillChild waits for setIdentifiedFieldDetails to be called before accessing fieldDetails, or gracefully handles the uninitialized state.\", \"suggested_reply\": null, \"regression_confidence\": null, \"affected_platforms\": null}", "test_code": "/* Any copyright is dedicated to the Public Domain.\n   http://creativecommons.org/publicdomain/zero/1.0/ */\n\n\"use strict\";\n\nconst CC_FIXTURE_URL = BASE_URL + \"autocomplete_creditcard_basic.html\";\n\nconst TEST_CREDIT_CARD = {\n  \"cc-name\": \"John Doe\",\n  \"cc-number\": \"4111111111111111\",\n  \"cc-exp-month\": \"4\",\n  \"cc-exp-year\": String(new Date().getFullYear() + 1),\n};\n\nadd_setup(async function () {\n  await SpecialPowers.pushPrefEnv({\n    set: [\n      [\"extensions.formautofill.creditCards.supported\", \"on\"],\n      [\"extensions.formautofill.creditCards.enabled\", true],\n      [\"toolkit.osKeyStore.unofficialBuildOnlyLogin\", \"\"],\n    ],\n  });\n  await removeAllRecords();\n});\n\n// Bug 2042690: When a user fills and submits a credit card form quickly in a\n// new profile, the save doorhanger fails to appear. The race is between the\n// async FormAutofill:OnFieldsDetected round-trip and the form submission:\n// if submit fires before the parent has called setIdentifiedFieldDetails on\n// the FormAutofillChild handler, collectFormFilledData() throws. The presence\n// of a password field on the page makes LoginManagerChild register\n// form-submission interest with the shared FormHandlerChild, so the\n// form-submission-detected event fires for the credit card form even when\n// FormAutofill has not yet completed its own registration.\nadd_task(async function test_save_doorhanger_on_fast_submit_new_profile() {\n  is(\n    (await getCreditCards()).length,\n    0,\n    \"No credit cards in storage (new profile scenario)\"\n  );\n\n  await BrowserTestUtils.withNewTab(\n    { gBrowser, url: CC_FIXTURE_URL },\n    async function (browser) {\n      const onPopupShown = waitForPopupShown();\n\n      await SpecialPowers.spawn(\n        browser,\n        [TEST_CREDIT_CARD],\n        async function (cc) {\n          const doc = content.document;\n          const form = doc.getElementById(\"form\");\n\n          const pwd = doc.createElement(\"input\");\n          pwd.type = \"password\";\n          pwd.id = \"extra-pwd\";\n          pwd.autocomplete = \"new-password\";\n          doc.body.insertBefore(pwd, form);\n\n          const ccName = form.querySelector(\"#cc-name\");\n          ccName.focus();\n\n          for (const [field, value] of Object.entries(cc)) {\n            form.querySelector(`#${field}`).setUserInput(value);\n          }\n\n          form.querySelector(\"input[type=submit]\").click();\n        }\n      );\n\n      let popupShownOrTimeout = await Promise.race([\n        onPopupShown.then(() => \"shown\"),\n        new Promise(resolve => setTimeout(() => resolve(\"timeout\"), 5000)),\n      ]);\n\n      Assert.equal(\n        popupShownOrTimeout,\n        \"shown\",\n        \"[Issue Reproduced] Save credit card doorhanger should appear after fast submit in a new profile\"\n      );\n\n      if (popupShownOrTimeout === \"shown\") {\n        await clickDoorhangerButton(SECONDARY_BUTTON);\n      }\n    }\n  );\n\n  await removeAllRecords();\n});\n", "run_output": "Running: ./mach test --headless browser/extensions/formautofill/test/browser/browser_bug2042690.js\nStreaming resource usag profile - \"timeout\" == \"shown\"\nchrome://mochitests/content/browser/browser/extensions/formautofill/test/browser/browser_bug2042690.js:test_save_doorhanger_on_fast_submit_new_profile/<:76\nresource://testing-common/BrowserTestUtils.sys.mjs:withNewTab:132\nchrome://mochitests/content/browser/browser/extensions/formautofill/test/browser/browser_bug2042690.js:test_save_doorhanger_on_fast_submit_new_profile:42\nchrome://mochikit/content/browser-test.js:handleTask:1377\nchrome://mochikit/content/browser-test.js:_runTaskBasedTest:1467\nchrome://mochikit/content/browser-test.js:Tester_execTest:1619\nchrome://mochikit/content/browser-test.js:nextTest/<:1357\nchrome://mochikit/content/tests/SimpleTest/SimpleTest.js:SimpleTest.waitForFocus/<:1060\n  FAIL browser/extensions/formautofill/test/browser/browser_bug2042690.js - finished in 5363ms\n✗ Tests failed (exit 1)", "test_site_source": "generated", "root_cause": "{\"executive_summary\": \"The error \\\"Should only use 'fieldDetails' after 'setIdentifiedFieldDetails' is called\\\" is thrown by `FormAutofillHandler.formSubmitted()` when a form is submitted before the asynchronous parent-side field detection round-trip has resolved. This race is only triggered when another actor in the same window (typically `LoginManagerChild` on pages with password fields) has already armed `FormHandlerChild` to dispatch `form-submission-detected` events, and is widened by slow parent-side storage initialization on new profiles.\", \"architecture_overview\": \"Form autofill on Desktop uses three cooperating JS Window Actors per content window. (1) The FormAutofill child/parent actor (`toolkit/components/formautofill/FormAutofill{Child,Parent}.sys.mjs`) owns one `FormAutofillHandler` per form, stores identified field details in `#fieldDetails`, and always computes field details on the parent side. The child sends `FormAutofill:OnFieldsDetected`; the parent runs heuristics and replies with `onFieldsDetectedComplete`, at which point the child calls `handler.setIdentifiedFieldDetails()`. (2) `FormHandlerChild` (`toolkit/components/satchel/FormHandlerChild.sys.mjs`) is a shared per-window broker that listens to DOM form events and re-broadcasts them as `form-submission-detected` CustomEvents, but only when at least one consumer has called `registerFormSubmissionInterest`, tracked by `#hasRegisteredFormSubmissionInterest`. (3) `LoginManagerChild` (`toolkit/components/passwordmgr/LoginManagerChild.sys.mjs`) eagerly calls `registerFormSubmissionInterest` on `DOMFormHasPassword` and `DOMInputPasswordAdded` \\u2014 much earlier than the user's first focus on a credit card field. The `FormAutofill` actor registers for `form-submission-detected` with `createActor: false`, meaning it only receives the event if it already exists (e.g. due to a prior `focusin`). Once it exists, every `form-submission-detected` is routed to `FormAutofillChild.formSubmitted()`, regardless of whether FormAutofill itself triggered the registration.\", \"code_level_analysis\": \"The critical code path is as follows. `FormAutofillHandler.sys.mjs:149-156` \\u2014 the `fieldDetails` getter throws unconditionally if `#fieldDetails` is still `null`, which is exactly the error at line 151. `FormAutofillHandler.sys.mjs:1212-1223` \\u2014 `collectFormFilledData()` iterates `this.fieldDetails`, inheriting the throw. `FormAutofillChild.sys.mjs:842-893` \\u2014 `formSubmitted()` calls `handler.collectFormFilledData()` at line 875 with no guard for detection being in-flight; the only related guard (`#handlerWaitingForFormSubmissionComplete.has(handler)` at line 871) covers re-entrancy on the submission side, not the detection side. `FormAutofillChild.sys.mjs:301-310` \\u2014 focusing a CC field triggers `identifyFieldsWhenFocused`, which sends `FormAutofill:OnFieldsDetected` and stores the handler in `#handlerWaitingForDetectedComplete`; `setIdentifiedFieldDetails` is only called later in `onFieldsDetectedComplete` (line 129) after the parent replies. `FormHandlerChild.sys.mjs:90-95` \\u2014 `processDOMFormBeforeSubmitEvent` dispatches `form-submission-detected` unconditionally when `#hasRegisteredFormSubmissionInterest` is set. `LoginManagerChild.sys.mjs:1790-1802, 1898-1909` \\u2014 arms `FormHandlerChild` via `registerFormSubmissionInterest` on password-related events, well before FormAutofill focuses. In the happy path (confirmed via dump instrumentation), `setIdentifiedFieldDetails` always precedes `registerFormSubmissionInterest from=FormAutofill`, so the race is invisible in the test suite. The reporter's steps (temp profile + fast submission on a page with password fields) introduce both a slow parent reply (due to `InitStorage` + `updateSavedFieldNames`) and an already-armed `FormHandlerChild`, creating the necessary conditions to hit the race.\", \"root_cause\": \"The root cause is that `FormAutofillChild.formSubmitted()` calls `handler.collectFormFilledData()` without first checking whether the handler is still in `#handlerWaitingForDetectedComplete` (i.e. the parent has not yet returned the identified field details), so when another actor in the window has already armed `FormHandlerChild`'s submission detection \\u2014 typically `LoginManagerChild` on a page with a password field \\u2014 a fast submission delivers `form-submission-detected` to the FormAutofill actor before `setIdentifiedFieldDetails` has run, and the `fieldDetails` getter throws.\", \"suggested_options\": [{\"title\": \"Bail out early when detection is still in-flight\", \"description\": \"In `FormAutofillChild.formSubmitted()` (`FormAutofillChild.sys.mjs:865-879`), add an early-exit guard when the handler is still present in `#handlerWaitingForDetectedComplete`, mirroring the existing `#handlerWaitingForFormSubmissionComplete` guard. To avoid silently losing the doorhanger, the bail-out should also schedule the submission to be re-processed once `onFieldsDetectedComplete` resolves, e.g. by chaining off the stored resolver in `#handlerWaitingForDetectedComplete`.\", \"perspective\": \"hot-fix\"}, {\"title\": \"Await in-flight detection before processing submission\", \"description\": \"Make submission handling explicitly wait for the in-flight detection promise: in `formSubmitted`, if the handler has an entry in `#handlerWaitingForDetectedComplete`, await that promise (or its replacement) before calling `collectFormFilledData()`. This preserves the doorhanger in the slow-parent/new-profile scenario. Additionally, investigate whether the parent-side `FormAutofillParent.receiveMessage` serializes `InitStorage` and `OnFieldsDetected` on the same actor, and if so, decouple them so a slow storage init does not delay field detection replies.\", \"perspective\": \"long-term\"}, {\"title\": \"Defensive getter with telemetry to measure race prevalence\", \"description\": \"Change the `fieldDetails` getter to return an empty array (or a separate best-effort accessor) instead of throwing, eliminating the user-visible failure without requiring a reproduction. Pair this with telemetry that counts how often `formSubmitted` is called while `#handlerWaitingForDetectedComplete.has(handler)` is true, so the real prevalence of the race can be measured. This approach is recommended as a complement to whichever primary fix is chosen, given that the bug has not yet been reproduced in an automated test.\", \"perspective\": \"alternative\"}], \"mode\": \"no_repro\"}", "reply_text": null, "workflow_suggestion": {"step": "reply", "reason": "Duplicate confirmed — reply to close as duplicate."}, "fix_code": "From 4b3f35586495a24255b35d1ffba983a888bbae10 Mon Sep 17 00:00:00 2001\nFrom: Dimi <dlee@mozilla.com>\nDate: Thu, 28 May 2026 10:42:02 +0200\nSubject: [PATCH] auto-triage: fix for bug 2042690\n\n---\n .../formautofill/FormAutofillChild.sys.mjs         | 14 ++++++++++++++\n 1 file changed, 14 insertions(+)\n\ndiff --git a/toolkit/components/formautofill/FormAutofillChild.sys.mjs b/toolkit/components/formautofill/FormAutofillChild.sys.mjs\nindex c3b956cdd1c8c..8a6c7c952979e 100644\n--- a/toolkit/components/formautofill/FormAutofillChild.sys.mjs\n+++ b/toolkit/components/formautofill/FormAutofillChild.sys.mjs\n@@ -872,6 +872,20 @@ export class FormAutofillChild extends JSWindowActorChild {\n       return;\n     }\n \n+    if (this.#handlerWaitingForDetectedComplete.has(handler)) {\n+      // The parent has not yet returned the identified field details, so\n+      // handler.fieldDetails is not set. Defer the submission until detection\n+      // completes by chaining onto the stored resolver, which is invoked in\n+      // onFieldsDetectedComplete's finally block after setIdentifiedFieldDetails.\n+      const existingResolver =\n+        this.#handlerWaitingForDetectedComplete.get(handler);\n+      this.#handlerWaitingForDetectedComplete.set(handler, () => {\n+        existingResolver?.();\n+        this.formSubmitted(formElement, formSubmissionReason, handler);\n+      });\n+      return;\n+    }\n+\n     const formFilledData = handler.collectFormFilledData();\n     if (!formFilledData) {\n       this.debug(\"Form handler could not obtain filled data\");\n-- \n2.49.0", "fix_option_used": "{\"title\": \"Bail out early when detection is still in-flight\", \"description\": \"In `FormAutofillChild.formSubmitted()` (`FormAutofillChild.sys.mjs:865-879`), add an early-exit guard when the handler is still present in `#handlerWaitingForDetectedComplete`, mirroring the existing `#handlerWaitingForFormSubmissionComplete` guard. To avoid silently losing the doorhanger, the bail-out should also schedule the submission to be re-processed once `onFieldsDetectedComplete` resolves, e.g. by chaining off the stored resolver in `#handlerWaitingForDetectedComplete`.\"}", "patch_run_output": null, "test_commit_sha": "bf57c1dee71077f7129bfeada619c9461f8efb2b", "fix_commit_sha": "4b3f35586495a24255b35d1ffba983a888bbae10", "reproduce_script": null, "reproduce_result": null, "regression_range": null, "reproduce_strategy": {"data_type": "credit_card", "scenario": "doorhanger", "analysis": "This bug is about a race condition where submitting a credit card form too quickly in a new profile causes the save doorhanger to not appear. The issue occurs because storage initialization (FormAutofill:InitStorage) delays field detection processing, so when the form is submitted before the parent responds, the handler's fieldDetails haven't been set yet, causing an error and preventing the save dialog. Reproduction requires filling and submitting the form quickly, without any pre-saved credit card data (new profile scenario).", "prerequisites": [{"id": "autofill_data", "name": "Autofill test data loaded — Address and/or credit card test records must be pre-loaded into Firefox's FormAutofill storage before the test runs. Mark as needed when the bug involves saved addresses, saved credit cards, autofill dropdown, doorhanger, or fill action.", "needed": false}], "plan_steps": [{"text": "Navigate to https://rsolomakhin.github.io/autofill/"}, {"text": "Quickly fill in all credit card fields (card number, expiry, CVC, name) on the page as fast as possible"}, {"text": "Immediately click the submit button without pausing"}, {"text": "Take an OS screenshot", "expected_result": "No save-card doorhanger appears after form submission, and the browser console shows: 'Error: Should only use fieldDetails after setIdentifiedFieldDetails is called'"}]}, "export_meta": "{\"url\": \"https://dimidl.github.io/auto_triage/2042690.html\", \"branch\": \"master\", \"path\": \"auto_triage/2042690.html\", \"commit\": \"fca7a742b60d1d6684eb4cf7aaee81572fe4aa48\", \"pushed_at\": \"2026-05-28T09:02:06+00:00\"}", "dismissed": 0, "no_duplicate_confirmed": false, "classification": "bug", "is_regression": null, "regression_confidence": null, "platform_scope": "all-platforms", "affected_platforms": [], "component_correct": true, "component_notes": "The bug is in FormAutofillHandler and FormAutofillChild, which belong to Toolkit :: Form Autofill.", "suggested_severity": "S3", "severity_rationale": "Credit card saving fails silently under specific timing conditions on new profiles, but a workaround exists (fill the form more slowly); the feature works correctly otherwise.", "next_step": "ready-to-fix", "next_step_notes": "The race condition is well-diagnosed by the reporter and LLM analysis. A fix should ensure that form submission handling in FormAutofillChild waits for setIdentifiedFieldDetails to be called before accessing fieldDetails, or gracefully handles the uninitialized state.", "suggested_reply": null, "reporter_type": "mozilla-engineer", "similar": [{"id": 1433745, "summary": "Password manager should not pop in for debit card forms", "ai_summary": "The password manager's save-login doorhanger triggers on payment forms that use type='password' for CVV fields, because the heuristic does not distinguish payment card forms from login forms, leading to spurious save-password prompts.", "status": "RESOLVED", "resolution": "DUPLICATE", "severity": "normal", "score": 0.629, "traced_via": null}, {"id": 1647912, "summary": "OSX user authentication prompt displays when saving a card, doesn't accept password", "ai_summary": "On macOS, when saving a credit card after form submission, an OS-level authentication prompt appears unexpectedly and does not accept the correct admin password; additionally, the prompt is not gated by the `extensions.formautofill.reauth.enabled` preference, which defaults to false. Marked as duplicate of bug 1499241.", "status": "RESOLVED", "resolution": "DUPLICATE", "severity": "--", "score": 0.624, "traced_via": null}, {"id": 1897413, "summary": "[MX][www.liverpool.com.mx] Save CC doorhanger not displayed when submitting the CC form", "ai_summary": "On liverpool.com.mx, the credit card form submission is either not detected or the form is misclassified, resulting in the save-password doorhanger appearing instead of the expected save credit card doorhanger.", "status": "NEW", "resolution": "", "severity": "S3", "score": 0.611, "traced_via": null}, {"id": 1906843, "summary": "[AR][carrefour.com.ar]  Save Credit Card doorhanger  appears only after refreshing the page following the form submission", "ai_summary": "On carrefour.com.ar, the form submission event is not captured at the time of submission, so the save credit card doorhanger is deferred until a page refresh rather than appearing immediately.", "status": "NEW", "resolution": "", "severity": "N/A", "score": 0.61, "traced_via": null}, {"id": 1943277, "summary": "Ignore focus events that are dispatched during field clearing process", "ai_summary": "Bug 1883913 caused focus events to be dispatched for every field during the clearing process, which FormAutofillChild incorrectly processes as user-initiated focus events, requiring them to be suppressed during clearing just as they are during filling.", "status": "RESOLVED", "resolution": "FIXED", "severity": "--", "score": 0.61, "traced_via": null}, {"id": 1882311, "summary": "Clean up handling of form submission listeners in formautofill", "ai_summary": "This is a code cleanup patch addressing improper handling of form submission event listeners in the formautofill component, likely involving incorrect listener registration or teardown that could cause missed or duplicate submission detections.", "status": "RESOLVED", "resolution": "FIXED", "severity": "--", "score": 0.607, "traced_via": null}, {"id": 272595, "summary": "Does not offer to save passwords", "ai_summary": "After a specific code landing, the save-password dialog stopped appearing entirely for new login forms, preventing users from saving any new credentials.", "status": "RESOLVED", "resolution": "WORKSFORME", "severity": "major", "score": 0.606, "traced_via": null}, {"id": 1897168, "summary": "[KE][goodlife.co.ke] Credit Card doorhanger is not displayed upon form submit", "ai_summary": "On goodlife.co.ke, the credit card form submission is not detected by FormAutofill, so the save credit card doorhanger is never triggered after the user fills and submits the payment form.", "status": "NEW", "resolution": "", "severity": "S3", "score": 0.601, "traced_via": null}, {"id": 1895437, "summary": "FormAutofillChild should keep track of last submitted values", "ai_summary": "FormAutofillChild does not track previously submitted form values, so when multiple submission heuristics fire for the same form (e.g., both a form submit event and a page navigation), the save/update doorhanger is triggered multiple times for identical data.", "status": "NEW", "resolution": "", "severity": "N/A", "score": 0.601, "traced_via": null}, {"id": 2038928, "summary": "Warning: FormAutofill:onFieldsUpdatedComplete message can't access property \"fieldName\", fieldDetail is undefined`", "ai_summary": "When the FormAutofill:onFieldsUpdatedComplete message is dispatched, the code attempts to access fieldDetail.fieldName but fieldDetail is undefined in some code path, producing a console warning instead of failing gracefully or providing an actionable error.", "status": "NEW", "resolution": "", "severity": "--", "score": 0.599, "traced_via": null}, {"id": 1650961, "summary": "Restrict the clickjacking delay to credit card fields", "ai_summary": "The anti-clickjacking popup delay introduced for credit card fields was incorrectly applied to all form autofill dropdowns including username/password fields, requiring a guard to restrict the delay exclusively to credit card field popups.", "status": "VERIFIED", "resolution": "FIXED", "severity": "S2", "score": 0.596, "traced_via": null}, {"id": 409050, "summary": "Password Manager prompts in the parent window for the password entered in the child(new) window", "ai_summary": "When a form is submitted in a child window, the 'save password' notification bar is incorrectly attached to the parent window's chrome rather than the child window, because the prompter resolves the target browser window using
