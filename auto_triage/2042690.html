.repro-ana-step-row:hover { background: var(--color-bg-subtle); }
.repro-ana-step-row:hover .repro-ana-step-del { opacity: 1; }
.repro-ana-step-row.step-dragging { opacity: 0.35; }
.repro-ana-step-row.step-drop-before { border-top: 2px solid #3b82f6; }
.repro-ana-step-row.step-drop-after  { border-bottom: 2px solid #3b82f6; }
.drag-handle {
  flex-shrink: 0; margin-top: 2px; line-height: 1; padding: 1px 0;
  font-size: 0.9rem; color: var(--color-border-light); cursor: grab; user-select: none;
  opacity: 0; transition: opacity var(--transition), color var(--transition);
}
.repro-ana-step-row:hover .drag-handle { opacity: 1; }
.drag-handle:active { cursor: grabbing; }
.repro-ana-step-num {
  min-width: 17px; height: 17px; border-radius: 50%; background: var(--color-border);
  font-size: 0.6rem; font-weight: 800; color: var(--color-text-muted);
  display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 2px;
}
.repro-ana-step-body {
  flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 2px;
}
.repro-ana-step-text {
  font-size: 0.74rem; color: #475569; line-height: 1.55;
  outline: none; border-radius: 3px; padding: 1px 3px; word-break: break-word;
}
.repro-ana-step-expected {
  font-size: 0.68rem; color: var(--color-text-muted); line-height: 1.45;
  outline: none; border-radius: 3px; padding: 1px 3px 1px 6px;
  border-left: 2px solid #bfdbfe; word-break: break-word;
}
.repro-ana-step-expected:empty::before {
  content: attr(data-placeholder); color: var(--color-border-light); pointer-events: none;
}
.repro-ana-step-expected:focus { background: var(--color-bg-subtle); box-shadow: 0 0 0 1px #bfdbfe; }
.repro-ana-step-expected--empty { opacity: 0; max-height: 0; padding: 0; overflow: hidden; }
.repro-ana-step-expected--empty:focus { opacity: 1; max-height: none; padding: 1px 3px 1px 6px; overflow: visible; }
.repro-ana-step-text:focus {
  background: #eff6ff; box-shadow: 0 0 0 1px #93c5fd; color: var(--color-text);
}
.repro-ana-step-text:focus ~ .repro-ana-step-num,
.repro-ana-step-row:has(.repro-ana-step-text:focus) .repro-ana-step-num {
  background: #bfdbfe; color: var(--color-primary-hover);
}
.repro-ana-step-del {
  background: none; border: none; cursor: pointer; padding: 2px 4px;
  border-radius: 3px; font-size: 0.72rem; color: var(--color-border-light);
  opacity: 0; transition: opacity var(--transition); flex-shrink: 0; line-height: 1; margin-top: 2px;
}
.repro-ana-step-del:hover { color: #ef4444; background: #fef2f2; }
.repro-ana-step-actions {
  display: flex; gap: 6px; margin-top: 5px;
}
.repro-ana-step-add {
  display: flex; align-items: center; flex: 1;
  padding: 4px 6px; border: 1px dashed #bfdbfe; border-radius: 5px;
  background: transparent; color: var(--color-primary); font-size: 0.71rem; font-weight: 600;
  cursor: pointer; justify-content: center;
}
.repro-ana-step-add:hover { background: #eff6ff; }
.repro-ana-step-add--checkpoint {
  border-color: #a7f3d0; color: #059669;
}
.repro-ana-step-add--checkpoint:hover { background: #ecfdf5; }

.repro-plan-timeline { margin-top: 16px; padding-top: 14px; border-top: 1px solid var(--color-border); }

/* ── Timeline + Chrome side column layout ─────────────────────────── */
.repro-timeline-wrap { display: flex; align-items: flex-start; gap: 0; }
.repro-timeline-wrap .repro-timeline { flex: 1; min-width: 0; }
.repro-tl-sep { width: 1px; background: var(--color-border); align-self: stretch; flex-shrink: 0; margin: 0 8px; }
.repro-chrome-col { display: flex; flex-direction: column; align-items: center; gap: 2px; flex-shrink: 0; min-width: 64px; }
.rcc-head { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: .05em; color: var(--color-text-faint); padding: 4px 0 2px; }
.repro-chrome-node { border-radius: 6px; }
.repro-chrome-node .repro-tl-dot { border-color: #93c5fd; }

/* ── Execution plan section (inside strategy result) ──────────────── */
.repro-plan-section { border-top: 1px solid var(--color-border); padding-top: 10px; }
.repro-plan-label { font-size: 11px; font-weight: 700; color: var(--color-text-muted); text-transform: uppercase; letter-spacing: .04em; margin-bottom: 6px; }
.repro-plan-list { margin: 0; padding-left: 20px; display: flex; flex-direction: column; gap: 4px; }
.repro-plan-item { font-size: 12px; color: var(--color-text); line-height: 1.5; }

/* ── Run report drawer ─────────────────────────────────────────────── */
.repro-drawer {
  margin-top: 10px;
  border: 1px solid #93c5fd;
  border-radius: 8px;
  background: #fff;
  padding: 10px 12px;
  position: relative;
}
.repro-drawer::before {
  content: '';
  position: absolute;
  top: -7px; left: 50%; transform: translateX(-50%);
  border-left: 6px solid transparent;
  border-right: 6px solid transparent;
  border-bottom: 7px solid #93c5fd;
}
.repro-drawer::after {
  content: '';
  position: absolute;
  top: -5px; left: 50%; transform: translateX(-50%);
  border-left: 5px solid transparent;
  border-right: 5px solid transparent;
  border-bottom: 6px solid #fff;
}
.repro-drawer-head {
  display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;
}
.repro-drawer-title { font-size: 12px; font-weight: 700; color: var(--color-text); }
.repro-drawer-date { font-size: 10px; color: var(--color-text-faint); margin-top: 8px; }
/* Screenshot thumbnail */
.repro-drawer-thumb {
  width: 100%; margin: 0 0 8px;
  border-radius: 5px; overflow: hidden; border: 1px solid var(--color-border);
  cursor: pointer; background: var(--color-bg-raised);
}
.repro-drawer-thumb img { display: block; width: 100%; height: auto; max-height: 800px; object-fit: contain; }
.repro-drawer-thumb:hover { border-color: #93c5fd; }
/* Inline screenshot inside a checkpoint row */
.repro-drawer-step-thumb {
  width: 100%; margin-top: 6px;
  border-radius: 4px; overflow: hidden; border: 1px solid var(--color-border);
  cursor: pointer; background: var(--color-bg-raised);
}
.repro-drawer-step-thumb img { display: block; width: 100%; height: auto; max-height: 600px; object-fit: contain; }
.repro-drawer-step-thumb:hover { border-color: #93c5fd; }
/* Verify checkpoints */
.repro-drawer-steps-label {
  font-size: 11px; font-weight: 700; color: var(--color-text-muted); text-transform: uppercase;
  letter-spacing: .05em; margin-bottom: 6px;
}
.repro-drawer-steps { display: flex; flex-direction: column; gap: 1px; }
.repro-drawer-step {
  display: flex; align-items: flex-start; gap: 8px;
  padding: 7px 0; border-bottom: 1px solid var(--color-bg-raised);
}
.repro-drawer-step:last-child { border-bottom: none; }
.repro-drawer-step-num {
  min-width: 20px; height: 20px; border-radius: 50%;
  font-size: 0.65rem; font-weight: 800;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; margin-top: 1px;
}
.repro-drawer-step-num--pass    { background: #dcfce7; color: #15803d; }
.repro-drawer-step-num--fail    { background: #fee2e2; color: #b91c1c; }
.repro-drawer-step-num--blocked { background: #fef9c3; color: #854d0e; }
.repro-drawer-step-body { flex: 1; min-width: 0; }
.repro-drawer-step-title {
  font-size: 12px; font-weight: 600; color: var(--color-text);
  display: flex; align-items: center; flex-wrap: wrap; gap: 4px; line-height: 1.4;
}
.repro-drawer-step-obs { font-size: 11px; color: var(--color-text-muted); margin-top: 3px; line-height: 1.5; font-style: italic; }
.repro-drawer-step-expected { font-size: 11px; color: var(--color-text-faint); margin-top: 2px; line-height: 1.45; }
/* Step badges */
.repro-drawer-step-badge {
  font-size: 0.68rem; font-weight: 700; padding: 1px 6px; border-radius: 8px; white-space: nowrap;
}
.repro-drawer-step-badge--pass    { background: #dcfce7; color: #15803d; }
.repro-drawer-step-badge--fail    { background: #fee2e2; color: #b91c1c; }
.repro-drawer-step-badge--blocked { background: #fef9c3; color: #854d0e; }
/* AI-blocked notice */
.repro-drawer-blocked {
  background: #fef9c3; border: 1px solid #fde68a; border-radius: 5px;
  padding: 6px 8px; font-size: 10px; color: #854d0e; margin-top: 4px;
}
/* Timeline dot: run status colors */
.repro-tl-dot.reproduced     { background: var(--color-success); border-color: #15803d; box-shadow: 0 0 6px var(--color-success)88; }
.repro-tl-dot.not-reproduced { background: var(--color-danger); border-color: #b91c1c; box-shadow: 0 0 6px var(--color-danger)88; }
.repro-tl-dot.run-error      { background: #fde68a; border-color: var(--color-warning); }
/* Timeline node: status text row */
.repro-tl-status             { font-size: 9px; font-weight: 600; text-align: center; min-height: 13px; }
.repro-tl-status.s-repro     { color: var(--color-success); }
.repro-tl-status.s-not-repro { color: var(--color-danger); }
.repro-tl-status.s-error     { color: var(--color-warning); }

/* Database explorer */
.db-explorer {
  display: flex; height: calc(100vh - 120px); overflow: hidden;
}
.db-table-list {
  width: 200px; flex-shrink: 0; border-right: 1px solid var(--color-border);
  overflow-y: auto; padding: 8px 0;
}
.db-table-btn {
  width: 100%; text-align: left; padding: 7px 14px;
  display: flex; align-items: center; justify-content: space-between;
  cursor: pointer; border: none; background: transparent;
  font-size: 0.78rem; color: #475569; transition: background var(--transition);
  border-radius: 0;
}
.db-table-btn:hover { background: var(--color-bg-raised); }
.db-table-btn.active { background: #eff6ff; color: var(--color-primary-hover); font-weight: 600; }
.db-table-name { font-family: ui-monospace, monospace; }
.db-row-count {
  font-size: 0.68rem; color: var(--color-text-faint); background: var(--color-bg-raised);
  padding: 1px 5px; border-radius: 8px;
}
.db-table-btn.active .db-row-count { background: #dbeafe; color: #3b82f6; }
.db-detail {
  flex: 1; overflow-y: auto; padding: 16px 20px;
}
.db-detail-empty { color: #9ca3af; font-style: italic; font-size: 0.82rem; padding: 12px 0; }
.db-detail-header {
  display: flex; align-items: baseline; gap: 10px; margin-bottom: 14px;
}
.db-detail-title {
  font-size: 1rem; font-weight: 700; color: var(--color-text);
  font-family: ui-monospace, monospace;
}
.db-detail-count { font-size: 0.75rem; color: var(--color-text-muted); }
.db-schema-section, .db-data-section { margin-bottom: 20px; }
.db-section-label {
  font-size: 0.68rem; font-weight: 700; letter-spacing: 0.07em;
  text-transform: uppercase; color: var(--color-text-faint); margin-bottom: 6px;
}
.db-section-hint { font-weight: 400; text-transform: none; letter-spacing: 0; color: var(--color-border-light); }
.db-schema-table { border-collapse: collapse; font-size: 0.78rem; }
.db-schema-table td { padding: 3px 10px 3px 0; vertical-align: middle; }
.db-col-name { font-family: ui-monospace, monospace; color: var(--color-text); font-weight: 600; }
.db-col-type { color: #6366f1; font-family: ui-monospace, monospace; }
.db-col-pk { color: #f59e0b; font-size: 0.65rem; font-weight: 700; padding-right: 6px; }
.db-col-nn { color: var(--color-text-faint); font-size: 0.7rem; }
.db-data-wrap { overflow-x: auto; }
.db-data-table { border-collapse: collapse; font-size: 0.75rem; white-space: nowrap; }
.db-data-table th { background: var(--color-bg-subtle); color: #475569; font-weight: 700;
  padding: 5px 10px; border: 1px solid var(--color-border); text-align: left;
  font-family: ui-monospace, monospace; font-size: 0.68rem; }
.db-cell { padding: 4px 10px; border: 1px solid var(--color-bg-raised); color: #334155;
  max-width: 260px; overflow: hidden; text-overflow: ellipsis; }
.db-data-table tbody tr:nth-child(even) .db-cell { background: var(--color-bg-subtle); }
.db-null { color: var(--color-border-light); font-style: italic; }
.db-empty-row { color: #9ca3af; font-style: italic; font-size: 0.8rem; padding: 8px 0; }

/* Settings panel */
.settings-panel {
  max-width: 640px;
  padding: 24px;
  background: var(--color-bg-subtle);
  min-height: 100%;
}
.settings-section {
  margin-bottom: 28px;
}
.settings-section-title {
  font-size: 13px;
  font-weight: 600;
  color: var(--color-text);
  margin-bottom: 12px;
  padding-bottom: 6px;
  border-bottom: 1px solid var(--color-border);
}
.settings-row {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 10px;
}
.settings-label {
  width: 160px;
  flex-shrink: 0;
}
.settings-meta {
  font-size: 11px;
  color: var(--color-text-faint);
  min-width: 0;
  max-width: 220px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

/* ── Settings group cards ────────────────────────────────────── */
.settings-group-card {
  border: 1px solid var(--color-border);
  border-radius: 8px;
  margin-bottom: 16px;
  overflow: hidden;
  background: #fff;
  box-shadow: 0 1px 4px rgba(0,0,0,.07);
}
.settings-group-header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 16px;
  background: var(--color-bg-subtle);
  border-bottom: 1px solid var(--color-border);
  font-size: 11px;
  font-weight: 700;
  letter-spacing: .05em;
  text-transform: uppercase;
  color: var(--color-text-muted);
}
.settings-group-accent {
  width: 3px;
  height: 14px;
  border-radius: 2px;
  flex-shrink: 0;
}
.settings-group-body {
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 14px;
}
/* ── Prerequisites rows ─────────────────────────────────────── */
.prereq-group-label {
  font-size: 0.68rem;
  font-weight: 700;
  letter-spacing: .07em;
  text-transform: uppercase;
  color: var(--color-text-faint);
  padding-bottom: 4px;
}
.prereq-row {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 8px 0;
  border-bottom: 1px solid var(--color-border);
}
.prereq-status {
  font-size: 0.85rem;
  width: 16px;
  flex-shrink: 0;
  margin-top: 1px;
  font-weight: 700;
}
.prereq-info { flex: 1; min-width: 0; }
.prereq-name {
  font-size: 0.82rem;
  font-weight: 600;
  color: var(--color-text);
}
.prereq-desc {
  font-size: 0.74rem;
  color: var(--color-text-faint);
  margin-top: 1px;
}
.prereq-right {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 5px;
  flex-shrink: 0;
}
.prereq-panels {
  font-size: 0.72rem;
  color: var(--color-text-muted);
  text-align: right;
  line-height: 1.4;
}
.prereq-hint-cmd {
  font-family: ui-monospace, "SF Mono", Menlo, monospace;
  font-size: 0.72rem;
  background: var(--color-bg-raised);
  border: 1px solid var(--color-border);
  padding: 2px 7px;
  border-radius: 4px;
  color: var(--color-text-muted);
  white-space: nowrap;
}

.settings-debug-toggle {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 10px 0;
  font-size: 12px;
  color: var(--color-text-faint);
  cursor: pointer;
  border-top: 1px solid var(--color-border);
  margin-top: 4px;
  user-select: none;
}
.settings-debug-toggle:hover { color: var(--color-text-muted); }
.bz-accordion-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 12px;
  background: var(--color-bg-subtle);
  border: 1px solid var(--color-border);
  border-radius: 6px;
  cursor: pointer;
  font-size: 12px;
  font-weight: 600;
  color: var(--color-text);

<script>
// ── Generic panel inner-tab presenter ────────────────────────────────────────
function switchPanelTab(tabEl) {
  const nav = tabEl.closest('.panel-nav');
  nav.querySelectorAll('.panel-nav__tab').forEach(t => t.classList.remove('panel-nav__tab--active'));
  tabEl.classList.add('panel-nav__tab--active');
  const navId = nav.dataset.navId;
  const paneId = tabEl.dataset.paneId;
  const panes = document.querySelector(`.panel-panes[data-nav-id="${navId}"]`);
  if (!panes) return;

  const target = panes.querySelector(`.panel-pane[data-pane-id="${paneId}"]`);
  if (target) target.classList.add('panel-pane--active');
}

function activatePanelTab(navId, paneId) {
  const tab = document.querySelector(`.panel-nav[data-nav-id="${navId}"] .panel-nav__tab[data-pane-id="${paneId}"]`);
  if (tab) switchPanelTab(tab);
}

function switchTab(name) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.sidebar-item').forEach(i => i.classList.remove('active'));
  const panel = document.getElementById('tab-' + name);
  const nav = document.getElementById('nav-' + name);
  if (panel) panel.classList.add('active');
  if (nav) nav.classList.add('active');
  history.replaceState(null, '', '#' + name);
  if (name === 'prompts') loadPrompts();
  if (name === 'database') loadDb();
  if (name === 'settings') { loadInvestigationTip(); }
  if (name === 'modules') loadModules();

// ── My Issues ──────────────────────────────────────────────────
let MY_ISSUES = [];
let MY_ISSUES_DATA = {};

// ── Duplicate selections: sourceId → Set of duplicate bugIds ───
const MARKED_DUPS = {};
let _activeTask = null;  // { sessionId: string|null, abort: AbortController }

async function streamSSE(url, onEvent, fetchOpts = {}, bugTabKey = null) {
  const abort = new AbortController();
  _activeTask = { sessionId: null, abort };
  let runEl = null;
  if (bugTabKey) {
    const [bugId, tab] = bugTabKey;
    const nodeId = _getNodeIdForTab(bugId, tab);
    runEl = nodeId ? document.getElementById(nodeId) : null;
    if (runEl) runEl.classList.add(runEl.classList.contains('skt-sub-node') ? 'skt-sub-running' : 'skt-running');
  }
  try {
    const res = await fetch(url, { method: 'POST', ...fetchOpts, signal: abort.signal });
    if (!res.ok) {
      const data = await res.json().catch(() => ({}));
      throw Object.assign(new Error(data.detail || `HTTP ${res.status}`), { httpError: true });
    }
    const reader = res.body.getReader();
    const dec = new TextDecoder();
    let buf = '';
    while (true) {
      const { value, done } = await reader.read();
      if (done) break;
      buf += dec.decode(value, { stream: true });
      const parts = buf.split('\n\n');
      buf = parts.pop();
      for (const part of parts) {
        if (!part.startsWith('data: ')) continue;
        let ev;
        try { ev = JSON.parse(part.slice(6)); } catch { continue; }
        if (ev.session_id && _activeTask) _activeTask.sessionId = ev.session_id;
        await onEvent(ev);
      }
    }
  } catch(e) {
    if (e.name === 'AbortError') { await onEvent({cancelled: true}); return; }
    throw e;
  } finally {
    if (_activeTask?.abort === abort) _activeTask = null;
    if (runEl) runEl.classList.remove('skt-running', 'skt-sub-running');
  }
}

async function loadMyIssues() {
  try {
    const res = await fetch('/my-issues');
    if (res.ok) {
      const data = await res.json();
      MY_ISSUES = data.bugs || [];
      MY_ISSUES_DATA = Object.fromEntries(MY_ISSUES.map(b => [b.id, b]));
      renderMyIssues();
      syncMyIssueButtons();
    }
  } catch(e) {}
}

function syncMyIssueButtons() {
  document.querySelectorAll('.btn-add-my-issue').forEach(btn => {
    if (MY_ISSUES_DATA[parseInt(btn.dataset.bugId)]) btn.style.display = 'none';
  });
}

function renderMyIssueCard(bug) {
  return renderBugCard(bug, 'my-issues');
}

function renderMyIssues() {
  const container = document.getElementById('my-issues-list');
  if (!container) return;
  const badge = document.getElementById('badge-my-issues');
  if (badge) badge.textContent = MY_ISSUES.length || '0';

  if (MY_ISSUES.length === 0) {
    container.innerHTML = '<div class="empty-queue">No bugs added yet. Click <strong>+ Add Bug</strong> to track a bug here.</div>';
    return;
  }
  container.innerHTML =
    `<div class="bug-grid">${MY_ISSUES.map(renderMyIssueCard).join('')}</div>
     <div class="detail-panel" id="detail-panel-my-issues" style="display:none">
       <div class="detail-content" id="detail-content-my-issues"></div>
     </div>`;
}

function selectMyIssueCard(bugId, cardEl) {
  document.querySelectorAll('#tab-my-issues .bug-card.selected').forEach(c => c.classList.remove('selected'));
  const panel = document.getElementById('detail-panel-my-issues');
  const content = document.getElementById('detail-content-my-issues');
  if (!panel || !content) return;
  if (panel.dataset.openId == bugId && panel.style.display !== 'none') {
    panel.style.display = 'none';
    panel.dataset.openId = '';
    return;
  }
  cardEl.classList.add('selected');
  panel.dataset.openId = bugId;
  panel.style.display = 'block';
  content.innerHTML = renderDetail(MY_ISSUES_DATA[bugId]);
  updateSkillTreeNode(bugId, 'summary');
  highlightTestCode(bugId);
  initSectionContent(bugId);
  panel.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  maybeBootstrapSuggestion(bugId, MY_ISSUES_DATA);
}

function toggleAddBugInput() {
  const row = document.getElementById('add-bug-row');
  const visible = row.style.display !== 'none';
  row.style.display = visible ? 'none' : 'flex';
  if (!visible) setTimeout(() => document.getElementById('add-bug-number').focus(), 50);
}

async function addMyIssue() {
  const input = document.getElementById('add-bug-number');
  const btn = document.getElementById('add-bug-submit');
  const bugId = parseInt(input.value.trim());
  if (!bugId) return;

  btn.disabled = true;
  btn.textContent = 'Adding…';
  try {
    const res = await fetch(`/my-issues/${bugId}`, { method: 'POST' });
    const data = await res.json();
    if (res.ok && data.status === 'added') {
      MY_ISSUES.push(data.bug);
      MY_ISSUES_DATA[data.bug.id] = data.bug;
      renderMyIssues();
      input.value = '';
      toggleAddBugInput();
    } else if (data.status === 'already_exists') {
      btn.textContent = 'Already added';
      setTimeout(() => { btn.textContent = 'Add'; btn.disabled = false; }, 1500);
      return;
    } else {
      btn.textContent = 'Not found';
      setTimeout(() => { btn.textContent = 'Add'; btn.disabled = false; }, 1500);
      return;
    }
  } catch(e) {
    btn.textContent = 'Error';
    setTimeout(() => { btn.textContent = 'Add'; btn.disabled = false; }, 1500);
    return;
  }
  btn.textContent = 'Add';
  btn.disabled = false;
}

async function createWorktree(bugId, btn) {
  btn.disabled = true;
  const orig = btn.textContent;
  btn.textContent = 'Creating…';
  showConsolePanel(`git worktree add -b ${bugId} ../${bugId} --track origin/bookmarks/central`);
  try {
    await streamSSE(`/my-issues/${bugId}/worktree`, async (ev) => {
      if (ev.line !== undefined) {
        appendConsoleLines(ev.line, ev.type || 'normal');
      } else if (ev.error) {
        appendConsoleLines(ev.detail || 'Error', 'error');
        setConsolePanelStatus('Failed', 'error');
        btn.textContent = 'Failed';
        btn.title = ev.detail || '';
        setTimeout(() => { btn.textContent = orig; btn.disabled = false; btn.title = ''; }, 3000);
      } else if (ev.done) {
        const existed = ev.status === 'already_exists';
        const label = existed
          ? (ev.claude_md ? 'CLAUDE.md updated' : 'Already exists')
          : (ev.claude_md ? 'Created + CLAUDE.md' : 'Created');
        setConsolePanelStatus(label, 'success');
        btn.textContent = existed
          ? (ev.claude_md ? '✓ CLAUDE.md updated' : 'Already exists')
          : (ev.claude_md ? '✓ Created + CLAUDE.md' : '✓ Created');
        btn.title = ev.path || '';
        setTimeout(() => { btn.textContent = orig; btn.disabled = false; btn.title = ''; }, 2500);
      }
    });
  } catch(e) {
    appendConsoleLines(e.message || 'Network error', 'error');
    setConsolePanelStatus('Error', 'error');
    btn.textContent = 'Error';
    setTimeout(() => { btn.textContent = orig; btn.disabled = false; }, 3000);
  }
}

function showConsolePanel(command, title) {
  const panel = document.getElementById('console-panel');
  const body = document.getElementById('console-panel-body');
  const footer = document.getElementById('console-panel-footer');
  const titleEl = document.getElementById('console-panel-title');
  if (titleEl) titleEl.textContent = title || 'Worktree Log';
  body.innerHTML = `<div class="console-line console-cmd"><span class="console-prompt">$</span> ${escHtml(command)}</div>`;
  footer.innerHTML = '<span class="console-dot console-dot-running">●</span><span class="console-status-text">Running…</span><button class="console-cancel-btn" onclick="cancelActive()">Cancel</button>';
  panel.classList.remove('minimized');
  panel.style.display = 'block';
  const btn = document.getElementById('console-panel-minimize');
  if (btn) btn.textContent = '_';
  updateConsoleRestoreBtn();
}

function cancelActive() {
  if (!_activeTask) return;
  const { sessionId, abort } = _activeTask;
  _activeTask = null;
  abort.abort();
  if (sessionId) fetch(`/task/${sessionId}/cancel`, { method: 'POST' }).catch(() => {});
  setConsolePanelStatus('Cancelled', 'warn');
}

function appendConsoleLines(text, type) {
  const body = document.getElementById('console-panel-body');
  text.split('\n').filter(l => l.trim()).forEach(line => {
    const div = document.createElement('div');
    div.className = `console-line console-line-${type}`;
    div.textContent = line;
    body.appendChild(div);
  });
  body.scrollTop = body.scrollHeight;
}

function setConsolePanelStatus(label, type) {
  const footer = document.getElementById('console-panel-footer');
  const dotClass = type === 'success' ? 'console-dot-success'
                 : type === 'error'   ? 'console-dot-error'
                 : type === 'warn'    ? 'console-dot-warn'
                 : 'console-dot-running';
  footer.innerHTML = `<span class="console-dot ${dotClass}">●</span><span class="console-status-text">${escHtml(label)}</span>`;
  const restoreDot = document.getElementById('console-restore-dot');
  if (restoreDot) { restoreDot.className = `console-dot ${dotClass}`; }
}

function updateConsoleRestoreBtn() {
  const btn   = document.getElementById('console-restore-btn');
  const panel = document.getElementById('console-panel');
  const body  = document.getElementById('console-panel-body');
  if (!btn) return;
  const hidden     = !panel || panel.style.display === 'none';
  const hasContent = body && body.children.length > 0;
  btn.style.display = (hidden && hasContent) ? 'flex' : 'none';
}

function copyConsoleOutput(btn) {
  const body = document.getElementById('console-panel-body');
  if (!body) return;
  const text = Array.from(body.querySelectorAll('.console-line'))
    .map(el => el.textContent)
    .join('\n');
  navigator.clipboard.writeText(text).then(() => {
    const orig = btn.title;
    btn.title = 'Copied!';
    setTimeout(() => { btn.title = orig; }, 1500);
  }).catch(() => {});
}

function closeConsolePanel() {
  const panel = document.getElementById('console-panel');
  if (panel) panel.style.display = 'none';
  updateConsoleRestoreBtn();
}

function toggleMinimizeConsolePanel(event) {
  const panel = document.getElementById('console-panel');
  if (!panel) return;
  panel.classList.toggle('minimized');
  const btn = document.getElementById('console-panel-minimize');
  if (btn) btn.textContent = panel.classList.contains('minimized') ? '▲' : '_';
}

function restoreConsolePanel() {
  const panel = document.getElementById('console-panel');
  if (!panel) return;
  panel.style.display = 'block';
  panel.classList.remove('minimized');
  const btn = document.getElementById('console-panel-minimize');
  if (btn) btn.textContent = '_';
  updateConsoleRestoreBtn();
}

(function initConsolePanelResize() {
  const STORAGE_KEY = 'consolePanelSize';
  const MIN_BH = 80, MIN_W = 320;
  // Panel is anchored bottom:20px right:20px.
  // Dragging the top-left corner changes width and body height independently.
  // Width  grows leftward:  w  = viewport.width  - 20 - mouseX
  // Height grows upward:    bh = viewport.height - 20 - mouseY - header.h - footer.h

  function applySize(panel, w, bh) {
    panel.style.width = w + 'px';
    const body = panel.querySelector('.console-panel-body');
    if (body) body.style.height = bh + 'px';
  }

  function loadSize(panel) {
    try {
      const s = JSON.parse(localStorage.getItem(STORAGE_KEY) || 'null');
      if (s && s.w >= MIN_W && s.bh >= MIN_BH) applySize(panel, s.w, s.bh);
    } catch(e) {}
  }

  function saveSize(w, bh) {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify({w, bh})); } catch(e) {}
  }

  document.addEventListener('DOMContentLoaded', () => {
    const handle = document.getElementById('console-resize-handle');
    const panel  = document.getElementById('console-panel');
    if (!handle || !panel) return;

    loadSize(panel);

    handle.addEventListener('mousedown', e => {
      e.preventDefault();
      e.stopPropagation();

      const header = panel.querySelector('.console-panel-header');
      const footer = panel.querySelector('.console-panel-footer');

      const onMove = ev => {
        const w  = Math.max(MIN_W, window.innerWidth  - 20 - ev.clientX);
        const reservedH = (header ? header.offsetHeight : 0) + (footer ? footer.offsetHeight : 0);
        const bh = Math.max(MIN_BH, window.innerHeight - 20 - ev.clientY - reservedH);
        applySize(panel, w, bh);
      };
      const onUp = () => {
        document.removeEventListener('mousemove', onMove);
        document.removeEventListener('mouseup', onUp);
        const body = panel.querySelector('.console-panel-body');
        saveSize(panel.offsetWidth, body ? body.offsetHeight : 360);
      };
      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup', onUp);
    });
  });
})();

async function addToMyIssues(bugId, btn) {
  btn.disabled = true;
  const orig = btn.textContent;
  btn.textContent = 'Adding…';
  try {
    const res = await fetch(`/my-issues/${bugId}`, { method: 'POST' });
    const data = await res.json();
    if (res.ok && data.status === 'added') {
      MY_ISSUES.push(data.bug);
      MY_ISSUES_DATA[data.bug.id] = data.bug;
      renderMyIssues();
      syncMyIssueButtons();
    } else if (data.status === 'already_exists') {
      btn.textContent = 'Already tracking';
      setTimeout(() => { btn.textContent = orig; btn.disabled = false; }, 2000);
    } else {
      btn.textContent = 'Error';
      setTimeout(() => { btn.textContent = orig; btn.disabled = false; }, 2000);
    }
  } catch(e) {
    btn.textContent = 'Error';
    setTimeout(() => { btn.textContent = orig; btn.disabled = false; }, 2000);
  }
}

async function removeMyIssue(bugId, btn) {
  btn.disabled = true;
  try {
    const res = await fetch(`/my-issues/${bugId}`, { method: 'DELETE' });
    if (res.ok) {
      MY_ISSUES = MY_ISSUES.filter(b => b.id !== bugId);
      delete MY_ISSUES_DATA[bugId];
      renderMyIssues();
    } else { btn.disabled = false; }
  } catch(e) { btn.disabled = false; }
}

<script>
function selectCard(bugId, cardEl) {

function selectUpdatedCard(bugId, cardEl) {

async function dismissBug(bugId, btn) {
  btn.disabled = true;
  btn.textContent = 'Dismissing…';
  try {
    const r = await fetch(`/bug/${bugId}/dismiss`, { method: 'POST' });
    if (!r.ok) { btn.textContent = 'Error'; btn.disabled = false; return; }
    // Remove the card from the DOM
    const card = document.getElementById(`card-updated-${bugId}`);

  } catch(e) {

// Auto-generate a workflow suggestion when none exists yet.
function maybeBootstrapSuggestion(bugId, store) {
  const b = store[bugId];
  if (!b || (b.workflow_suggestion && b.workflow_suggestion.step)) return;
  fetch(`/bug/${bugId}/workflow-suggestion`, { method: 'POST',
    headers: {'Content-Type': 'application/json'}, body: '{}' })
    .then(r => r.ok ? r.json() : null)
    .then(suggestion => {
      if (!suggestion || !suggestion.step) return;
      _dispatchWorkflowSuggestion(bugId, suggestion);
    })
    .catch(() => {});
}

// Re-render just the skill tree + guide card for a bug after AI state changes.
function refreshSkillTreeArea(bugId) {
  const area = document.getElementById(`skt-area-${bugId}`);
  if (!area) return;
  const b = BUGS[bugId] || UPDATED_BUGS[bugId]
         || (typeof MY_ISSUES_DATA !== 'undefined' ? MY_ISSUES_DATA[bugId] : null);
  if (!b) return;
  area.outerHTML = renderSkillTree(b);
}

// Dispatch when workflow_suggestion changes — skill tree observes and re-renders itself.
function _dispatchWorkflowSuggestion(bugId, suggestion) {
  const store = BUGS[bugId] || UPDATED_BUGS[bugId]
             || (typeof MY_ISSUES_DATA !== 'undefined' ? MY_ISSUES_DATA[bugId] : null);
  if (store) store.workflow_suggestion = suggestion;
  document.dispatchEvent(new CustomEvent('workflowsuggestionchange', { detail: { bugId } }));
}
document.addEventListener('workflowsuggestionchange', ({ detail: { bugId } }) => {
  refreshSkillTreeArea(bugId);
});

// When root_cause or fix_code change, re-render the dependent tab buttons so
// their enabled/disabled state reflects the new data without a page reload.
const _TAB_BTN_DEPS = { root_cause: ['fix'], fix_code: ['review', 'ci'] };
document.addEventListener('bugdatachanged', ({ detail: { bugId, field } }) => {
  refreshSkillTreeArea(bugId);
  const b = BUGS[bugId] || UPDATED_BUGS[bugId]
         || (typeof MY_ISSUES_DATA !== 'undefined' ? MY_ISSUES_DATA[bugId] : null);
  if (!b) return;
  for (const tab of (_TAB_BTN_DEPS[field] || [])) {
    const btn = document.getElementById(`stab-${tab}-${bugId}`);
    if (btn) btn.outerHTML = _TAB_BTN[tab](b);
  }
});

// Dispatch when a bug data field changes — each panel observes the fields it owns.
function _dispatchBugDataChanged(bugId, field) {
  document.dispatchEvent(new CustomEvent('bugdatachanged', { detail: { bugId, field } }));
}

function toggleClearAIMenu(caretBtn) {
  const menu = caretBtn.closest('.clear-ai-menu');
  const dropdown = menu.querySelector('.clear-ai-dropdown');
  const isOpen = dropdown.classList.contains('open');
  // Close any other open dropdowns (clear-ai siblings AND rootcause menu).
  document.querySelectorAll('.clear-ai-dropdown.open').forEach(d => d.classList.remove('open'));
  document.querySelectorAll('[id^="rootcause-menu-"]').forEach(d => {
    if (d.style.display === 'block') d.style.display = 'none';

    dropdown.classList.add('open');

        }

}

async function clearBugAI(bugId, triggerEl, section) {
  section = section || 'all';
  const label = section === 'all' ? 'all AI-generated data' : `the ${section} data`;
  if (!confirm(`Clear ${label} for this bug? This cannot be undone.`)) return;

  // Find the main button to show feedback
  const menu = triggerEl.closest('.clear-ai-menu');
  const mainBtn = menu ? menu.querySelector('.btn-clear-ai') : triggerEl;
  const dropdown = menu ? menu.querySelector('.clear-ai-dropdown') : null;
  if (dropdown) dropdown.classList.remove('open');
  if (mainBtn) { mainBtn.disabled = true; mainBtn.textContent = 'Clearing…'; }

  try {
    const body = section === 'all' ? {} : { section };
    const r = await fetch(`/bug/${bugId}/clear-ai`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    if (!r.ok) {
      if (mainBtn) { mainBtn.textContent = 'Error'; mainBtn.disabled = false; }
      return;
    }

    // Null out local store fields
    const { fields, clearSimilar } = _SECTION_LOCAL_FIELDS[section] || _SECTION_LOCAL_FIELDS.all;
    const allStores = [
      [BUGS, 'detail-panel', 'detail-content'],
      [UPDATED_BUGS, 'detail-panel-updated', 'detail-content-updated'],
      [typeof MY_ISSUES_DATA !== 'undefined' ? MY_ISSUES_DATA : {}, 'detail-panel-my-issues', 'detail-content-my-issues'],
    ];
    for (const [store] of allStores) {
      if (store[bugId]) {
        fields.forEach(f => { store[bugId][f] = null; });
        if (clearSimilar) { store[bugId].similar = []; store[bugId].similar_ai_analysis = {}; }
      }
    }

    // Re-render whichever detail panel is currently open for this bug
    for (const [store, panelId, contentId] of allStores) {
      const panel = document.getElementById(panelId);
      if (panel && panel.dataset.openId == bugId && panel.style.display !== 'none') {
        const content = document.getElementById(contentId);
        if (content && store[bugId]) {
          content.innerHTML = renderDetail(store[bugId]);
          updateSkillTreeNode(bugId, 'summary');
          highlightTestCode(bugId);
          initSectionContent(bugId);
        }
        break;
      }
    }
    if (mainBtn) { mainBtn.textContent = 'Clear AI ↺'; mainBtn.disabled = false; }
  } catch(e) {
    if (mainBtn) { mainBtn.textContent = 'Error'; mainBtn.disabled = false; }
  }
}

// Layout constants — must match the CSS values:
//   .skt-node { width: 44px }  .skt-hline { flex: 0 0 100px }  .skt-main { gap: 12px }
//   .skt-sub-node { width: 64px }  .skt-sub-bar-row { gap: 8px }
const _SKT_SUBW     = 64;   // sub-node width (wide enough for the longest label)
const _SKT_SUBGAP   = 8;    // constant gap between sub-nodes
const _SKT_HLINE    = 140;  // default hline width
const _SKT_NODE_W   = 44;   // main node width
const _SKT_MAIN_GAP = 12;   // gap between items in .skt-main

// Half-width of a group's sub-bar (or half the node circle if it has no sub-bar).
function _subHalf(n) {
  if (n <= 1) return _SKT_NODE_W / 2;
  return (n * _SKT_SUBW + (n - 1) * _SKT_SUBGAP) / 2;
}

// Return the minimum hline width (px) so the sub-bars of the two flanking groups
// don't overlap. The gap between sub-nodes stays constant; only the hline grows.
function minHlineWidth(nLeft, nRight) {
  const needed = _subHalf(nLeft) + _subHalf(nRight) - _SKT_NODE_W / 2 - _SKT_MAIN_GAP - _SKT_MAIN_GAP - _SKT_NODE_W / 2;
  return Math.max(_SKT_HLINE, Math.ceil(needed) + 20); // +20 px breathing room
}

// Build a gradient spine element for a sub-bar based on each node's done state.
// Each done node colours the segment of the spine between its center and the bar center.
// Works for any number of sub-nodes.
function subSpine(states) {
  const N = states.length;
  if (N <= 1) return '';          // single child: no horizontal spine
  const W = _SKT_SUBW, G = _SKT_SUBGAP;
  const total  = N * W + (N - 1) * G;
  const ctr    = total / 2;      // bar center x (where vline attaches)
  const spL    = W / 2;          // spine left  = first node center
  const spW    = total - W;      // spine width = last-center minus first-center
  const COL_DONE = '#22c55e', COL_GRAY = '#e2e8f0';

  // Compute each done node's path segment [min(nodeX,ctr), max(nodeX,ctr)]
  const doneSegs = states
    .map((s, i) => ({ done: s === 'skt-sub-done', x: i * (W + G) + W / 2 }))
    .filter(p => p.done)
    .map(p => [Math.min(p.x, ctr), Math.max(p.x, ctr)]);

  if (!doneSegs.length)
    return `<div class="skt-sub-spine" style="left:${spL}px;width:${spW}px;background:${COL_GRAY}"></div>`;

  // Union of all green segments (they all share the center point → always contiguous)
  const gStart = Math.min(...doneSegs.map(s => s[0]));
  const gEnd   = Math.max(...doneSegs.map(s => s[1]));

  // Relative to spine element (which starts at spL)
  const gs = gStart - spL, ge = gEnd - spL;

  let bg;
  if (gs <= 0 && ge >= spW) {
    bg = COL_DONE;
  } else {
    const stops = [];
    if (gs > 0)   stops.push(`${COL_GRAY} 0px`, `${COL_GRAY} ${gs}px`);
    stops.push(`${COL_DONE} ${gs}px`, `${COL_DONE} ${ge}px`);
    if (ge < spW) stops.push(`${COL_GRAY} ${ge}px`, `${COL_GRAY} ${spW}px`);
    bg = `linear-gradient(to right,${stops.join(',')})`;
  }
  return `<div class="skt-sub-spine" style="left:${spL}px;width:${spW}px;background:${bg}"></div>`;
}

// ── Skill-tree structure & section tab order ──────────────────────────────────
// Single source of truth for both section tabs and skill-tree sub-node rendering.
// `subs`  — sub-node keys left-to-right; reordering here reorders both tabs and tree circles.
// `reply` — if true, a Reply sub-node is appended to the skill-tree bar (not a section tab).
const _SKT_ORDER = [
  { tab: 'summary',   subs: ['similar', 'reproduce', 'regression'], reply: true,  clearSection: 'triage',    clearLabel: 'Triage'      },
  { tab: 'test',      subs: ['test-site'],                          reply: true,  clearSection: 'testcase',  clearLabel: 'Testcase'    },
  { tab: 'rootcause', subs: [],                                                   clearSection: 'rootcause', clearLabel: 'Investigate' },
  { tab: 'fix',       subs: ['review'],                                           clearSection: 'fix',       clearLabel: 'Fix'         },
  { tab: 'land',      subs: ['ci'],                                                                                                        },
];

const _TAB_BTN = {
  summary:    b => `<button class="section-tab section-tab--summary active" id="stab-summary-${b.id}" onclick="switchSectionTab(${b.id}, 'summary')">Triage Summary${b.triage_summary ? ' ✓' : ''}</button>`,
  similar:    b => { const strongCount = (b.similar || []).filter(s => { const ai = (b.similar_ai_analysis || {})[String(s.id)]; const v = ai ? (typeof ai === 'string' ? ai : ai.verdict) : null; return v === 'likely_duplicate' || v === 'probable_duplicate'; }).length; return `<button class="section-tab section-tab--similar" id="stab-similar-${b.id}" onclick="switchSectionTab(${b.id}, 'similar')">Duplicate${strongCount ? ` <span class="stab-count">${strongCount}</span>` : ''}</button>`; },
  reproduce:  b => `<button class="section-tab section-tab--reproduce" id="stab-reproduce-${b.id}" onclick="switchSectionTab(${b.id}, 'reproduce')">Reproduce${b.reproduce_result ? ' ✓' : ''}</button>`,
  regression: b => `<button class="section-tab section-tab--regression" id="stab-regression-${b.id}" onclick="switchSectionTab(${b.id}, 'regression')">Regression${b.reproduce_result || b.regression_range ? ' ✓' : ''}</button>`,
  test:       b => `<button class="section-tab section-tab--test" id="stab-test-${b.id}" onclick="switchSectionTab(${b.id}, 'test')">Test Case${b.test_code ? ' ✓' : ''}</button>`,
  'test-site':b => `<button class="section-tab section-tab--test-site" id="stab-test-site-${b.id}" onclick="switchSectionTab(${b.id}, 'test-site')">Test Site${b.test_site_source ? ' ✓' : ''}</button>`,
  rootcause:  b => `<button class="section-tab section-tab--rootcause" id="stab-rootcause-${b.id}" onclick="switchSectionTab(${b.id}, 'rootcause')">Investigate${b.root_cause ? ' ✓' : ''}</button>`,
  fix:        b => { const on = b.root_cause ? `switchSectionTab(${b.id},'fix')` : 'void(0)'; return `<button class="section-tab section-tab--fix${b.root_cause ? '' : ' section-tab--disabled'}" id="stab-fix-${b.id}" onclick="${on}">Fix</button>`; },
  review:     b => { const on = b.fix_code ? `switchSectionTab(${b.id},'review')` : 'void(0)'; return `<button class="section-tab section-tab--review${b.fix_code ? '' : ' section-tab--disabled'}" id="stab-review-${b.id}" onclick="${on}">Review${b.review_result ? ' ✓' : ''}</button>`; },
  ci:         b => { const on = b.fix_code ? `switchSectionTab(${b.id},'ci')` : 'void(0)'; return `<button class="section-tab section-tab--ci${b.fix_code ? '' : ' section-tab--disabled'}" id="stab-ci-${b.id}" onclick="${on}">CI${b.ci_result ? ' ✓' : ''}</button>`; },
  land:       _b => '',
  reply:      b => `<button class="section-tab section-tab--reply" id="stab-reply-${b.id}" onclick="switchSectionTab(${b.id}, 'reply')">Reply${b.reply_text ? ' ✓' : ''}</button>`,
};

function _renderSectionTabs(b) {
  const order = [];
  for (const { tab, subs } of _SKT_ORDER) { order.push(tab, ...subs); }
  order.push('reply');
  return order.map(t => _TAB_BTN[t](b)).join('\n      ');
}

// ── Skill-tree sub-node definitions ──────────────────────────────────────────
// Drives both renderSkillTree() sub-bars and updateSkillTreeNode() ID lookups.
// To add a new sub-node: add an entry here, then add its key to _SKT_ORDER.subs.
const _SKT_SUB_DEF = {
  similar: {
    label:    'Duplicate',    clearSection: 'similar',    clearLabel: 'Duplicate',
    subState: b => (b.similar && b.similar.length) ? 'skt-sub-done' : 'skt-sub-open',
    circle:   b => (b.similar && b.similar.length) ? '✓' : '≃',
    sugClass: (b, sg) => sg === 'similar'   ? ' skt-sub-suggested' : '',
    onclick:  (b, id) => `activateNode(${b.id}, 'similar', '${id}')`,
  },
  reproduce: {
    label:    'Reproduce',    clearSection: 'reproduce',  clearLabel: 'Reproduce',
    subState: b => b.reproduce_result ? 'skt-sub-done' : 'skt-sub-open',
    circle:   b => b.reproduce_result ? '✓' : '▶',
    sugClass: ()      => '',
    onclick:  (b, id) => `activateNode(${b.id}, 'reproduce', '${id}')`,
  },
  regression: {
    label:    'Regression',   clearSection: 'regression', clearLabel: 'Regression',
    subState: b => b.regression_range ? 'skt-sub-done' : 'skt-sub-open',
    circle:   b => b.regression_range ? '✓' : '↙',
    sugClass: (b, sg) => sg === 'regression' ? ' skt-sub-suggested' : '',
    onclick:  (b, id) => `activateNode(${b.id}, 'regression', '${id}')`,
  },
  'test-site': {
    label:    'Test Site',    clearSection: 'test-site',  clearLabel: 'Test Site',
    subState: b => b.test_site_source ? 'skt-sub-done' : 'skt-sub-open',
    circle:   b => b.test_site_source ? '✓' : '◎',
    sugClass: (b, sg) => sg === 'test-site' ? ' skt-sub-suggested' : '',
    onclick:  (b, id) => `activateNode(${b.id}, 'test-site', '${id}')`,
  },
  review: {
    label:    'Review',
    subState: b => b.review_result ? 'skt-sub-done' : (b.fix_code ? 'skt-sub-open' : 'skt-sub-locked'),
    circle:   b => b.review_result ? '✓' : b.fix_code ? '◈' : '–',
    sugClass: (b, sg) => sg === 'review' ? ' skt-sub-suggested' : '',
    onclick:  (b, id) => b.fix_code ? `activateNode(${b.id}, 'review', '${id}')` : '',
  },
  ci: {
    label:    'CI',
    subState: b => b.ci_result ? 'skt-sub-done' : (b.fix_code ? 'skt-sub-open' : 'skt-sub-locked'),
    circle:   b => b.ci_result ? '✓' : b.fix_code ? '▷' : '–',
    sugClass: (b, sg) => sg === 'ci'     ? ' skt-sub-suggested' : '',
    onclick:  (b, id) => b.fix_code ? `activateNode(${b.id}, 'ci', '${id}')` : '',
  },
  reply: {
    label:    'Reply',        clearSection: 'reply',      clearLabel: 'Reply',
    subState: b => b.reply_text ? 'skt-sub-done' : 'skt-sub-open',
    circle:   b => b.reply_text ? '✓' : '↩',
    sugClass: (b, sg) => sg === 'reply'     ? ' skt-sub-suggested' : '',
    onclick:  (b, id) => `activateNode(${b.id}, 'reply', '${id}')`,
  },
};

// Build the Clear AI dropdown items in section-tab order.
// Any _SKT_ORDER entry or _SKT_SUB_DEF entry with a clearSection property gets an item.
// Adding clearSection to a new tab/sub-node automatically adds it here — no further changes needed.
function _renderClearAIDropdown(bugId) {
  // Build a map of tab-key → { section, label } for every clearable entry
  const clearMap = {};
  for (const e of _SKT_ORDER) {
    if (e.clearSection) clearMap[e.tab] = { section: e.clearSection, label: e.clearLabel };
  }
  for (const [key, def] of Object.entries(_SKT_SUB_DEF)) {
    if (def.clearSection) clearMap[key] = { section: def.clearSection, label: def.clearLabel };
  }
  // Iterate in section-tab order (same sequence as _renderSectionTabs)
  const order = [];
  for (const { tab, subs } of _SKT_ORDER) { order.push(tab, ...subs); }
  order.push('reply');
  const items = order.filter(k => clearMap[k]).map(k => clearMap[k]);
  return items.map(({ section, label }) =>
    `<button class="clear-ai-dropdown-item" onclick="clearBugAI(${bugId}, this, '${section}')">${label}</button>`
  ).join('\n          ') +
  `\n          <button class="clear-ai-dropdown-item clear-ai-dropdown-item--danger" onclick="clearBugAI(${bugId}, this, 'all')">Clear All</button>`;
}

// ── Double-click-to-action helpers ───────────────────────────────────────────

// Map from tab key to the primary action for that panel.
// Tabs not listed here (review, ci) have no primary action.
const _MAIN_ACTIONS = {
  summary:     bugId => generateTriageSummary(bugId),
  similar:     bugId => { const b = document.getElementById(`btn-find-similar-${bugId}`); if (b && !b.disabled) findAndAnalyzeSimilar(bugId, b); },
  test:        bugId => { const b = document.getElementById(`gen-test-btn-${bugId}`);       if (b && !b.disabled) generateTest(bugId, b); },
  rootcause:   bugId => toggleRootcauseMenu(bugId),
  fix:         bugId => generateFix(bugId),
  'test-site': bugId => { const b = document.getElementById(`gen-testsite-btn-${bugId}`);  if (b && !b.disabled) generateTestSite(bugId, 'default'); },
  reply:       bugId => generateReply(bugId),
  reproduce:   bugId => { const b = document.querySelector(`#sbody-reproduce-${bugId} .btn-phase--active`); if (b && !b.disabled) b.click(); },
  regression:  bugId => { const b = document.getElementById(`btn-regression-${bugId}`);    if (b && !b.disabled) runRegression(bugId, b); },
};

// Returns the DOM element ID for a skill-tree node given a tab key.
function _getNodeIdForTab(bugId, tab) {
  for (const { tab: gTab } of _SKT_ORDER)
    if (gTab === tab) return `skt-node-${gTab}-${bugId}`;
  for (const { tab: gTab, subs, reply } of _SKT_ORDER)
    if ([...subs, ...(reply ? ['reply'] : [])].includes(tab))
      return `skt-sub-${gTab}-${tab}-${bugId}`;
  return null;
}

// Click handler for skill-tree nodes.
// 1st click on an unfocused node → show panel.
// 2nd click on the focused node  → trigger primary action (if one is defined).
// Locked nodes always → show panel only.
function activateNode(bugId, tab, nodeId) {
  const el = document.getElementById(nodeId);
  if (el && (el.classList.contains('skt-locked') || el.classList.contains('skt-sub-locked'))) {
    switchSectionTab(bugId, tab, nodeId); return;
  }
  if (!_MAIN_ACTIONS[tab]) { switchSectionTab(bugId, tab, nodeId); return; }
  const isFocused = el && (el.classList.contains('skt-node--current') ||
                            el.classList.contains('skt-sub-node--current'));
  if (isFocused) {
    _MAIN_ACTIONS[tab](bugId);
  } else {
    switchSectionTab(bugId, tab, nodeId);
  }
}

// Total sub-node count for a group (used for hline width calculations).
function _subBarSize(groupTab) {
  const e = _SKT_ORDER.find(e => e.tab === groupTab);
  return e ? e.subs.length + (e.reply ? 1 : 0) : 0;
}

// Render a complete sub-bar (vline + spine + nodes) for a skill-tree group.
// Element IDs use the pattern: skt-sub-{groupTab}-{key}-{b.id}
function _subBarHtml(b, groupTab, sg) {
  const entry = _SKT_ORDER.find(e => e.tab === groupTab);
  if (!entry) return '';
  const keys = [...entry.subs, ...(entry.reply ? ['reply'] : [])];
  if (!keys.length) return '';
  const states = keys.map(k => _SKT_SUB_DEF[k].subState(b));
  const nodes  = keys.map(k => {
    const d  = _SKT_SUB_DEF[k];
    const st = d.subState(b);
    const cl = d.sugClass(b, sg);
    const id = `skt-sub-${groupTab}-${k}-${b.id}`;
    const oc = d.onclick(b, id);
    return `<div class="skt-sub-node ${st}${cl}" id="${id}"${oc ? ` onclick="${oc}"` : ''}>
            <div class="skt-sub-stem"></div>
            <div class="skt-sub-circle">${d.circle(b)}</div>
            <div class="skt-sub-label">${d.label}</div>
          </div>`;
  }).join('\n          ');
  return `<div class="skt-sub-wrap">
        <div class="skt-sub-vline"></div>
        <div class="skt-sub-bar-row">
          ${subSpine(states)}
          ${nodes}
        </div>
      </div>`;
}

function renderSkillTree(b) {
  // Main node states
  const triageState = b.triage_summary ? 'skt-done' : 'skt-active';
  const rcState     = b.test_code ? (b.root_cause ? 'skt-done' : 'skt-active') : 'skt-locked';
  const fixState    = b.root_cause ? 'skt-active' : 'skt-locked';
  const landState   = b.fix_code  ? 'skt-active' : 'skt-locked';

  // Connector line states
  const line1 = b.triage_summary ? 'skt-hline--done' : 'skt-hline--active';
  const line2 = b.test_code ? (b.root_cause ? 'skt-hline--done' : 'skt-hline--active') : 'skt-hline--open';
  const line3 = b.root_cause ? 'skt-hline--active' : 'skt-hline--locked';
  const line4 = b.fix_code   ? 'skt-hline--active' : 'skt-hline--locked';

  // Hline widths — derived from sub-bar sizes so they grow automatically when subs are added
  const hline1W = minHlineWidth(_subBarSize('summary'),   _subBarSize('test'));
  const hline2W = minHlineWidth(_subBarSize('test'),      _subBarSize('rootcause'));
  const hline3W = minHlineWidth(_subBarSize('rootcause'), _subBarSize('fix'));
  const hline4W = minHlineWidth(_subBarSize('fix'),       _subBarSize('land'));

  const ni = (done, ch) => done ? '✓' : ch;

  // Guide card (orange, shown when workflow_suggestion has a step)
  const ws = b.workflow_suggestion;
  const stepIcons  = { triage: '!', reply: '↩', similar: '≃', regression: '↙', 'test-site': '◎', test: 'T', verify: '▶', rootcause: '?', fix: '⚙', review: '◈', ci: '▷' };
  const stepLabels = { triage: 'Triage', reply: 'Reply', similar: 'Duplicate', regression: 'Regression', 'test-site': 'Test Site', test: 'Testcase', verify: 'Verify', rootcause: 'Investigate', fix: 'Fix', review: 'Review', ci: 'CI' };

  const sugStep = ws && ws.step;
  const sugsT  = (step) => sugStep === step && (step === 'similar' || step === 'reply' || step === 'triage')
                             ? ' skt-sub-suggested' : '';
  const sugsR  = (step) => (sugStep === step && (step === 'test' || step === 'test-site' || step === 'regression')) ||
                            (sugStep === 'verify' && step === 'test')
                             ? ' skt-sub-suggested' : '';
  const guideHtml = (ws && ws.step)
    ? `<div class="skt-guide" id="skt-guide-${b.id}" data-step="${ws.step}">
        <div class="skt-guide-label">Suggested</div>
        <div class="skt-guide-action">${stepIcons[ws.step] || ''} ${stepLabels[ws.step] || ws.step}</div>
        <div class="skt-guide-reason">${ws.reason || ''}</div>
        <button class="skt-guide-btn" onclick="switchSectionTab(${b.id}, '${ws.step === 'verify' ? 'test' : ws.step === 'triage' ? 'summary' : ws.step}')">Open →</button>
       </div>`
    : '';

  return `<div id="skt-area-${b.id}"><div class="skt" id="skt-${b.id}">
${guideHtml}<div class="skt-main">

    <div class="skt-node-group">
      <div class="skt-node ${triageState}${sugsT('triage')}" id="skt-node-summary-${b.id}"
           onclick="activateNode(${b.id}, 'summary', 'skt-node-summary-${b.id}')">
        <div class="skt-circle">${ni(b.triage_summary, '!')}</div>
        <div class="skt-label">Triage</div>
      </div>
      ${_subBarHtml(b, 'summary', sugStep)}
    </div>

    <div class="skt-hline ${line1}" style="flex-basis:${hline1W}px"></div>

    <div class="skt-node-group">
      <div class="skt-node skt-open${sugsR('test')}" id="skt-node-test-${b.id}"
           onclick="activateNode(${b.id}, 'test', 'skt-node-test-${b.id}')">
        <div class="skt-circle">⊕</div>
        <div class="skt-label">Verify</div>
      </div>
      ${_subBarHtml(b, 'test', sugStep)}
    </div>

    <div class="skt-hline ${line2}" style="flex-basis:${hline2W}px"></div>

    <div class="skt-node-group">
      <div class="skt-node ${rcState}${sugStep === 'rootcause' ? ' skt-suggested' : ''}" id="skt-node-rootcause-${b.id}"
           ${b.test_code ? `onclick="activateNode(${b.id}, 'rootcause', 'skt-node-rootcause-${b.id}')"` : 'style="cursor:default"'}>
        <div class="skt-circle">${b.root_cause ? '✓' : b.test_code ? '?' : '–'}</div>
        <div class="skt-label">Investigate</div>
      </div>
    </div>

    <div class="skt-hline ${line3}" style="flex-basis:${hline3W}px"></div>

    <div class="skt-node-group">
      <div class="skt-node ${fixState}${sugStep === 'fix' ? ' skt-suggested' : ''}" id="skt-node-fix-${b.id}"
           ${b.root_cause ? `onclick="activateNode(${b.id}, 'fix', 'skt-node-fix-${b.id}')"` : 'style="cursor:default"'}>
        <div class="skt-circle">${b.fix_code ? '✓' : b.root_cause ? '⚙' : '–'}</div>
        <div class="skt-label">Fix</div>
      </div>
      ${_subBarHtml(b, 'fix', sugStep)}
    </div>

    <div class="skt-hline ${line4}" style="flex-basis:${hline4W}px"></div>

    <div class="skt-node-group">
      <div class="skt-node ${landState}" id="skt-node-land-${b.id}"
           ${b.fix_code ? `onclick="activateNode(${b.id}, 'ci', 'skt-node-land-${b.id}')"` : 'style="cursor:default"'}>
        <div class="skt-circle">${b.ci_result ? '✓' : b.fix_code ? '↑' : '–'}</div>
        <div class="skt-label">Land</div>
      </div>
      ${_subBarHtml(b, 'land', sugStep)}
    </div>

  </div></div></div>`;
}

function updateSkillTreeNode(bugId, tab, activeNodeId) {
  // Build nodeMap dynamically from _SKT_ORDER so it stays in sync automatically.
  // Main node IDs: skt-node-{tab}-{bugId}
  // Sub-node IDs:  skt-sub-{groupTab}-{key}-{bugId}
  const nodeMap = {};
  for (const { tab: gTab, subs, reply } of _SKT_ORDER) {
    nodeMap[gTab] = [`skt-node-${gTab}-${bugId}`];
    for (const key of [...subs, ...(reply ? ['reply'] : [])]) {
      (nodeMap[key] = nodeMap[key] || []).push(`skt-sub-${gTab}-${key}-${bugId}`);
    }
  }
  const skt = document.getElementById(`skt-${bugId}`);
  if (!skt) return;
  skt.querySelectorAll('.skt-node--current, .skt-sub-node--current').forEach(el => {
    el.classList.remove('skt-node--current', 'skt-sub-node--current');
  });
  const ids = activeNodeId ? [activeNodeId] : (nodeMap[tab] || []);
  ids.forEach(id => {
    const target = document.getElementById(id);
    if (target) {
      target.classList.add(target.classList.contains('skt-sub-node') ? 'skt-sub-node--current' : 'skt-node--current');
    }
  });
}

function getComment0(description) {
  if (!description) return '';
  const stripped = description.replace(/^--- Comment #0 by [^\n]+ ---\n/, '');
  const next = stripped.indexOf('\n--- Comment #');
  const c0 = (next !== -1 ? stripped.slice(0, next) : stripped).trim();
  return c0.replace(/^Created attachment \d+\n[^\n]*\n\n/, '');
}

function toggleDescription(bugId) {
  const text = document.getElementById('desc-text-' + bugId);
  const btn = document.getElementById('desc-toggle-' + bugId);
  if (!text || !btn) return;
  const expanded = text.classList.toggle('expanded');
  btn.textContent = expanded ? 'Show less' : 'Show more';
}

function escHtml(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Shared bug card renderer ────────────────────────────────────
// variant: 'triaged' | 'updated' | 'my-issues'
function renderBugCard(b, variant) {
  const esc = s => escHtml(s || '');
  const date = esc((b.triaged_at || '').slice(0, 10));
  const bzUrl = `https://bugzilla.mozilla.org/show_bug.cgi?id=${b.id}`;

  let cardClass = 'bug-card';
  let cardId, onclick;
  if (variant === 'updated') {
    cardClass += ' bug-card--updated';
    cardId = `card-updated-${b.id}`;
    onclick = `selectUpdatedCard(${b.id}, this)`;
  } else if (variant === 'my-issues') {
    cardId = `my-issue-card-${b.id}`;
    onclick = `selectMyIssueCard(${b.id}, this)`;
  } else {
    cardId = `card-${b.id}`;
    onclick = `selectCard(${b.id}, this)`;
  }

  const cl = b.classification;
  let clBadge;
  if (cl === 'bug' || cl === 'defect') clBadge = '<span class="badge badge-bug">Bug</span>';
  else if (cl === 'feature-request' || cl === 'enhancement') clBadge = '<span class="badge badge-feature">Feature</span>';
  else clBadge = '<span class="badge badge-task">Task</span>';

  const rtBadge = variant !== 'updated'
    ? (b.reporter_type === 'mozilla-engineer' ? '<span class="badge badge-eng">Engineer</span>' : '<span class="badge badge-user">User</span>')
    : '';

  const regLine = (variant !== 'updated' && (cl === 'bug' || cl === 'defect') && b.is_regression === 1)
    ? `<div class="card-regression"><span class="reg-yes">✓ Regression</span>${b.regression_confidence ? `<span class="reg-conf">${esc(b.regression_confidence)}</span>` : ''}</div>`
    : '';

  const platformLine = (variant !== 'updated' && b.platform_scope === 'platform-specific' && b.affected_platforms?.length)
    ? `<div class="card-platform"><span class="platform-tag">${esc(b.affected_platforms.join(', '))}</span></div>`
    : '';

  let actionsHtml;
  if (variant === 'updated') {
    actionsHtml = `<button class="btn-worktree btn-outlined btn-add-my-issue" data-bug-id="${b.id}" onclick="event.stopPropagation(); addToMyIssues(${b.id}, this)">+ My Issues</button>
      <button class="btn-danger" onclick="event.stopPropagation(); dismissBug(${b.id}, this)">Dismiss ×</button>`;
  } else if (variant === 'my-issues') {
    actionsHtml = `<button class="btn-worktree btn-outlined" onclick="event.stopPropagation(); createWorktree(${b.id}, this)">+ Worktree</button>
      <button class="btn-danger" onclick="event.stopPropagation(); removeMyIssue(${b.id}, this)">Remove ×</button>`;
  } else {
    actionsHtml = `<button class="btn-worktree btn-outlined btn-add-my-issue" data-bug-id="${b.id}" onclick="event.stopPropagation(); addToMyIssues(${b.id}, this)">+ My Issues</button>`;
  }

  return `<div class="${cardClass}" id="${cardId}" onclick="${onclick}"
    data-product="${esc(b.product)}" data-component="${esc(b.component)}">
    <div class="card-header">
      <a class="bug-id" href="${bzUrl}" target="_blank" onclick="event.stopPropagation()">#${b.id}</a>
      <span class="card-date">${date}</span>
    </div>
    <div class="card-badges">${clBadge}${rtBadge}</div>
    ${regLine}${platformLine}
    <div class="card-summary">${esc(b.summary)}</div>
    <div class="card-actions">${actionsHtml}</div>
  </div>`;
}

// ── Per-(product,component) filter for the Triage Queue page ───────────────
const TRIAGE_FILTER_STORAGE_KEY = 'triageHiddenComponents';

function _filterKey(product, component) { return `${product}::${component}`; }

function _readHiddenFilters() {
  try {
    const raw = localStorage.getItem(TRIAGE_FILTER_STORAGE_KEY);
    return new Set(raw ? JSON.parse(raw) : []);
  } catch(e) { return new Set(); }
}

function _writeHiddenFilters(set) {
  try {
    localStorage.setItem(TRIAGE_FILTER_STORAGE_KEY, JSON.stringify([...set]));
  } catch(e) {
    console.warn('triage filter persistence unavailable:', e);
  }
}

function _collectQueueComponents() {
  // Single source of truth: read product/component off the cards already in
  // the DOM. All three grids tag every card with data-product/data-component,
  // so we don't have to consult BUGS / UPDATED_BUGS dicts separately.
  const counts = new Map();  // key → {product, component, count}
  document.querySelectorAll(
    '#grid-untriaged .bug-card, #grid-triaged .bug-card, #grid-updated .bug-card'
  ).forEach(el => {
    const p = el.getAttribute('data-product') || '';
    const c = el.getAttribute('data-component') || '';
    if (!p && !c) return;
    const k = _filterKey(p, c);
    const cur = counts.get(k) || { product: p, component: c, count: 0 };
    cur.count += 1;
    counts.set(k, cur);
  });
  return [...counts.values()].sort(
    (a, b) => a.product.localeCompare(b.product) || a.component.localeCompare(b.component)
  );
}

function initTriageFilters() {
  const bar = document.getElementById('triage-filter-bar');
  if (!bar) return;
  const items = _collectQueueComponents();
  if (!items.length) { bar.innerHTML = ''; return; }
  const hidden = _readHiddenFilters();
  bar.innerHTML = `
    <span class="triage-filter-label">Show:</span>
    ${items.map(it => {
      const k = _filterKey(it.product, it.component);
      return `<label class="triage-filter-chip">
        <input type="checkbox" data-filter-key="${escHtml(k)}" ${hidden.has(k) ? '' : 'checked'}
               onchange="onTriageFilterChange(this)">
        <span class="triage-filter-chip-label">${escHtml(it.product)} · ${escHtml(it.component)}</span>
        <span class="triage-filter-chip-count">${it.count}</span>
      </label>`;
    }).join('')}`;
  applyTriageFilters();
}

function onTriageFilterChange(input) {
  const key = input.getAttribute('data-filter-key');
  const hidden = _readHiddenFilters();
  if (input.checked) hidden.delete(key); else hidden.add(key);
  _writeHiddenFilters(hidden);
  applyTriageFilters();
}

function _bugCardKey(el) {
  return _filterKey(el.getAttribute('data-product') || '', el.getAttribute('data-component') || '');
}

function applyTriageFilters() {
  const hidden = _readHiddenFilters();
  // Per-grid: mark cards filtered (separate state from pagination's display:none).
  ['grid-untriaged', 'grid-triaged', 'grid-updated'].forEach(gridId => {
    const grid = document.getElementById(gridId);
    if (!grid) return;
    let visible = 0;
    grid.querySelectorAll('.bug-card').forEach(card => {
      const isHidden = hidden.has(_bugCardKey(card));
      card.classList.toggle('bug-card--filtered', isHidden);
      if (!isHidden) visible += 1;
    });
    _updateQueueCount(gridId, visible);
  });
  // If a detail panel is currently showing a bug that was just filtered out,
  // dismiss it so the view doesn't display a bug the user has hidden.
  _dismissDetailPanelIfFiltered('detail-panel', id => `card-${id}`);
  _dismissDetailPanelIfFiltered('detail-panel-updated', id => `card-updated-${id}`);
  // Pagination only sees post-filter cards.
  untriagedPage = 0;
  renderUntriagedPage();
}

function _dismissDetailPanelIfFiltered(panelId, cardIdFor) {
  const panel = document.getElementById(panelId);
  if (!panel || panel.style.display === 'none') return;
  const openId = panel.dataset.openId;
  if (!openId) return;
  const card = document.getElementById(cardIdFor(openId));
  if (card && card.classList.contains('bug-card--filtered')) {
    panel.style.display = 'none';
    panel.dataset.openId = '';
    card.classList.remove('selected');
  }
}

function _updateQueueCount(gridId, visible) {
  const sectionMap = {
    'grid-untriaged': '.queue-section:has(#grid-untriaged) .bug-count',
    'grid-triaged':   '.queue-section:has(#grid-triaged) .bug-count',
    'grid-updated':   '.queue-section:has(#grid-updated) .bug-count',
  };
  const span = document.querySelector(sectionMap[gridId]);
  if (span) span.textContent = `${visible} bug${visible === 1 ? '' : 's'}`;
}

// ── Untriaged pagination ────────────────────────────────────────
const UNTRIAGED_PER_PAGE = 4;
let untriagedPage = 0;

function renderUntriagedPage() {
  // Paginate over visible-only cards — filtered cards never advance the page count.
  const visibleCards = [...document.querySelectorAll('#grid-untriaged .bug-card')]
    .filter(c => !c.classList.contains('bug-card--filtered'));
  const total = visibleCards.length;
  const totalPages = Math.ceil(total / UNTRIAGED_PER_PAGE);
  const start = untriagedPage * UNTRIAGED_PER_PAGE;
  const end = start + UNTRIAGED_PER_PAGE;

  document.querySelectorAll('#grid-untriaged .bug-card').forEach(card => {
    card.style.display = 'none';
  });
  visibleCards.forEach((card, i) => {
    if (i >= start && i < end) card.style.display = '';
  });

  const pag = document.getElementById('pagination-untriaged');
  if (!pag || totalPages <= 1) return;

  let html = '';
  html += `<button class="pag-btn" onclick="goUntriagedPage(0)" ${untriagedPage === 0 ? 'disabled' : ''}>&laquo;</button>`;
  html += `<button class="pag-btn" onclick="goUntriagedPage(${untriagedPage - 1})" ${untriagedPage === 0 ? 'disabled' : ''}>&lsaquo;</button>`;
  for (let p = 0; p < totalPages; p++) {
    html += `<button class="pag-btn ${p === untriagedPage ? 'pag-btn--active' : ''}" onclick="goUntriagedPage(${p})">${p + 1}</button>`;
  }
  html += `<button class="pag-btn" onclick="goUntriagedPage(${untriagedPage + 1})" ${untriagedPage === totalPages - 1 ? 'disabled' : ''}>&rsaquo;</button>`;
  html += `<button class="pag-btn" onclick="goUntriagedPage(${totalPages - 1})" ${untriagedPage === totalPages - 1 ? 'disabled' : ''}>&raquo;</button>`;
  pag.innerHTML = html;
}

function goUntriagedPage(p) {
  const total = [...document.querySelectorAll('#grid-untriaged .bug-card')]
    .filter(c => !c.classList.contains('bug-card--filtered')).length;
  const totalPages = Math.ceil(total / UNTRIAGED_PER_PAGE);
  untriagedPage = Math.max(0, Math.min(p, totalPages - 1));
  renderUntriagedPage();
}

document.addEventListener('DOMContentLoaded', function() {
  const hash = location.hash.replace('#', '');
  if (hash === 'my-issues') switchTab('my-issues');

  const triagedGrid = document.getElementById('grid-triaged');
  if (triagedGrid) {
    triagedGrid.innerHTML = Object.values(BUGS).map(b => renderBugCard(b, 'triaged')).join('');
  }

  const updatedGrid = document.getElementById('grid-updated');
  if (updatedGrid) {
    updatedGrid.innerHTML = Object.values(UPDATED_BUGS).map(b => renderBugCard(b, 'updated')).join('');
  }

  // Build the per-(product,component) filter UI before pagination — filter
  // state determines which cards count toward pages.
  initTriageFilters();
  renderUntriagedPage();
  loadMyIssues();

  // Restore bug card + tab after a location.reload() from reproduce/regression runs
  const restoreKey = 'restore_bug_tab';
  const restore = sessionStorage.getItem(restoreKey);
  if (restore) {
    sessionStorage.removeItem(restoreKey);
    try {
      const { bugId, tab } = JSON.parse(restore);
      const card = document.getElementById(`card-${bugId}`) || document.getElementById(`card-updated-${bugId}`);
      if (card) {
        card.click();
        setTimeout(() => switchSectionTab(bugId, tab), 50);
      }
    } catch(e) {}
  }

  // Restore console panel content after a location.reload()
  const consoleSave = sessionStorage.getItem('restore_console');
  if (consoleSave) {
    sessionStorage.removeItem('restore_console');
    try {
      const { body, footer, title } = JSON.parse(consoleSave);
      const panel   = document.getElementById('console-panel');
      const bodyEl  = document.getElementById('console-panel-body');
      const footerEl= document.getElementById('console-panel-footer');
      const titleEl = document.getElementById('console-panel-title');
      if (bodyEl)   bodyEl.innerHTML   = body;
      if (footerEl) footerEl.innerHTML = footer;
      if (titleEl)  titleEl.textContent = title;
      if (panel) { panel.classList.remove('minimized'); panel.style.display = 'block'; }
      updateConsoleRestoreBtn();
    } catch(e) {}
  }
});

<script>
async function generateTriageSummary(bugId) {
  const btn = document.getElementById(`btn-summary-${bugId}`);
  const reportEl = document.getElementById(`summary-report-${bugId}`);
  const tabEl = document.getElementById(`stab-summary-${bugId}`);
  if (!btn) return;
  const orig = btn.textContent;
  btn.disabled = true;
  btn.textContent = 'Generating…';
  reportEl.style.display = '';
  reportEl.innerHTML = '';
  showConsolePanel(`Generating triage summary for bug #${bugId}…`, 'Triage Summary');
  let accText = '';
  try {
    await streamSSE(`/bug/${bugId}/triage-summary`, async (ev) => {
      if (ev.chunk) {
        accText += ev.chunk;
        reportEl.innerHTML = `<div class="qa-cards-streaming">${accText.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}</div>`;
      } else if (ev.cancelled) {
        btn.textContent = orig; btn.disabled = false;
      } else if (ev.error) {
        appendConsoleLines(ev.detail || 'Error', 'error');
        setConsolePanelStatus('Failed', 'error');
        btn.textContent = orig; btn.disabled = false;
      } else if (ev.done) {
        const finalText = ev.triage_summary || accText;
        const _triageStore = BUGS[bugId] || UPDATED_BUGS[bugId]
            || (typeof MY_ISSUES_DATA !== 'undefined' ? MY_ISSUES_DATA[bugId] : null);
        if (_triageStore) _triageStore.triage_summary = finalText;
        reportEl.innerHTML = renderTriageSummaryCards(finalText);
        if (tabEl) tabEl.textContent = 'Triage Summary ✓';
        btn.textContent = 'Regenerate Summary ↺';
        btn.disabled = false;
        setConsolePanelStatus('Done', 'success');
        fetch(`/bug/${bugId}/workflow-suggestion`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({}),
        })
          .then(r => r.ok ? r.json() : null)
          .then(suggestion => {
            if (!suggestion || !suggestion.step) return;
            _dispatchWorkflowSuggestion(bugId, suggestion);
          })
          .catch(() => {});
      }
    }, {}, [bugId, 'summary']);
  } catch(e) {
    setConsolePanelStatus('Failed', 'error');
    btn.textContent = orig; btn.disabled = false;
  }
}

async function reclassify(bugId, btn) {
  btn.disabled = true;
  btn.textContent = 'Classifying…';
  try {

      btn.disabled = false;

    // Update in-memory bug data

      summary_zh_tw: updated.summary_zh_tw,
      reporter_email: updated.reporter_email,
      reporter_type: updated.reporter_type,
      classification: updated.classification,
      is_regression: updated.is_regression,
      regression_confidence: updated.regression_confidence,
      platform_scope: updated.platform_scope,
      affected_platforms: updated.affected_platforms,
      component_correct: updated.component_correct,
      component_notes: updated.component_notes,
      suggested_severity: updated.suggested_severity,
      severity_rationale: updated.severity_rationale,
      next_step: updated.next_step,
      next_step_notes: updated.next_step_notes,
      suggested_reply: updated.suggested_reply,
      component: updated.component,
      product: updated.product,
      description: updated.description,
      test_code: BUGS[bugId].test_code ?? null,
      similar: BUGS[bugId].similar ?? [],
      test_site_source: updated.test_site_source ?? BUGS[bugId].test_site_source ?? null,
      test_site_variants: updated.test_site_variants ?? BUGS[bugId].test_site_variants ?? [],
    };
    // Re-render the open detail panel
    document.getElementById('detail-content').innerHTML = renderDetail(BUGS[bugId]);
    updateSkillTreeNode(bugId, 'summary');
    highlightTestCode(bugId);
    initSectionContent(bugId);
  } catch(e) {
    btn.textContent = 'Error';
    btn.disabled = false;
  }
}

// ── Page reload helper ────────────────────────────────────────────────────────
// Single entry point for all location.reload() calls.
// Automatically saves the console panel state (if visible) so it survives the
// reload.  Optionally saves a bug card + tab to reopen after reload.
//
// Usage:
//   reloadPage()                          – plain reload, console preserved
//   reloadPage({ bugId, tab: 'regression' }) – reload + reopen tab

function reloadPage({ bugId, tab } = {}) {
  const panel = document.getElementById('console-panel');
  if (panel && panel.style.display !== 'none') {
    const bodyEl   = document.getElementById('console-panel-body');
    const footerEl = document.getElementById('console-panel-footer');
    const titleEl  = document.getElementById('console-panel-title');
    sessionStorage.setItem('restore_console', JSON.stringify({
      body:   bodyEl   ? bodyEl.innerHTML    : '',
      footer: footerEl ? footerEl.innerHTML  : '',
      title:  titleEl  ? titleEl.textContent : '',
    }));
  }
  if (bugId != null) {
    sessionStorage.setItem('restore_bug_tab', JSON.stringify({ bugId, tab }));
  }
  location.reload();
}
