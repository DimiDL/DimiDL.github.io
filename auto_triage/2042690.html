<script>
const NO_DUP_CONFIRMED = {};

function pickDupCandidate(bugId, dupBugId) {
  const input = document.getElementById(`reply-dup-id-${bugId}`);
  if (input) {
    input.value = dupBugId;
    // Highlight the selected candidate
    document.querySelectorAll(`#reply-subopts-duplicate-${bugId} .reply-dup-candidate`).forEach(btn => {
      btn.classList.toggle('reply-dup-candidate--selected', parseInt(btn.dataset.bugId || '0') === dupBugId);
    });
  }
}

const _SIMILAR_TAG_LABELS = {
  likely_duplicate:    'Strong Match',
  probable_duplicate:  'Possible Match',
  potential_duplicate: 'Weak Match',
  not_duplicate:       'No Match',
};

function _tagInfo(cls) {
  if (!cls) return null;
  if (typeof cls === 'string') return { verdict: cls, reason: '' };
  return { verdict: cls.verdict || '', reason: cls.reason || '' };
}

const _SIMILAR_ORDER = { likely_duplicate: 0, probable_duplicate: 1, potential_duplicate: 2, not_duplicate: 3 };

function _filteredSortedSimilar(items, aiAnalysis) {
  return items
    .filter(b => {
      const ai = aiAnalysis[String(b.id)];
      if (!ai) return false;
      const v = typeof ai === 'string' ? ai : ai.verdict;
      if (v === 'not_duplicate') return (b.score || 0) >= 0.65;
      return v === 'likely_duplicate' || v === 'probable_duplicate' || v === 'potential_duplicate';
    })
    .sort((a, bItem) => {
      const vA = _verdictOf(aiAnalysis[String(a.id)]);
      const vB = _verdictOf(aiAnalysis[String(bItem.id)]);
      const diff = (_SIMILAR_ORDER[vA] ?? 99) - (_SIMILAR_ORDER[vB] ?? 99);
      if (diff !== 0) return diff;
      return (bItem.score || 0) - (a.score || 0);
    });
}

function _verdictOf(ai) {
  if (!ai) return '';
  return typeof ai === 'string' ? ai : (ai.verdict || '');
}

function _filteredSimilarCount(items, aiAnalysis) {
  return _filteredSortedSimilar(items, aiAnalysis || {}).length;
}

function _initDupConfirmationState(sourceId) {
  if (sourceId == null || sourceId in NO_DUP_CONFIRMED) return;
  const store = (typeof BUGS !== 'undefined' && BUGS[sourceId])
    || (typeof UPDATED_BUGS !== 'undefined' && UPDATED_BUGS[sourceId])
    || (typeof MY_ISSUES_DATA !== 'undefined' && MY_ISSUES_DATA[sourceId]);
  if (!store) return;
  NO_DUP_CONFIRMED[sourceId] = !!store.no_duplicate_confirmed;
  if (!MARKED_DUPS[sourceId] && store.confirmed_duplicate_ids && store.confirmed_duplicate_ids.length) {
    MARKED_DUPS[sourceId] = new Set(store.confirmed_duplicate_ids);
  }
}

function _saveDupConfirmationState(sourceId) {
  const confirmedIds = MARKED_DUPS[sourceId] ? Array.from(MARKED_DUPS[sourceId]) : [];
  const noDup = !!NO_DUP_CONFIRMED[sourceId];
  fetch(`/bug/${sourceId}/similar/confirmed`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ confirmed_duplicate_ids: confirmedIds, no_duplicate_confirmed: noDup }),
  }).catch(() => {});
}

function renderSimilarList(items, sourceId, aiAnalysis) {
  if (!items || !items.length) return '<li class="similar-empty">No similar bugs found.</li>';
  aiAnalysis = aiAnalysis || {};
  const hasAnalysis = Object.keys(aiAnalysis).length > 0;
  const display = hasAnalysis ? _filteredSortedSimilar(items, aiAnalysis) : items;
  if (hasAnalysis && !display.length) return '<li class="similar-empty">No strong or relevant matches found.</li>';
  _initDupConfirmationState(sourceId);
  const noDupConfirmed = sourceId != null && NO_DUP_CONFIRMED[sourceId];
  const noDupRow = hasAnalysis ? `<li class="similar-item similar-item--no-dup-pin${noDupConfirmed ? ' similar-item--no-dup-pin--confirmed' : ''}">
      <input type="checkbox" class="no-dup-cb"${noDupConfirmed ? ' checked' : ''} data-source="${sourceId}" onclick="event.stopPropagation(); toggleNoDupMark(this)">
      <span class="sim-none-label">None of these are duplicates</span>
      <span class="sim-none-hint">→ proceed</span>
    </li>` : '';
  return noDupRow + display.map(b => {
    const bzUrl = `https://bugzilla.mozilla.org/show_bug.cgi?id=${b.id}`;
    const isDup = b.resolution === 'DUPLICATE';
    const isTraced = b.traced_via != null;
    const statusText = b.resolution ? `${b.status} / ${b.resolution}` : b.status;
    const tracedHint = isTraced
      ? ` <span class="similar-traced-via">via dup <a class="similar-via-link" href="https://bugzilla.mozilla.org/show_bug.cgi?id=${b.traced_via}" target="_blank">#${b.traced_via}</a></span>`
      : '';
    const scoreHint = b.score != null
      ? `<span class="similar-score">${b.score.toFixed(2)}</span>`
      : '';
    const tooltipText = b.ai_summary || b.short_summary || '';
    const tooltip = tooltipText ? ` data-tooltip="${escHtml(tooltipText)}"` : '';
    const tagId = sourceId != null ? ` id="stag-${sourceId}-${b.id}"` : '';
    const tagInfo = _tagInfo(aiAnalysis[String(b.id)]);
    let tagHtml;
    if (tagInfo) {
      tagHtml = '<span class="similar-tag similar-tag--' + tagInfo.verdict + '"' + tagId + '>' + (_SIMILAR_TAG_LABELS[tagInfo.verdict] || tagInfo.verdict) + '</span>';
    } else {
      tagHtml = '<span class="similar-tag"' + tagId + '></span>';
    }
    const markedSet = sourceId != null ? (MARKED_DUPS[sourceId] || new Set()) : new Set();
    const isMarked = markedSet.has(b.id);
    const cbChecked = isMarked ? ' checked' : '';
    const markedClass = isMarked ? ' similar-item--marked' : '';
    return `<li class="similar-item${isDup ? ' similar-item--dup' : ''}${isTraced ? ' similar-item--traced' : ''}${markedClass}"${tooltip}>
      <input type="checkbox" class="dup-cb"${cbChecked} data-source="${sourceId}" data-dup="${b.id}" onclick="event.stopPropagation(); toggleDupMark(this)">
      <a class="similar-bug-id" href="${bzUrl}" target="_blank">#${b.id}</a>
      ${tagHtml}
      ${scoreHint}
      <span class="similar-summary">${escHtml(b.summary)}</span>
      <span class="similar-status">${escHtml(statusText)}${isDup ? ' <span class="badge-dup">DUP</span>' : ''}${tracedHint}</span>
      ${tagInfo && tagInfo.reason ? `<span class="similar-reason">${escHtml(tagInfo.reason)}</span>` : ''}
    </li>`;
  }).join('');
}

function toggleDupMark(cb) {
  const sourceId = parseInt(cb.dataset.source);
  const dupId = parseInt(cb.dataset.dup);
  if (!MARKED_DUPS[sourceId]) MARKED_DUPS[sourceId] = new Set();
  if (cb.checked) {
    MARKED_DUPS[sourceId].add(dupId);
  } else {
    MARKED_DUPS[sourceId].delete(dupId);
  }
  const li = cb.closest('li');
  if (li) li.classList.toggle('similar-item--marked', cb.checked);

  // Clear the "none of these are duplicates" pin when a real duplicate is confirmed
  if (cb.checked && NO_DUP_CONFIRMED[sourceId]) {
    NO_DUP_CONFIRMED[sourceId] = false;
    const noDupCb = document.querySelector(`.no-dup-cb[data-source="${sourceId}"]`);
    if (noDupCb) {
      noDupCb.checked = false;
      const noDupLi = noDupCb.closest('li');
      if (noDupLi) noDupLi.classList.remove('similar-item--no-dup-pin--confirmed');
    }
  }

  _saveDupConfirmationState(sourceId);

  // Trigger workflow suggestion whenever the user checks (confirms) a duplicate
  if (cb.checked) {
    fetch(`/bug/${sourceId}/workflow-suggestion`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ user_confirmed_duplicate: true }),
    })
      .then(r => r.ok ? r.json() : null)
      .then(suggestion => {
        if (!suggestion || !suggestion.step) return;
        _dispatchWorkflowSuggestion(sourceId, suggestion);
      })
      .catch(() => {});
  }
}

function toggleNoDupMark(cb) {
  const sourceId = parseInt(cb.dataset.source);
  NO_DUP_CONFIRMED[sourceId] = cb.checked;
  const li = cb.closest('li');
  if (li) li.classList.toggle('similar-item--no-dup-pin--confirmed', cb.checked);

  // Clear any real-duplicate marks when confirming "none of these are duplicates"
  if (cb.checked && MARKED_DUPS[sourceId] && MARKED_DUPS[sourceId].size > 0) {
    MARKED_DUPS[sourceId].clear();
    document.querySelectorAll(`.dup-cb[data-source="${sourceId}"]`).forEach(dupCb => {
      dupCb.checked = false;
      const dupLi = dupCb.closest('li');
      if (dupLi) dupLi.classList.remove('similar-item--marked');
    });
  }

  _saveDupConfirmationState(sourceId);
  if (!cb.checked) return;
  fetch(`/bug/${sourceId}/workflow-suggestion`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ user_confirmed_no_duplicate: true }),
  })
    .then(r => r.ok ? r.json() : null)
    .then(suggestion => {
      if (!suggestion || !suggestion.step) return;
      _dispatchWorkflowSuggestion(sourceId, suggestion);
    })
    .catch(() => {});
}

async function findAndAnalyzeSimilar(bugId, btn) {
  btn.disabled = true;
  const list = document.getElementById(`similar-list-${bugId}`);

  showConsolePanel(`POST /bug/${bugId}/similar`, 'Duplicate Detection');

  // Step 1: local embedding search
  btn.textContent = 'Searching…';
  let similar = [];
  try {
    appendConsoleLines('Searching local corpus for similar bugs…');
    const r = await fetch(`/bug/${bugId}/similar?refresh=true`, { method: 'POST' });
    if (!r.ok) {
      appendConsoleLines('Local search failed', 'error');
      setConsolePanelStatus('Error', 'error');
      btn.textContent = 'Error'; btn.disabled = false; return;
    }
    ({ similar } = await r.json());
    const store = BUGS[bugId] || UPDATED_BUGS[bugId] || MY_ISSUES_DATA[bugId];
    if (store) store.similar = similar;
    appendConsoleLines(`Found ${similar.length} candidate${similar.length === 1 ? '' : 's'}`);
    if (list) list.innerHTML = `<li class="similar-empty">Analyzing ${similar.length} candidates…</li>`;
  } catch(e) {
    appendConsoleLines(String(e), 'error');
    setConsolePanelStatus('Error', 'error');
    btn.textContent = 'Error'; btn.disabled = false; return;
  }

  if (!similar.length) {
    if (list) list.innerHTML = '<li class="similar-empty">No similar bugs found.</li>';
    setConsolePanelStatus('Done', 'success');
    btn.textContent = 'Refresh →'; btn.disabled = false; return;
  }

  // Step 2: AI analysis (SSE)
  btn.textContent = 'Analyzing…';
  try {
    await streamSSE(`/bug/${bugId}/similar/analyze`, async (ev) => {
      if (ev.line !== undefined) {
        appendConsoleLines(ev.line, ev.type || 'normal');
      } else if (ev.error) {
        appendConsoleLines(ev.detail || 'Error', 'error');
      } else if (ev.done) {
        const classifications = ev.classifications || {};
        const store = BUGS[bugId] || UPDATED_BUGS[bugId] || MY_ISSUES_DATA[bugId];
        if (store) store.similar_ai_analysis = classifications;
        const allSimilar = (store || {}).similar || [];
        if (list) list.innerHTML = renderSimilarList(allSimilar, bugId, classifications);
        const shown = _filteredSimilarCount(allSimilar, classifications);
        const stab = document.getElementById(`stab-similar-${bugId}`);
        if (stab) stab.innerHTML = `Duplicate${shown ? ` <span class="stab-count">${shown}</span>` : ''}`;
        setConsolePanelStatus('Done', 'success');
        initSectionContent(bugId);
      }
    }, {}, [bugId, 'similar']);
    btn.textContent = 'Refresh →';
    btn.disabled = false;
  } catch(e) {
    appendConsoleLines(e.message || 'Network error', 'error');
    setConsolePanelStatus('Error', 'error');
    btn.textContent = 'Error';
    btn.disabled = false;
  }
}

async function clearCache(btn) {
  if (!confirm('Clear all triage results? This will re-triage all bugs on the next run.')) return;
  btn.disabled = true;
  btn.textContent = 'Clearing…';
  try {
    await fetch('/triage/clear', { method: 'POST' });
    reloadPage();
  } catch(e) {
    btn.textContent = 'Error';
    btn.disabled = false;
  }
}

    if (store) store.test_code = newCode;

function initSectionContent(bugId) {

    if (text && btn) btn.style.display = text.scrollHeight <= text.clientHeight + 2 ? 'none' : '';

  const container = document.getElementById(`section-content-${bugId}`);
  if (!container) return;
  let maxH = 0;
  ['summary', 'reproduce', 'test', 'similar', 'regression', 'test-site', 'rootcause', 'fix', 'review', 'ci', 'mozreg', 'reply'].forEach(t => {
    const body = document.getElementById(`sbody-${t}-${bugId}`);
    if (!body) return;
    const hidden = body.style.display === 'none';
    if (hidden) { body.style.visibility = 'hidden'; body.style.display = ''; }
    const h = body.offsetHeight;
    if (h > maxH) maxH = h;
    if (hidden) { body.style.display = 'none'; body.style.visibility = ''; }
  });
  if (maxH > 0) container.style.minHeight = maxH + 'px';
}

    const btn  = document.getElementById(`stab-${t}-${bugId}`);

      }
    }, {}, [bugId, 'test']);
  } catch(e) {
    appendLine(e.message || 'Network error', 'error');
    btn.textContent = orig; btn.disabled = false;
  }
}

const _runOutputs      = {};   // bugId → captured run output string
const _patchRunOutputs = {};   // bugId → captured patch-run output string
const _chatHistory     = {};   // bugId → [{role, content}]

function _renderMarkdown(text) {
  // Escape HTML first, then apply markdown patterns
  let s = text
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  // Fenced code blocks (preserve internal newlines)
  s = s.replace(/```[^\n]*\n([\s\S]*?)```/g, (_, code) =>
    '<pre class="chat-code">' + code.trimEnd() + '</pre>');
  // Inline code
  s = s.replace(/`([^`\n]+)`/g, '<code class="chat-inline-code">$1</code>');
  // Bold
  s = s.replace(/\*\*([^*\n]+)\*\*/g, '<strong>$1</strong>');
  // Headers
  s = s.replace(/^### (.+)$/gm, '<div class="chat-h3">$1</div>');
  s = s.replace(/^## (.+)$/gm,  '<div class="chat-h2">$1</div>');
  // Bullet list items
  s = s.replace(/^[*-] (.+)$/gm, '<div class="chat-li">• $1</div>');
  // Numbered list items
  s = s.replace(/^\d+\. (.+)$/gm, (_, item, off, src) => '<div class="chat-li">' + item + '</div>');
  // Paragraph breaks → spacing, then single newlines
  s = s.replace(/\n\n/g, '<br>').replace(/\n/g, '<br>');
  return s;
}

async function sendTestChat(bugId) {
  const input = document.getElementById(`test-chat-input-${bugId}`);
  const text = input.value.trim();
  if (!text) return;
  input.value = '';

  if (!_chatHistory[bugId]) _chatHistory[bugId] = [];
  _chatHistory[bugId].push({ role: 'user', content: text });

  const msgEl = document.getElementById(`test-chat-messages-${bugId}`);
  const userDiv = document.createElement('div');
  userDiv.className = 'chat-msg chat-msg--user';
  userDiv.textContent = text;
  msgEl.appendChild(userDiv);

  const asstDiv = document.createElement('div');
  asstDiv.className = 'chat-msg chat-msg--asst';
  msgEl.appendChild(asstDiv);
  msgEl.scrollTop = msgEl.scrollHeight;

  const sendBtn = document.getElementById(`test-chat-send-${bugId}`);
  sendBtn.disabled = true;

  let accText = '';
  try {
    await streamSSE(`/bug/${bugId}/testrun/discuss`, async (ev) => {
      if (ev.text) {
        accText += ev.text;
        asstDiv.innerHTML = _renderMarkdown(accText);
        msgEl.scrollTop = msgEl.scrollHeight;
      } else if (ev.done) {
        _chatHistory[bugId].push({ role: 'assistant', content: accText });
      } else if (ev.error) {
        asstDiv.textContent = '⚠ ' + ev.error;
      }
    }, {
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: _chatHistory[bugId] }),
    }, [bugId, 'test']);
  } catch(e) {
    asstDiv.innerHTML = '<span class="text-danger">⚠ ' + escHtml(e.message) + '</span>';
  } finally {
    sendBtn.disabled = false;
  }
}

async function fixTest(bugId, btn) {
  btn.disabled = true;
  btn.textContent = 'Fixing…';

  const msgEl = document.getElementById(`test-chat-messages-${bugId}`);

  const userDiv = document.createElement('div');
  userDiv.className = 'chat-msg chat-msg--user';
  userDiv.textContent = 'Fix the test — this failure is unrelated to the bug.';
  msgEl.appendChild(userDiv);

  const asstDiv = document.createElement('div');
  asstDiv.className = 'chat-msg chat-msg--asst';
  asstDiv.textContent = 'Analyzing failure and rewriting test…';
  msgEl.appendChild(asstDiv);
  msgEl.scrollTop = msgEl.scrollHeight;

  // Include the latest assistant analysis if one exists
  const history = _chatHistory[bugId] || [];
  const lastAnalysis = [...history].reverse().find(m => m.role === 'assistant')?.content || '';

  try {
    await streamSSE(`/bug/${bugId}/testcase/fix`, async (ev) => {
      if (ev.cancelled) {
        btn.textContent = 'Fix Test →'; btn.disabled = false;
      } else if (ev.done && ev.test_code) {
        const store = BUGS[bugId] || UPDATED_BUGS[bugId] || MY_ISSUES_DATA[bugId];
        if (store) store.test_code = ev.test_code;
        const codeEl = document.getElementById(`testgen-code-${bugId}`);
        if (codeEl) {
          const inner = codeEl.querySelector('code') || codeEl;
          inner.textContent = ev.test_code;
          if (inner.tagName === 'CODE') _applyCodeHighlight(inner, 'js');
        }
        const wrapEl = document.getElementById(`testgen-code-wrap-${bugId}`);
        if (wrapEl) wrapEl.style.display = '';
        asstDiv.innerHTML = '✓ Test fixed and saved. Scroll up to see the updated code.';
        btn.textContent = 'Fix Test →';
        btn.disabled = false;
      } else if (ev.error) {
        throw new Error(ev.error);
      }
    }, {
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ analysis: lastAnalysis }),
    }, [bugId, 'test']);
  } catch(e) {
    asstDiv.innerHTML = '<span class="text-danger">⚠ ' + escHtml(e.message) + '</span>';
    btn.textContent = 'Fix Test →';
    btn.disabled = false;
  }
}

async function generateTestSite(bugId, mode, attachmentId) {
  document.querySelectorAll('.testsite-gen-menu.open').forEach(m => m.classList.remove('open'));
  const btn = document.getElementById(`gen-testsite-btn-${bugId}`);
  const orig = btn.textContent;
  btn.disabled = true;
  btn.textContent = 'Generating…';
  showConsolePanel(`POST /bug/${bugId}/testsite`, 'Test Site Generation');
  const url = attachmentId
    ? `/bug/${bugId}/testsite?mode=${mode}&attachment_id=${attachmentId}`
    : `/bug/${bugId}/testsite?mode=${mode}`;
  try {
    await streamSSE(url, async (ev) => {
      if (ev.line !== undefined) {
        appendConsoleLines(ev.line, ev.type || 'normal');
      } else if (ev.cancelled) {
        btn.textContent = orig; btn.disabled = false;
      } else if (ev.error) {
        appendConsoleLines(ev.detail || 'Error', 'error');
        setConsolePanelStatus('Failed', 'error');
        btn.textContent = orig; btn.disabled = false;
      } else if (ev.done) {
        _tsActivateVariantTab(bugId, ev.mode || mode);
        const tab = document.getElementById(`stab-test-site-${bugId}`);
        if (tab && !tab.textContent.includes('✓')) tab.textContent = 'Test Site ✓';
        _dispatchTestSiteChange(bugId, ev.source || 'generated');
        setConsolePanelStatus('Done', 'success');
        btn.textContent = 'Regenerate ▾'; btn.disabled = false;
        initSectionContent(bugId);
        fetch(`/bug/${bugId}/workflow-suggestion`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({}),
        })
          .then(r => r.ok ? r.json() : null)
          .then(suggestion => {
            if (!suggestion || !suggestion.step) return;
            _dispatchWorkflowSuggestion(bugId, suggestion);
          })
          .catch(() => {});
      }
    }, {}, [bugId, 'test-site']);
  } catch(e) {
    appendConsoleLines(e.message || 'Network error', 'error');
    setConsolePanelStatus('Error', 'error');
    btn.textContent = orig; btn.disabled = false;
  }
}

async function simplifyTestSite(bugId, sourceMode) {
  document.querySelectorAll('.testsite-gen-menu.open').forEach(m => m.classList.remove('open'));
  const btn = document.getElementById(`simplify-testsite-btn-${bugId}`);

    await streamSSE(`/bug/${bugId}/testsite/simplify?source_mode=${encodeURIComponent(sourceMode)}`, async (ev) => {
      if (ev.line !== undefined) {
        appendConsoleLines(ev.line, ev.type || 'normal');

        if (btn) { btn.disabled = false; btn.textContent = orig; }

}

function _tsActivateVariantTab(bugId, mode) {
  const navId = `testsite-${bugId}`;
  const nav = document.querySelector(`.panel-nav[data-nav-id="${navId}"]`);
  const panes = document.querySelector(`.panel-panes[data-nav-id="${navId}"]`);
  const label = escHtml(_tsTabLabel(mode));
  const safeMode = escHtml(mode);
  const src = `/bug/${bugId}/testsite/html?mode=${encodeURIComponent(mode)}`;

  if (!nav) {
    // No panel-nav yet — build one from the empty placeholder
    const placeholder = document.getElementById(`testsite-no-variants-${bugId}`);
    if (!placeholder) return;

    const newNav = document.createElement('div');
    newNav.className = 'panel-nav';
    newNav.dataset.navId = navId;
    newNav.innerHTML = `<button class="panel-nav__tab panel-nav__tab--active" data-pane-id="${safeMode}"
        onclick="switchTestSiteTab(this, ${bugId})">${label}</button>`;

    const newPanes = document.createElement('div');
    newPanes.className = 'panel-panes';
    newPanes.dataset.navId = navId;
    newPanes.innerHTML = `
      <div class="panel-pane panel-pane--active" data-pane-id="${safeMode}">
        <div class="testsite-pane-controls">
          <a class="btn-reanalyze testsite-newtab-btn" href="${src}" target="_blank" rel="noopener">Open in new tab ↗</a>
        </div>
        <iframe id="testsite-iframe-${bugId}-${safeMode}" src="${src}"
          data-src="${src}" sandbox="allow-scripts allow-forms"
          style="width:100%;height:calc(100vh - 280px);min-height:400px;border:none;background:#fff;display:block;"></iframe>
      </div>`;

    placeholder.replaceWith(newNav);
    newNav.after(newPanes);
  } else {
    let tab = nav.querySelector(`.panel-nav__tab[data-pane-id="${mode}"]`);
    let pane = panes ? panes.querySelector(`.panel-pane[data-pane-id="${mode}"]`) : null;

    if (!tab) {
      // 'simplified' always goes last (rightmost); all others go to front (most recent = leftmost)
      const insertAtEnd = mode === 'simplified';
      tab = document.createElement('button');
      tab.className = 'panel-nav__tab';
      tab.dataset.paneId = mode;
      tab.setAttribute('onclick', `switchTestSiteTab(this, ${bugId})`);
      tab.textContent = label;
      if (insertAtEnd) nav.appendChild(tab); else nav.insertBefore(tab, nav.firstChild);

      pane = document.createElement('div');
      pane.className = 'panel-pane';
      pane.dataset.paneId = mode;
      pane.innerHTML = `
        <div class="testsite-pane-controls">
          <a class="btn-reanalyze testsite-newtab-btn" href="${src}" target="_blank" rel="noopener">Open in new tab ↗</a>
        </div>
        <iframe id="testsite-iframe-${bugId}-${safeMode}" src="${src}"
          data-src="${src}" sandbox="allow-scripts allow-forms"
          style="width:100%;height:calc(100vh - 280px);min-height:400px;border:none;background:#fff;display:block;"></iframe>`;
      if (panes) { if (insertAtEnd) panes.appendChild(pane); else panes.insertBefore(pane, panes.firstChild); }
    } else {
      // Existing mode — move to front (or keep at end for 'simplified') and refresh iframe
      if (mode === 'simplified') {
        nav.appendChild(tab);
        if (pane && panes) panes.appendChild(pane);
      } else {
        nav.insertBefore(tab, nav.firstChild);
        if (pane && panes) panes.insertBefore(pane, panes.firstChild);
      }
      const frame = document.getElementById(`testsite-iframe-${bugId}-${mode}`);
      if (frame) { frame.src = src; frame.dataset.src = src; }
    }
    activatePanelTab(navId, mode);
  }

  // Update in-memory store across all bug stores; 'simplified' always last
  const now = new Date().toISOString().slice(0, 19);
  for (const store of [
    typeof BUGS !== 'undefined' ? BUGS : null,
    typeof UPDATED_BUGS !== 'undefined' ? UPDATED_BUGS : null,
    typeof MY_ISSUES_DATA !== 'undefined' ? MY_ISSUES_DATA : null,
  ]) {
    if (!store || !store[bugId]) continue;
    const variants = store[bugId].test_site_variants || [];
    const idx = variants.findIndex(v => v.mode === mode);
    if (idx >= 0) variants.splice(idx, 1);
    if (mode === 'simplified') variants.push({ mode, generated_at: now });
    else variants.unshift({ mode, generated_at: now });
    store[bugId].test_site_variants = variants;
  }
}

      const parts = [];
      if (data.firefox.address > 0 || data.firefox.credit_card > 0)
        parts.push(`FF: ${data.firefox.address}/${data.firefox.credit_card}`);
      if (data.chrome.address > 0 || data.chrome.credit_card > 0)
        parts.push(`CR: ${data.chrome.address}/${data.chrome.credit_card}`);
      statusEl.textContent = parts.join(' · ');
      statusEl.className = `panel-nav__badge${(ffOk || crOk) ? ' panel-nav__badge--ok' : ''}`;
    }
  } catch(e) {}
}

async function setupAutofillData(bugId, browser) {
  const btnId = browser === 'firefox' ? `repro-autofill-ff-btn-${bugId}` : `repro-autofill-cr-btn-${bugId}`;
  const btn = document.getElementById(btnId);
  if (btn) btn.disabled = true;
  const sel   = _reproduceSelected[bugId];
  const pwVer = (browser === 'firefox' && sel) ? encodeURIComponent(sel.playwright_version) : '';
  const label = browser === 'firefox' ? 'Firefox Autofill Setup' : 'Chrome Autofill Capture';
  showConsolePanel(`Setting up ${browser} autofill data…`, label);
  try {
    await streamSSE(`/autofill-setup/run?browser=${browser}&playwright_version=${pwVer}`, async (ev) => {
      if (ev.line !== undefined) appendConsoleLines(ev.line, ev.type || 'normal');
      else if (ev.error) {
        appendConsoleLines(ev.detail || 'Error', 'error');
        setConsolePanelStatus('Failed', 'error');
      } else if (ev.done) {
        await loadAutofillStatus(bugId);
        setConsolePanelStatus('Done', 'success');
      }
    });
  } catch(e) {
    if (e.name !== 'AbortError') appendConsoleLines('Request failed: ' + e, 'error');
  } finally {
    if (btn) btn.disabled = false;
  }
}

async function deleteAutofillData(bugId, browser) {
  const delBtnId = browser === 'firefox' ? `repro-autofill-ff-del-${bugId}` : `repro-autofill-cr-del-${bugId}`;
  const delBtn = document.getElementById(delBtnId);
  if (delBtn) delBtn.disabled = true;
  try {
    await fetch(`/autofill-setup/data?browser=${browser}`, { method: 'DELETE' });
    await loadAutofillStatus(bugId);
  } finally {
    if (delBtn) delBtn.disabled = false;
  }
}

async function initReproducePanel(bugId) {
  const [releases, versionData] = await Promise.all([_loadNightlyDates(), loadReproduceVersions()]);

  // Default to the most recent available nightly
  if (!_reproduceSelected[bugId]) {
    const first = releases[0] || _fallbackVersions(1)[0];
    _reproduceSelected[bugId] = {
      browser: 'firefox',
      playwright_version: 'mozreg',
      browser_version: first.version,
      channel: first.channel || 'nightly',
    };
  }

  // Load filed-version ghost node (may fetch from backend; completes before first render)
  await _loadFiledNode(bugId, releases);

  // Render Firefox timeline immediately so the default selection is visible before run data loads
  _renderMozregRunHistory(bugId);

  // Render Chrome column if available
  const chromeVersions = (versionData.versions || []).filter(v => v.browser === 'chromium');
  const chromeVer = chromeVersions[chromeVersions.length - 1] || null;
  const chromeCol = document.getElementById(`repro-chrome-col-${bugId}`);
  const chromeSep = document.getElementById(`repro-chrome-sep-${bugId}`);
  if (chromeVer && chromeCol) {
    const cMajor = parseInt(chromeVer.browser_version.split('.')[0]);
    const cInstallId = `repro-install-${bugId}-chromium`.replace(/\./g, '_');
    const installHtml = !chromeVer.installed
      ? `<div class="repro-tl-install" id="${cInstallId}">
           <span class="repro-tl-warn">not installed</span>
           <button class="btn-warning btn--xs" onclick="installReproVersion(${bugId}, 'chromium', '${chromeVer.playwright_version}', '${chromeVer.browser_version}', '${cInstallId}', this); event.stopPropagation()">Install</button>
         </div>`
      : '';
    chromeCol.innerHTML = `
      <div class="rcc-head">Chrome</div>
      <div class="repro-tl-node repro-chrome-node" data-pw="${chromeVer.playwright_version}" data-browser="chromium" data-bver="${chromeVer.browser_version}"
           onclick="selectChromeRun(${bugId}, '${chromeVer.playwright_version}', '${chromeVer.browser_version}', this)">
        <div class="repro-tl-dot"></div>
        <div class="repro-tl-label">${cMajor}</div>
        <div class="repro-tl-tag">latest</div>
        ${installHtml}
      </div>`;
    chromeCol.style.display = '';
    if (chromeSep) chromeSep.style.display = '';
    // Restore tl-selected on Chrome node if Chrome is the current selection
    const sel = _reproduceSelected[bugId];
    if (sel && sel.browser === 'chromium') {
      const chromeNode = chromeCol.querySelector('.repro-chrome-node');
      if (chromeNode) chromeNode.classList.add('tl-selected');
    }
  }

  await loadReproRuns(bugId);
  await loadAutofillStatus(bugId);
  await loadLoginsStatus(bugId);

  // Pre-populate Strategy tab from saved DB data if not already loaded
  const bugData = BUGS[bugId] || UPDATED_BUGS[bugId] || MY_ISSUES_DATA[bugId];
  if (!_reproStrategy[bugId]) {
    const saved = (bugData && bugData.reproduce_strategy) || null;
    if (saved) {
      if (Array.isArray(saved.plan_steps)) {
        saved.plan_steps = saved.plan_steps.map(s =>
          typeof s === 'string' ? { text: s } : s
        );
      }
      _reproStrategy[bugId] = saved;
      renderReproStrategy(bugId, saved);
    }
  }
}

let _nightlyReleases = null;  // [{version, channel}, ...] cached per session from /reproduce/nightly-dates
const _filedNodes = {};       // bugId -> {version, channel} | null — filed-version ghost node

async function _loadNightlyDates() {
  if (_nightlyReleases) return _nightlyReleases;
  try {
    const res = await fetch('/reproduce/nightly-dates');
    const data = await res.json();
    const releases = data.releases || [];
    if (releases.some(r => r.version)) _nightlyReleases = releases;
    return releases;
  } catch(e) {
    return [];
  }
}

function _parseFiledVersion(versionStr) {
  if (!versionStr) return null;
  const lower = versionStr.toLowerCase().trim();
  if (lower === 'unspecified' || lower === 'trunk' || lower === 'all' || lower === '') return null;
  const m = versionStr.match(/\b(\d{2,3})\b/);
  return m ? parseInt(m[1]) : null;
}

async function _loadFiledNode(bugId, releases) {
  if (bugId in _filedNodes) return;
  const store = BUGS[bugId]
    || (typeof UPDATED_BUGS !== 'undefined' && UPDATED_BUGS[bugId])
    || (typeof MY_ISSUES_DATA !== 'undefined' && MY_ISSUES_DATA[bugId]);
  const filedVer = _parseFiledVersion(store ? store.version : null);
  if (!filedVer) { _filedNodes[bugId] = null; return; }
  // If filed version is already in the window, no ghost node needed
  if (releases.some(r => r.version === `${filedVer}.0`)) { _filedNodes[bugId] = null; return; }
  try {
    const resp = await fetch(`/reproduce/nightly-date-for-version/${filedVer}`);
    if (resp.ok) {
      _filedNodes[bugId] = await resp.json();
    } else {
      _filedNodes[bugId] = null;
    }
  } catch(e) {
    _filedNodes[bugId] = null;
  }
}

function _fallbackVersions(n) {
  // Estimate current nightly: Firefox 128 released 2024-07-09, ~one release per 28 days.
  // n = total items to return: always nightly + beta + (n-2) releases.
  const REF_VERSION = 128, REF_MS = Date.UTC(2024, 6, 9);
  const nightly = REF_VERSION + Math.floor((Date.now() - REF_MS) / (28 * 86400000)) + 2;
  const result = [
    { version: `${nightly}.0`, channel: 'nightly' },
    { version: `${nightly - 1}.0`, channel: 'beta' },
  ];
  for (let i = 0; i < n - 2; i++) {
    result.push({ version: `${nightly - 2 - i}.0`, channel: 'release' });
  }
  return result;
}

function _syncPlanStepsFromDOM(bugId) {
  const stepsEl = document.getElementById(`repro-strategy-steps-${bugId}`);
  if (!stepsEl || !_reproStrategy[bugId]) return;
  if (!_reproStrategy[bugId].plan_steps) _reproStrategy[bugId].plan_steps = [];
  // Flush any active edit first
  if (stepsEl.contains(document.activeElement)) document.activeElement.blur();
  // Re-read every step text from DOM to catch any unsaved edits
  stepsEl.querySelectorAll('.repro-ana-step-row').forEach(row => {
    const idx = parseInt(row.dataset.idx, 10);
    if (isNaN(idx) || idx >= _reproStrategy[bugId].plan_steps.length) return;
    const textEl = row.querySelector('.repro-ana-step-text');
    if (!textEl) return;
    const text = textEl.textContent.trim();
    if (!text) return;
    const s = _reproStrategy[bugId].plan_steps[idx];
    _reproStrategy[bugId].plan_steps[idx] = typeof s === 'object' ? { ...s, text } : { text };
  });
}

async function runReproVersion(bugId) {
  _syncPlanStepsFromDOM(bugId);
  const sel = _reproduceSelected[bugId];
  if (!sel) { alert('Select a nightly date in the timeline first.'); return; }
  const headless = _reproduceHeadless[bugId] === true;
  const label = sel.browser === 'chromium'
    ? `Chrome ${sel.browser_version}`
    : `Firefox ${sel.browser_version} (${sel.channel || 'release'})`;
  showConsolePanel(`Reproduce: ${label}`, 'Reproduce');
  await _streamReproVersion(bugId, sel, headless);
}

async function _streamReproVersion(bugId, sel, headless) {
  const url = `/bug/${bugId}/reproduce/version`;
  try {
    await streamSSE(url, async (ev) => {
      if (ev.line) appendConsoleLines(ev.line, ev.type || 'normal');
      if (ev.done) {
        await loadReproRuns(bugId);
        if (ev.result) {
          const type = ev.result.status === 'reproduced' ? 'success'
                     : ev.result.status === 'not_reproduced' ? 'warn' : 'error';
          setConsolePanelStatus(ev.result.label, type);
        }
      }
      if (ev.error) appendConsoleLines(ev.detail || 'Error', 'error');
    }, {
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        browser: sel.browser,
        playwright_version: sel.playwright_version,
        headless,
        launch_date: sel.browser === 'chromium' ? '2026-04-21' : sel.browser_version,
        channel: sel.browser === 'chromium' ? 'release' : (sel.channel || 'release'),
        test_site_mode: _testSiteMode[bugId] || null,
        plan_steps: (_reproStrategy[bugId] || {}).plan_steps || [],
        prerequisites: (_reproStrategy[bugId] || {}).prerequisites || [],
      }),
    }, [bugId, 'reproduce']);
  } catch(e) {
    appendConsoleLines('Request failed: ' + e, 'error');
  }
}


async function loadReproRuns(bugId) {
  try {
    const res = await fetch(`/bug/${bugId}/reproduce/runs`);
    const runs = await res.json();
    renderReproRuns(bugId, runs);
  } catch(e) {}
}

function renderReproRuns(bugId, runs) {
  const map = new Map();
  (runs || []).forEach(r => map.set(`${r.browser}___${r.browser_version}`, r));
  _reproRuns[bugId] = map;
  _renderMozregRunHistory(bugId);
  _updateChromeDot(bugId);
  _showReproDrawer(bugId);
}

function _updateChromeDot(bugId) {
  const chromeCol = document.getElementById(`repro-chrome-col-${bugId}`);
  if (!chromeCol) return;
  const map = _reproRuns[bugId];
  if (!map) return;
  chromeCol.querySelectorAll('.repro-tl-node').forEach(node => {
    const run = map.get(`${node.dataset.browser}___${node.dataset.bver}`);
    const dot = node.querySelector('.repro-tl-dot');
    const tag = node.querySelector('.repro-tl-tag');
    if (!dot || !run) return;
    dot.classList.remove('reproduced', 'not-reproduced', 'run-error');
    if (run.status === 'reproduced') { dot.classList.add('reproduced'); if (tag) tag.textContent = '✓ repro'; }
    else if (run.status === 'not_reproduced') { dot.classList.add('not-reproduced'); if (tag) tag.textContent = '✗ not repro'; }
    else { dot.classList.add('run-error'); if (tag) tag.textContent = '⚠ error'; }
  });
}

function _renderMozregRunHistory(bugId) {
  const timeline = document.getElementById(`repro-timeline-${bugId}`);
  if (!timeline) return;
  const map = _reproRuns[bugId] || new Map();
  const releases = (_nightlyReleases && _nightlyReleases.length)
    ? _nightlyReleases
    : _fallbackVersions(5);
  const selVersion = (_reproduceSelected[bugId] || {}).browser_version;
  const _SAFE_CHANNELS = new Set(['release', 'beta', 'nightly']);
  let html = '';
  for (const rel of releases) {
    const version = String(rel.version || '');
    const channel = _SAFE_CHANNELS.has(rel.channel) ? rel.channel : 'release';
    const run = map.get(`firefox___${version}`);
    const isSel = version === selVersion;
    let dotCls = '', tag = 'no run';
    if (run) {
      dotCls = run.status === 'reproduced' ? 'reproduced' : run.status === 'not_reproduced' ? 'not-reproduced' : 'run-error';
      tag = run.status === 'reproduced' ? '✓ repro' : run.status === 'not_reproduced' ? '✗ not repro' : '⚠ error';
    }
    html += `<div class="repro-tl-node repro-tl-node--${channel}${isSel ? ' tl-selected' : ''}" title="${escHtml(channel)}"
                  onclick="selectMozregRun(${bugId}, '${escHtml(version)}', '${channel}', this)">
      <div class="repro-tl-dot ${dotCls}"></div>
      <div class="repro-tl-label">${escHtml(version)}</div>
      <div class="repro-tl-tag">${channel !== 'release' ? channel : ''}</div>
    </div>`;
  }

  const filed = _filedNodes[bugId];
  if (filed) {
    const isSelFiled = filed.version === selVersion;
    const filedRun = map.get(`firefox___${filed.version}`);
    let filedDotCls = '';
    if (filedRun) {
      filedDotCls = filedRun.status === 'reproduced' ? 'reproduced'
        : filedRun.status === 'not_reproduced' ? 'not-reproduced' : 'run-error';
    }
    const filedChannel = _SAFE_CHANNELS.has(filed.channel) ? filed.channel : 'release';
    html += `<div class="repro-tl-bridge"></div>
    <div class="repro-tl-node repro-tl-node--filed${isSelFiled ? ' tl-selected' : ''}" title="${escHtml(filed.version)}"
         onclick="selectMozregRun(${bugId}, '${escHtml(filed.version)}', '${filedChannel}', this)">
      <div class="repro-tl-filed-badge">filed</div>
      <div class="repro-tl-dot ${filedDotCls}"></div>
      <div class="repro-tl-label">${escHtml(filed.version)}</div>
      <div class="repro-tl-tag"></div>
    </div>`;
  }

  timeline.innerHTML = html;
}

function _showReproDrawer(bugId) {
  const drawerEl = document.getElementById(`repro-drawer-${bugId}`);
  if (!drawerEl) return;
  const sel = _reproduceSelected[bugId];
  if (!sel) { drawerEl.style.display = 'none'; return; }
  const map = _reproRuns[bugId];
  const run = map && map.get(`${sel.browser}___${sel.browser_version}`);
  if (!run) { drawerEl.style.display = 'none'; return; }
  drawerEl.style.display = '';
  drawerEl.innerHTML = _buildReproDrawerHtml(bugId, run);
}

function _buildReproDrawerHtml(bugId, run) {
  const isChrome = run.browser === 'chromium';
  const icon = isChrome ? '🌐' : '🦊';
  const browserLabel = isChrome ? 'Chrome' : 'Firefox';

  const badge = run.status === 'reproduced'
    ? '<span class="repro-badge repro-badge--reproduced">✓ Reproduced</span>'
    : run.status === 'not_reproduced'
      ? '<span class="repro-badge repro-badge--not-reproduced">✗ Not Reproduced</span>'
      : '<span class="repro-badge repro-badge--error">⚠ Error</span>';

  const _screenshotTs = run.run_at ? `?t=${encodeURIComponent(run.run_at)}` : '';
  const _screenshotSrc = `/bug/${bugId}/reproduce/screenshot/${run.browser}/${encodeURIComponent(run.browser_version)}${_screenshotTs}`;
  const _screenshotThumb = run.has_screenshot
    ? `<div class="repro-drawer-step-thumb" onclick="openReproScreenshot(${bugId}, '${run.browser}', '${escHtml(run.browser_version)}')">
         <img src="${_screenshotSrc}" alt="screenshot">
       </div>`
    : '';

  // Verify checkpoints — plan steps that have an expected_result
  const verifySteps = ((_reproStrategy[bugId] || {}).plan_steps || [])
    .filter(s => s && s.expected_result && (s.text || '').trim());

  let checkpointsHtml = '';
  if (verifySteps.length) {
    // Build lookup from step_results by normalised text, and by position as fallback
    const srByText = new Map();
    (run.step_results || []).forEach(sr => {
      srByText.set((sr.step || '').trim().toLowerCase(), sr);
    });

    const rows = verifySteps.map((s, vi) => {
      const key = s.text.trim().toLowerCase();
      // Try text match first, then position fallback
      const sr = srByText.get(key) || (run.step_results || [])[vi] || null;

      let numCls, badge2, obsHtml;
      if (!sr) {
        numCls  = 'repro-drawer-step-num--blocked';
        badge2  = '<span class="repro-drawer-step-badge repro-drawer-step-badge--blocked">⚠ not reached</span>';
        obsHtml = '';
      } else if (sr.passed) {
        numCls  = 'repro-drawer-step-num--pass';
        badge2  = '<span class="repro-drawer-step-badge repro-drawer-step-badge--pass">✓ confirmed</span>';
        obsHtml = sr.observed ? `<div class="repro-drawer-step-obs">${escHtml(sr.observed)}</div>` : '';
      } else {
        numCls  = 'repro-drawer-step-num--fail';
        badge2  = '<span class="repro-drawer-step-badge repro-drawer-step-badge--fail">✗ not seen</span>';
        obsHtml = sr.observed ? `<div class="repro-drawer-step-obs">${escHtml(sr.observed)}</div>` : '';
      }

      const expectedHtml = s.expected_result
        ? `<div class="repro-drawer-step-expected">Expected: ${escHtml(s.expected_result)}</div>` : '';
      // Attach screenshot to the last checkpoint only
      const isLast = vi === verifySteps.length - 1;
      return `<div class="repro-drawer-step">
        <div class="repro-drawer-step-num ${numCls}">${vi + 1}</div>
        <div class="repro-drawer-step-body">
          <div class="repro-drawer-step-title">${escHtml(s.text)}${badge2}</div>
          ${expectedHtml}
          ${obsHtml}
          ${isLast ? _screenshotThumb : ''}
        </div>
      </div>`;
    }).join('');

    checkpointsHtml = `<div class="repro-drawer-steps-label">Verify checkpoints</div>
      <div class="repro-drawer-steps">${rows}</div>`;
  } else if (run.status === 'error' && !(run.step_results || []).length) {
    checkpointsHtml = `<div class="repro-drawer-blocked">⚠ AI could not complete this run</div>`;
  }

  // Fall back to standalone screenshot when there are no checkpoints
  const standaloneThumb = !verifySteps.length ? _screenshotThumb : '';

  const dateHtml = run.run_at
    ? `<div class="repro-drawer-date">Run on ${run.run_at.slice(0, 10)}</div>`
    : '';

  return `<div class="repro-drawer-head">
    <span class="repro-drawer-title">${icon} ${browserLabel} ${escHtml(run.browser_version)}</span>
    ${badge}
  </div>
  ${standaloneThumb}
  ${checkpointsHtml}
  ${dateHtml}`;
}

function openReproScreenshot(bugId, browser, version) {
  const map = _reproRuns[bugId];
  const run = map && map.get(`${browser}___${version}`);
  const ts = run && run.run_at ? `?t=${encodeURIComponent(run.run_at)}` : '';
  window.open(`/bug/${bugId}/reproduce/screenshot/${browser}/${encodeURIComponent(version)}${ts}`, '_blank');
}

async function installReproVersion(bugId, browser, pwVer, bVer, containerId, btn) {
  btn.disabled = true;
  btn.textContent = 'Installing…';
  showConsolePanel(`Install ${browser} ${bVer}`, 'Install');
  let success = false;
  try {
    await streamSSE(`/reproduce/install-version?browser=${browser}&playwright_version=${encodeURIComponent(pwVer)}`, async (ev) => {
      if (ev.line) appendConsoleLines(ev.line, ev.type || 'normal');
      if (ev.done) success = ev.success;
      if (ev.error) appendConsoleLines(ev.detail || 'Error', 'error');
    });
  } catch(e) {
    appendConsoleLines('Install failed: ' + e, 'error');
  }
  if (success) {
    const container = document.getElementById(containerId);
    if (container) container.remove();
    _reproduceVersions = null;
  } else {
    btn.disabled = false;
    btn.textContent = 'Retry Install';
  }
}

// ── Reproduce strategy ─────────────────────────────────────────────────────────

const _reproStrategy = {};  // bugId → {data_type, scenario, analysis, plan_steps}

const _ANA_TYPE_LABELS = {
  address:     { text: 'Address autofill',      cls: 'repro-ana-badge--addr' },
  credit_card: { text: 'Credit card autofill',  cls: 'repro-ana-badge--cc'   },
  both:        { text: 'Address + credit card', cls: 'repro-ana-badge--both' },
  none:        { text: 'No autofill',           cls: 'repro-ana-badge--none' },
};

const _ANA_SCENARIO_LABELS = {
  doorhanger:           'Doorhanger',
  autocomplete_dropdown:'Autocomplete dropdown',
  fill_action:          'Fill action',
  management_page:      'Management page',
  other:                'Other',
};

async function runReproStrategy(bugId) {
  const emptyEl  = document.getElementById(`repro-strategy-empty-${bugId}`);
  const resultEl = document.getElementById(`repro-strategy-result-${bugId}`);
  const tabEl    = document.getElementById(`repro-strategy-tab-${bugId}`);

  if (emptyEl)  emptyEl.style.display  = 'none';
  if (resultEl) resultEl.style.display = 'none';

  const loadingEl = document.getElementById(`repro-strategy-loading-${bugId}`) || (() => {
    const d = document.createElement('div');
    d.id = `repro-strategy-loading-${bugId}`;
    d.className = 'repro-analysis-loading';
    d.textContent = 'Analyzing…';
    const pane = document.getElementById(`repro-strategy-${bugId}`);
    if (pane) pane.appendChild(d);
    return d;
  })();
  loadingEl.style.display = '';

  if (tabEl) switchPanelTab(tabEl);
  showConsolePanel(`Analyzing reproduce strategy for bug #${bugId}…`, 'Analyze');

  try {
    await streamSSE(`/bug/${bugId}/reproduce/analyze`, async (ev) => {
      if (ev.line) appendConsoleLines(ev.line, ev.type || 'normal');
      if (ev.done && ev.result) {
        const result = ev.result;
        // Normalize plan_steps to {text, expected_result?} objects
        if (Array.isArray(result.plan_steps)) {
          result.plan_steps = result.plan_steps.map(s =>
            typeof s === 'string' ? { text: s } : s
          );
        }
        _reproStrategy[bugId] = result;
        renderReproStrategy(bugId, result);
        // Re-evaluate the Saved Logins tab visibility — analyze may have
        // just added `logins_data` to the prereq list.
        loadLoginsStatus(bugId);
        setConsolePanelStatus('Done', 'success');
      }
      if (ev.error) {
        loadingEl.textContent = 'Analysis failed: ' + (ev.detail || 'unknown error');
        appendConsoleLines(ev.detail || 'Analysis failed', 'error');
        setConsolePanelStatus('Failed', 'error');
      }
    });
  } catch(e) {
    loadingEl.textContent = 'Analysis failed: ' + e;
    appendConsoleLines('Analysis failed: ' + e, 'error');
    setConsolePanelStatus('Failed', 'error');
    return;
  }
  loadingEl.style.display = 'none';
}

function renderReproStrategy(bugId, result) {
  const emptyEl    = document.getElementById(`repro-strategy-empty-${bugId}`);
  const resultEl   = document.getElementById(`repro-strategy-result-${bugId}`);
  const badgesEl   = document.getElementById(`repro-strategy-badges-${bugId}`);
  const textEl     = document.getElementById(`repro-strategy-text-${bugId}`);
  const stepsEl    = document.getElementById(`repro-strategy-steps-${bugId}`);
  const tabBadgeEl = document.getElementById(`repro-strategy-badge-${bugId}`);

  if (!resultEl) return;

  if (badgesEl) {
    // Non-autofill bugs run through the generic analyze prompt, which omits
    // data_type and scenario. Hide each badge when its source field is absent
    // rather than rendering "undefined".
    let html = '';
    if (result.data_type) {
      const typeInfo = _ANA_TYPE_LABELS[result.data_type]
        || { text: result.data_type, cls: 'repro-ana-badge--none' };
      html += `<span class="repro-ana-badge ${typeInfo.cls}">${typeInfo.text}</span>`;
    }
    if (result.scenario) {
      const scenLabel = _ANA_SCENARIO_LABELS[result.scenario] || result.scenario;
      html += `<span class="repro-ana-badge repro-ana-badge--scen">${scenLabel}</span>`;
    }
    badgesEl.innerHTML = html;
  }

  if (textEl) textEl.textContent = result.analysis || '';
  if (stepsEl) {
    _renderPrerequisites(bugId);
    _renderPlanSteps(bugId);
  }

  if (tabBadgeEl) tabBadgeEl.textContent = ' ✓';

  if (emptyEl) emptyEl.style.display = 'none';
  resultEl.style.display = '';
}

function toggleRunUntilMenu(bugId, event) {
  event.stopPropagation();
  const dropdown = document.getElementById(`run-until-dropdown-${bugId}`);
  if (!dropdown) return;

  if (dropdown.style.display === 'block') {
    dropdown.style.display = 'none';
    return;
  }

  const plan = (_reproStrategy[bugId] || {}).plan_steps || [];
  if (!plan.length) return;

  dropdown.innerHTML = plan.map((s, i) => {
    const text = (typeof s === 'object' ? s.text : String(s)) || `Step ${i + 1}`;
    return `<button class="btn-menu-item" onclick="runUntilStep(${bugId}, ${i}); document.getElementById('run-until-dropdown-${bugId}').style.display='none'; event.stopPropagation()">${i + 1}. ${escHtml(text)}</button>`;
  }).join('');

  dropdown.style.display = 'block';
  setTimeout(() => {
    document.addEventListener('click', function _close() {
      dropdown.style.display = 'none';
      document.removeEventListener('click', _close);
    }, { once: true });
  }, 0);
}

async function runUntilStep(bugId, stepIdx) {
  _syncPlanStepsFromDOM(bugId);
  const sel = _reproduceSelected[bugId] || { browser: 'firefox', playwright_version: 'mozreg', browser_version: _fallbackVersions(1)[0].version, channel: 'nightly' };
  const plan = (_reproStrategy[bugId] || {}).plan_steps || [];
  const stepEntry = plan[stepIdx];
  const stepLabel = (stepEntry && (typeof stepEntry === 'object' ? stepEntry.text : stepEntry)) || `Step ${stepIdx + 1}`;
  showConsolePanel(`Run until: ${stepLabel}`, 'Reproduce');

  try {
    await streamSSE(`/bug/${bugId}/reproduce/version`, async (ev) => {
      if (ev.line) appendConsoleLines(ev.line, ev.type || 'normal');
      if (ev.done) {
        if (ev.result && ev.result.status !== 'stopped') await loadReproRuns(bugId);
        if (ev.result) {
          const type = ev.result.status === 'stopped' ? 'warn' : 'error';
          setConsolePanelStatus(ev.result.label, type);
        }
      }
      if (ev.error) { appendConsoleLines(ev.detail || 'Error', 'error'); setConsolePanelStatus('Error', 'error'); }
    }, {
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        browser: sel.browser,
        playwright_version: sel.playwright_version,
        headless: false,
        launch_date: sel.browser === 'chromium' ? '2026-04-21' : sel.browser_version,
        channel: sel.browser === 'chromium' ? 'release' : (sel.channel || 'release'),
        test_site_mode: _testSiteMode[bugId] || null,
        plan_steps: plan,
        stop_after_step: stepIdx + 1,
        prerequisites: (_reproStrategy[bugId] || {}).prerequisites || [],
      }),
    }, [bugId, 'reproduce']);
  } catch(e) {
    appendConsoleLines('Request failed: ' + e, 'error');
  }
}

// Debounced save of strategy to DB
const _reproStrategySaveTimer = {};
function _saveReproStrategy(bugId) {
  clearTimeout(_reproStrategySaveTimer[bugId]);
  _reproStrategySaveTimer[bugId] = setTimeout(async () => {
    const strategy = _reproStrategy[bugId];
    if (!strategy) return;
    try {
      await fetch(`/bug/${bugId}/reproduce/strategy`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ strategy }),
      });
    } catch(e) {}
  }, 600);
}

function _renderPrerequisites(bugId) {
  const el = document.getElementById(`repro-strategy-prereqs-${bugId}`);
  if (!el) return;
  const strategy = _reproStrategy[bugId] || {};
  const prereqs = strategy.prerequisites;
  if (!Array.isArray(prereqs)) { el.innerHTML = ''; return; }
  const label = '<div class="repro-ana-strategy-label">Prerequisites</div>';
  const mkRow = content =>
    `<div class="repro-ana-step-row">` +
    `<span class="drag-handle drag-handle--hidden" aria-hidden="true">⠿</span>` +
    `<div class="repro-ana-step-num repro-prereq-bullet"></div>` +
    `<div class="repro-ana-step-body"><div class="repro-ana-step-text">${content}</div></div>` +
    `</div>`;
  const needed = prereqs.filter(p => p.needed);
  const rows = needed.length
    ? needed.map(p => mkRow(escHtml(p.name || p.id))).join('')
    : mkRow('<span class="repro-prereq-none-text">None required</span>');
  el.innerHTML = `<div class="repro-prereqs">${label}${rows}</div>`;
}

function _renderPlanSteps(bugId) {
  const stepsEl = document.getElementById(`repro-strategy-steps-${bugId}`);
  if (!stepsEl) return;
  const steps = (_reproStrategy[bugId] || {}).plan_steps || [];
  const label = '<div class="repro-ana-strategy-label">Execution Plan <span class="repro-ana-strategy-hint">— drag ⠿ to reorder</span></div>';
  const rows = steps.map((s, i) => {
    const text = typeof s === 'string' ? s : (s.text || '');
    const expected = (typeof s === 'object' && s.expected_result) || '';
    const isCheckpoint = typeof s === 'object' && s.checkpoint;
    const expectedPlaceholder = isCheckpoint
      ? 'Enter the expected result here'
      : 'Expected result if bug is reproduced…';
    return `<div class="repro-ana-step-row${isCheckpoint ? ' repro-ana-step-row--checkpoint' : ''}" data-idx="${i}">
      <span class="drag-handle" draggable="true" title="Drag to reorder">⠿</span>
      <div class="repro-ana-step-num">${i + 1}</div>
      <div class="repro-ana-step-body">
        <div class="repro-ana-step-text" contenteditable="true"
             onblur="saveReproStep(${bugId}, ${i}, this)"
             onkeydown="if(event.key==='Enter'){event.preventDefault();this.blur();}"
        >${escHtml(text)}</div>
        <div class="repro-ana-step-expected${(expected || isCheckpoint) ? '' : ' repro-ana-step-expected--empty'}" contenteditable="true"
             data-placeholder="${expectedPlaceholder}"
             onblur="saveReproExpected(${bugId}, ${i}, this)"
             onkeydown="if(event.key==='Enter'){event.preventDefault();this.blur();}"
        >${escHtml(expected)}</div>
      </div>
      <button class="repro-ana-step-del" onclick="removeReproStep(${bugId}, ${i})" title="Remove step">✕</button>
    </div>`;
  }).join('');
  stepsEl.innerHTML = label + rows +
    `<div class="repro-ana-step-actions">` +
    `<button class="repro-ana-step-add" onclick="addReproStep(${bugId})">+ Add step</button>` +
    `<button class="repro-ana-step-add repro-ana-step-add--checkpoint" onclick="addReproCheckpoint(${bugId})">+ Add checkpoint</button>` +
    `</div>`;
  _wireStepDrag(bugId);
}

function _wireStepDrag(bugId) {
  const el = document.getElementById(`repro-strategy-steps-${bugId}`);
  if (!el) return;
  let srcIdx = null;

  function _clearDropIndicators() {
    el.querySelectorAll('.repro-ana-step-row').forEach(r =>
      r.classList.remove('step-drop-before', 'step-drop-after')
    );
  }

  function _insertBefore(row, e) {
    const rect = row.getBoundingClientRect();
    return e.clientY < rect.top + rect.height / 2;
  }

  el.addEventListener('dragstart', e => {
    if (!e.target.classList.contains('drag-handle')) return;
    const row = e.target.closest('.repro-ana-step-row');
    srcIdx = row ? +row.dataset.idx : null;
    if (srcIdx === null) return;
    e.dataTransfer.effectAllowed = 'move';
    e.dataTransfer.setDragImage(row, 0, 0);
    row.classList.add('step-dragging');
  });

  el.addEventListener('dragend', () => {
    srcIdx = null;
    _clearDropIndicators();
  });

  el.addEventListener('dragover', e => {
    if (srcIdx === null) return;
    const row = e.target.closest('.repro-ana-step-row');
    if (!row) return;
    e.preventDefault();
    _clearDropIndicators();
    row.classList.add(_insertBefore(row, e) ? 'step-drop-before' : 'step-drop-after');
  });

  el.addEventListener('dragleave', e => {
    const row = e.target.closest('.repro-ana-step-row');
    if (row && !row.contains(e.relatedTarget))
      row.classList.remove('step-drop-before', 'step-drop-after');
  });

  el.addEventListener('drop', e => {
    if (srcIdx === null) return;
    const row = e.target.closest('.repro-ana-step-row');
    if (!row) return;
    e.preventDefault();
    const destIdx = +row.dataset.idx;
    const before = _insertBefore(row, e);
    const insertAt = before ? destIdx : destIdx + 1;
    const steps = _reproStrategy[bugId].plan_steps;
    const [moved] = steps.splice(srcIdx, 1);
    const adjustedIdx = insertAt > srcIdx ? insertAt - 1 : insertAt;
    steps.splice(adjustedIdx, 0, moved);
    _renderPlanSteps(bugId);
    _saveReproStrategy(bugId);
  });
}

function saveReproStep(bugId, idx, el) {
  const text = el.textContent.trim();
  if (!_reproStrategy[bugId]) return;
  if (text) {
    const s = _reproStrategy[bugId].plan_steps[idx];
    _reproStrategy[bugId].plan_steps[idx] = typeof s === 'object'
      ? { ...s, text } : { text };
    el.textContent = text;
    _saveReproStrategy(bugId);
  } else {
    removeReproStep(bugId, idx);
  }
}

function saveReproExpected(bugId, idx, el) {
  const text = el.textContent.trim();
  if (!_reproStrategy[bugId]) return;
  const s = _reproStrategy[bugId].plan_steps[idx];
  const base = typeof s === 'object' ? s : { text: s };
  _reproStrategy[bugId].plan_steps[idx] = { ...base, expected_result: text };
  el.classList.toggle('repro-ana-step-expected--empty', !text);
  _saveReproStrategy(bugId);
}

function removeReproStep(bugId, idx) {
  if (!_reproStrategy[bugId]) return;
  _reproStrategy[bugId].plan_steps.splice(idx, 1);
  _renderPlanSteps(bugId);
  _saveReproStrategy(bugId);
}

function addReproStep(bugId) {
  if (!_reproStrategy[bugId]) return;
  if (!_reproStrategy[bugId].plan_steps) _reproStrategy[bugId].plan_steps = [];
  _reproStrategy[bugId].plan_steps.push({ text: '' });
  _renderPlanSteps(bugId);
  const stepsEl = document.getElementById(`repro-strategy-steps-${bugId}`);
  if (!stepsEl) return;
  const rows = stepsEl.querySelectorAll('.repro-ana-step-text');
  const last = rows[rows.length - 1];
  if (last) { last.focus(); }
}

function addReproCheckpoint(bugId) {
  if (!_reproStrategy[bugId]) return;
  if (!_reproStrategy[bugId].plan_steps) _reproStrategy[bugId].plan_steps = [];
  _reproStrategy[bugId].plan_steps.push({ text: 'Take an OS screenshot', checkpoint: true, expected_result: '' });
  _renderPlanSteps(bugId);
  _saveReproStrategy(bugId);
  const stepsEl = document.getElementById(`repro-strategy-steps-${bugId}`);
  if (!stepsEl) return;
  const expectedFields = stepsEl.querySelectorAll('.repro-ana-step-expected');
  const last = expectedFields[expectedFields.length - 1];
  if (last) { last.focus(); }
}

<!-- investigate.js -->
<script>
// Match `[path/]file.ext[:N[-M]]`. Path segments are optional, allowing both
// `FormAutofillChild.sys.mjs:301-310` and the preferred fully-qualified
// `toolkit/components/formautofill/FormAutofillChild.sys.mjs:301-310`.
// Line numbers tolerate thousand-separator commas (e.g. `1,212-1,223`) and
// en-dash range separators (`1212–1223`) — Claude sometimes emits either.
const _SRC_REF_RE = /((?:[\w.-]+\/)*[A-Za-z0-9_-]+\.(?:sys\.mjs|mjs|jsm|js|cpp|h|py))(?::([\d,]+)(?:[-–]([\d,]+))?)?/g;

function linkifySourceRefs(html) {
  return html.replace(_SRC_REF_RE, (match, ref, startLine, endLine) => {
    const start = startLine && startLine.replace(/,/g, '');
    const end = endLine && endLine.replace(/,/g, '');
    const hasPath = ref.includes('/');
    let url;
    if (hasPath) {
      const anchor = start ? `#${start}${end ? `-${end}` : ''}` : '';
      url = `https://searchfox.org/firefox-main/source/${ref}${anchor}`;
    } else {
      // Filename-only — route through our backend, which resolves the full
      // path inside the testgen repo and redirects to searchfox with the
      // line anchor preserved. Falls back to a path-search if unresolved.
      const params = new URLSearchParams();
      if (start) params.set('start', start);
      if (end) params.set('end', end);
      const qs = params.toString();
      url = `/searchfox/${encodeURIComponent(ref)}${qs ? `?${qs}` : ''}`;
    }
    return `<a href="${url}" target="_blank" rel="noopener" class="src-link">${match}</a>`;
  });
}

// Apply backtick code-span rendering on already-HTML-escaped text.
// Newlines in the input would have been turned into <br> already; reject them
// here so `<br>` markers don't accidentally land inside a code span.
function renderInlineCode(htmlEscaped) {
  return htmlEscaped.replace(/`([^`<]+?)`/g, '<code class="rc-inline-code">$1</code>');
}

function renderAnalysisText(text) {
  if (!text) return '';
  const escaped = text
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  return linkifySourceRefs(renderInlineCode(escaped));
}

function parseRootCause(raw) {
  if (!raw) return null;
  if (typeof raw === 'object') return raw;  // already parsed object (from SSE done event)
  try {
    const p = JSON.parse(raw);
    if (p && 'suggested_options' in p) return p;  // new structured format
  } catch {}
  return { _legacy: true, text: raw };  // old plain-text record
}

function renderRootCauseReport(raw) {
  const a = parseRootCause(raw);
  if (!a) return '';
  if (a._legacy) return renderAnalysisText(a.text);
  const esc = s => renderInlineCode(
    (s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/\n/g, '<br>')
  );
  const escLink = s => linkifySourceRefs(esc(s));
  const isFeature = a.mode === 'feature';
  const isNoRepro = a.mode === 'no_repro';
  const sections = [];
  if (isNoRepro) {
    sections.push('<div class="rc-hypothesis-chip">Hypothesis &middot; no reproduction</div>');
  }
  sections.push(
    `<div class="rc-section rc-section--root"><div class="rc-label">${isFeature ? 'Request Summary' : (isNoRepro ? 'Hypothesized Root Cause' : 'Root Cause')}</div><div class="rc-body">${escLink(a.root_cause)}</div></div>`
  );
  let displayedOptions = a.suggested_options || [];
  if (!displayedOptions.length) {
    const fallbackText = a.code_level_analysis || a.root_cause || '';
    displayedOptions = parseFixOptions(fallbackText).map(opt => {
      const sentenceEnd = opt.search(/[.!?]\s/);
      return {
        title: sentenceEnd > 0 ? opt.slice(0, sentenceEnd + 1) : opt.slice(0, 80) + (opt.length > 80 ? '…' : ''),
        description: sentenceEnd > 0 ? opt.slice(sentenceEnd + 2).trim() : '',
      };
    });
  }
  if (displayedOptions.length) {
    const optHtml = displayedOptions.map((opt, i) =>
      `<div class="rc-option">${opt.perspective ? `<span class="rc-option-perspective rc-option-perspective--${esc(opt.perspective)}">${esc(opt.perspective)}</span> ` : ''}<span class="rc-option-num">${i + 1}.</span> <span class="rc-option-title">${esc(opt.title)}</span>${opt.description ? `<div class="rc-option-desc">${escLink(opt.description)}</div>` : ''}</div>`
    ).join('');
    sections.push(`<div class="rc-section"><div class="rc-label">${isFeature ? 'Implementation Options' : 'Suggested Options'}</div><div class="rc-body">${optHtml}</div></div>`);
  }
  sections.push(
    `<div class="rc-section"><div class="rc-label">${isFeature ? 'Core Understanding' : 'Executive Summary'}</div><div class="rc-body">${esc(a.executive_summary)}</div></div>`,
    `<div class="rc-section"><div class="rc-label">${isFeature ? 'Current Implementation' : 'Architecture Overview'}</div><div class="rc-body">${escLink(a.architecture_overview)}</div></div>`,
    `<div class="rc-section"><div class="rc-label">${isFeature ? 'Compatibility Analysis' : 'Code-Level Analysis'}</div><div class="rc-body">${escLink(a.code_level_analysis)}</div></div>`,
  );
  return sections.join('');
}

function _closeRootcauseMenu(dropdown) {
  dropdown.style.display = 'none';
  if (dropdown._closeHandler) {
    document.removeEventListener('click', dropdown._closeHandler);
    dropdown._closeHandler = null;
  }
}

// event is optional: the trigger button passes one (for stopPropagation), but
// the skill-tree shortcut at bugs.js _MAIN_ACTIONS.rootcause calls without one.
function toggleRootcauseMenu(bugId, event) {
  if (event) event.stopPropagation();
  const dropdown = document.getElementById(`rootcause-menu-${bugId}`);
  if (!dropdown) return;
  if (dropdown.style.display === 'block') {
    _closeRootcauseMenu(dropdown);
    return;
  }
  // Mutually exclusive with the clear-ai dropdown (clearBugAI menu) — keep at
  // most one floating menu open at a time.
  document.querySelectorAll('.clear-ai-dropdown.open').forEach(d => d.classList.remove('open'));
  dropdown.style.display = 'block';
  setTimeout(() => {
    const handler = e => {
      // Clicks inside the dropdown (e.g. on menu items) must not close it
      // before pickRootcauseMode runs.
      if (dropdown.contains(e.target)) return;
      _closeRootcauseMenu(dropdown);
    };
    dropdown._closeHandler = handler;
    document.addEventListener('click', handler);
  }, 0);
}

function pickRootcauseMode(bugId, mode, event) {
  event.stopPropagation();
  const dropdown = document.getElementById(`rootcause-menu-${bugId}`);
  if (dropdown) _closeRootcauseMenu(dropdown);
  analyzeRootCause(bugId, true, mode);
}

async function analyzeRootCause(bugId, regenerate, mode) {
  const btn = document.getElementById(`btn-rootcause-${bugId}`);
  const reportEl = document.getElementById(`rootcause-report-${bugId}`);
  const directionEl = document.getElementById(`rootcause-direction-${bugId}`);
  const effectiveMode = mode || 'auto';
  const direction = directionEl ? directionEl.value.trim() : '';
  const orig = btn.textContent;
  btn.disabled = true;
  btn.textContent = 'Investigating…';
  if (reportEl) reportEl.innerHTML = '';
  showConsolePanel(`POST /bug/${bugId}/rootcause`, 'Investigation');
  const params = new URLSearchParams({ regenerate, mode: effectiveMode });
  if (direction) params.set('direction', direction);
  try {
    await streamSSE(`/bug/${bugId}/rootcause?${params}`, async (ev) => {
      if (ev.line !== undefined) {
        appendConsoleLines(ev.line, ev.type || 'normal');
      } else if (ev.progress_report !== undefined) {
        if (reportEl) reportEl.innerHTML = renderAnalysisText(ev.progress_report);
        const tab = document.getElementById(`stab-rootcause-${bugId}`);
        if (tab && !tab.textContent.includes('✓')) tab.textContent = 'Investigate ●';
      } else if (ev.cancelled) {
        btn.textContent = orig; btn.disabled = false;
      } else if (ev.error) {
        appendConsoleLines(ev.detail || 'Error', 'error');
        setConsolePanelStatus('Failed', 'error');
        btn.textContent = orig; btn.disabled = false;
      } else if (ev.done) {
        const analysis = ev.analysis;
        const bugRaw = typeof analysis === 'string' ? analysis : JSON.stringify(analysis);
        if (BUGS[bugId]) BUGS[bugId].root_cause = bugRaw;
        if (MY_ISSUES_DATA[bugId]) MY_ISSUES_DATA[bugId].root_cause = bugRaw;
        if (reportEl) reportEl.innerHTML = renderRootCauseReport(analysis);
        _dispatchBugDataChanged(bugId, 'root_cause');
        const tab = document.getElementById(`stab-rootcause-${bugId}`);
        if (tab && !tab.textContent.includes('✓')) tab.textContent = 'Investigate ✓';
        setConsolePanelStatus('Done', 'success');
        btn.textContent = 'Re-investigate ▾'; btn.disabled = false;
        initSectionContent(bugId);
      }
    }, {}, [bugId, 'rootcause']);
  } catch(e) {
    appendConsoleLines(e.message || 'Network error', 'error');
    setConsolePanelStatus('Error', 'error');
    btn.textContent = orig; btn.disabled = false;
  }
}

<script>
const _TRIAGE_QUESTIONS = [
  'Reproduction steps clear enough to test ourselves?',

];

const _SUMMARY_FIELDS = [
  'reproduction', 'platform_dependent', 'regression', 'site_specific',
  'classification', 'severity', 'correct_component', 'security'
];

function renderTriageSummaryCards(text) {
  if (!text) return '';
  let data;
  try {
    const stripped = text.replace(/^```(?:json)?\s*\n?/, '').replace(/\n?```\s*$/, '').trim();

    </div>`;
  }

  let html = '';
  if (data.description) {
    html += `<div class="triage-desc-strip">

      <div class="triage-desc-text">${escHtml(data.description)}</div>
    </div>`;
  }
  html += '<div class="qa-cards">';
  for (let i = 0; i < _TRIAGE_QUESTIONS.length; i++) {
    const q = _TRIAGE_QUESTIONS[i];

    const verdictLabel = entry.verdict || '—';
    const detail = (entry.detail || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    const _alertFields = { regression: ['Yes'], severity: ['S1','S2'], correct_component: ['No'], security: ['Yes'] };
    const isAlert = (_alertFields[field] || []).includes(entry.verdict);
    const strongClass = isAlert ? ' class="verdict-alert"' : '';
    const answerText = detail ? `<strong${strongClass}>${verdictLabel}</strong>. ${detail}` : `<strong${strongClass}>${verdictLabel}</strong>`;
    html += `<div class="qa-card">
      <div class="qa-content">
        <div class="qa-question">${q}</div>
        <div class="qa-answer">${answerText}</div>
      </div>
    </div>`;
  }
  html += '</div>';
  return html;
}

function parseFixOptions(rootCause) {
  if (!rootCause) return [];

  // Find the "Suggested Fix Direction" section header (may have **bold** markers or a leading number)
  const headerIdx = rootCause.search(/(?:\*\*)?(?:\d+\.\s*)?Suggested Fix Direction/i);
  if (headerIdx === -1) return [rootCause.trim()];

  // Drop everything up to and including the header line
  const afterHeader = rootCause.slice(headerIdx).replace(/^[^\n]*\n/, '').trim();
  if (!afterHeader) return [];

  // Strategy 1: "Option A/B/C/..." or "Option 1/2/3/..." labeled options
  // Split on lines that start with "Option <letter or number>" — discard any preamble before first option
  const optionLabelRe = /\n(?=Option\s+[A-Za-z\d]+[\s\-–—:.])/i;
  const byOptionLabel = afterHeader.split(optionLabelRe).filter(Boolean);
  if (byOptionLabel.length > 1) {
    // Drop leading preamble (chunk before first "Option" label)
    const firstIsOption = /^Option\s+[A-Za-z\d]+[\s\-–—:.]/i.test(byOptionLabel[0]);
    const opts = firstIsOption ? byOptionLabel : byOptionLabel.slice(1);
    return opts.map(p => p.trim()).filter(Boolean);
  }

  // Strategy 2: lines starting with a digit+dot/paren  e.g. "1. ..." or "1) ..."
  const byNumber = afterHeader.split(/\n(?=\d+[.)]\s)/).map(p => p.replace(/^\d+[.)]\s*/, '').trim()).filter(Boolean);
  if (byNumber.length > 1) return byNumber;

  // Strategy 3: lines starting with a dash or bullet
  const byBullet = afterHeader.split(/\n(?=[-*]\s)/).map(p => p.replace(/^[-*]\s*/, '').trim()).filter(Boolean);
  if (byBullet.length > 1) return byBullet;

  // Strategy 4: blank-line separated paragraphs (last resort — preamble may bleed in)
  const byBlankLine = afterHeader.split(/\n\s*\n/).map(p => p.trim()).filter(p => p.length > 15);
  if (byBlankLine.length > 1) return byBlankLine;

  // Fallback: single option
  return [afterHeader];
}

function renderFixOptionLabel(fixOptionRaw) {
  let opt;
  try { opt = typeof fixOptionRaw === 'string' ? JSON.parse(fixOptionRaw) : fixOptionRaw; } catch(e) { return ''; }
  if (opt.custom_text) {
    const t = opt.custom_text.trim();
    return 'Custom — ' + (t.length > 120 ? t.slice(0, 120) + '…' : t);
  }
  return opt.title || '';
}

function renderFixOptions(bugId, rawOrAnalysis) {
  const a = parseRootCause(rawOrAnalysis);
  let options;
  if (a && a.suggested_options && a.suggested_options.length) {
    options = a.suggested_options;  // [{title, description}, ...]
  } else {
    // Structured format with empty suggested_options — fall back to text extraction
    const text = a ? (a.text || a.code_level_analysis || a.root_cause || '') : (typeof rawOrAnalysis === 'string' ? rawOrAnalysis : '');
    options = parseFixOptions(text).map(opt => {
      const optLabelMatch = opt.match(/^(Option\s+[A-Za-z\d]+[\s\-–—:.].*?)(?:\n|[:]\s*\n)([\s\S]*)$/i);
      if (optLabelMatch) {
        return { title: optLabelMatch[1].replace(/[:\s]+$/, '').trim(), description: optLabelMatch[2].trim() };
      }
      const sentenceEnd = opt.search(/[.!?]\s/);
      return {
        title: sentenceEnd > 0 ? opt.slice(0, sentenceEnd + 1) : opt.slice(0, 80) + (opt.length > 80 ? '…' : ''),
        description: sentenceEnd > 0 ? opt.slice(sentenceEnd + 2).trim() : '',
      };
    });
  }
  const esc = s => (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  let html = '';
  options.forEach((opt) => {
    html += `<div class="fix-option-card"
      data-title="${esc(opt.title)}"
      data-description="${esc(opt.description || '')}"
      onclick="selectFixOption(${bugId}, this)">
      <div class="fix-radio-dot"></div>
      <div class="fix-option-content">
        <div class="fix-option-title">${esc(opt.title)}</div>
        ${opt.description ? `<div class="fix-option-desc">${esc(opt.description)}</div>` : ''}
      </div>
    </div>`;
  });
  // "None of the Above" card
  html += `<div class="fix-option-card fix-option-card--custom" onclick="selectFixOption(${bugId}, this)">
    <div class="fix-radio-dot"></div>
    <div class="fix-option-content">
      <div class="fix-option-title">None of the above</div>
      <textarea class="fix-custom-textarea" id="fix-custom-text-${bugId}"
        placeholder="Describe your fix approach…" rows="3"
        onclick="event.stopPropagation()"
        oninput="onFixCustomInput(${bugId})"></textarea>
    </div>
  </div>`;
  return html;
}

// Re-render fix options when root_cause is set by investigation panel.
document.addEventListener('bugdatachanged', ({ detail: { bugId, field } }) => {
  if (field !== 'root_cause') return;
  const b = (typeof BUGS !== 'undefined' && BUGS[bugId])
         || (typeof MY_ISSUES_DATA !== 'undefined' && MY_ISSUES_DATA[bugId]);

function selectFixOption(bugId, el) {

  el.classList.add('selected');

function onFixCustomInput(bugId) {
