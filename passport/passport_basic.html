<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Passport Form (Basic)</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background: #fafafa; }
        form {
            max-width: 520px;
            margin: 0 auto 32px;
            padding: 20px 24px;
            border: 1px solid #ccc;
            border-radius: 6px;
            background-color: #fff;
        }
        h2 { margin-top: 0; }
        label { display: block; margin-top: 10px; font-size: 0.9em; font-weight: bold; }
        input {
            width: 100%;
            box-sizing: border-box;
            padding: 8px;
            margin-top: 4px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        .row { display: flex; gap: 10px; }
        .row .field { flex: 1; }
        button {
            margin-top: 16px;
            padding: 10px 16px;
            background-color: #4CAF50;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 1em;
        }
        button:hover { background-color: #45a049; }
    </style>
</head>
<body>

    <form id="passportForm" action="/submit" method="POST">
        <h2>Passport</h2>

        <label for="passportName">Name</label>
        <input type="text" id="passportName" name="passport-name" required>

        <label for="passportNumber">Passport Number</label>
        <input type="text" id="passportNumber" name="passport-number" required>

        <label for="passportCountry">Country</label>
        <input type="text" id="passportCountry" name="passport-country">

        <div class="row">
            <div class="field">
                <label for="issueDate">Date of Issue</label>
                <input type="date" id="issueDate" name="issue-date">
            </div>
            <div class="field">
                <label for="expiryDate">Date of Expiry</label>
                <input type="date" id="expiryDate" name="expiry-date">
            </div>
        </div>

        <button type="submit">Submit</button>
    </form>

</body>
</html>
